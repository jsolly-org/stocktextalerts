name: PR comment trigger context
description: Derive PR context and guard for comment-triggered agent runs.

inputs:
  repo:
    description: GitHub repo in owner/name form
    required: true
  repo_owner:
    description: Repository owner login
    required: true
  event_name:
    description: GitHub event name
    required: true
  comment_body:
    description: Comment or review body
    required: false
    default: ""
  comment_user:
    description: Comment author login
    required: false
    default: ""
  comment_id:
    description: Comment or review ID
    required: false
    default: ""
  pr_number:
    description: PR or issue number
    required: false
    default: ""
  issue_pull_request_url:
    description: Issue pull request URL (issue_comment only)
    required: false
    default: ""
  internal_marker:
    description: Marker for internal workflow comments
    required: true
  gh_token:
    description: GitHub token for API calls
    required: true

outputs:
  skip:
    description: Whether this comment should be skipped
    value: ${{ steps.should_skip.outputs.skip }}
  run_agent:
    description: Whether to run the agent
    value: ${{ steps.guard.outputs.run_agent }}
  pr_number:
    description: PR number
    value: ${{ steps.pr_meta.outputs.pr_number }}
  head_repo:
    description: PR head repo
    value: ${{ steps.pr_meta.outputs.head_repo }}
  head_ref:
    description: PR head ref
    value: ${{ steps.pr_meta.outputs.head_ref }}
  head_sha:
    description: PR head sha
    value: ${{ steps.pr_meta.outputs.head_sha }}
  comment_id:
    description: Comment ID
    value: ${{ steps.pr_meta.outputs.comment_id }}
  comment_user:
    description: Comment author
    value: ${{ steps.pr_meta.outputs.comment_user }}
  event_name:
    description: Event name
    value: ${{ steps.pr_meta.outputs.event_name }}
  is_pr:
    description: Whether the comment is on a PR
    value: ${{ steps.pr_meta.outputs.is_pr }}
  pr_author:
    description: PR author login
    value: ${{ steps.pr_meta.outputs.pr_author }}
  is_author:
    description: Whether the PR author is the repo owner
    value: ${{ steps.pr_meta.outputs.is_author }}
  comment_url:
    description: Comment URL anchor
    value: ${{ steps.pr_meta.outputs.comment_url }}
  comment_reference:
    description: Comment reference markdown
    value: ${{ steps.pr_meta.outputs.comment_reference }}
  comment_path:
    description: Review comment file path
    value: ${{ steps.review_context.outputs.comment_path }}
  comment_side:
    description: Review comment side
    value: ${{ steps.review_context.outputs.comment_side }}
  comment_line:
    description: Review comment line
    value: ${{ steps.review_context.outputs.comment_line }}
  comment_start_line:
    description: Review comment start line
    value: ${{ steps.review_context.outputs.comment_start_line }}
  comment_diff_hunk:
    description: Review comment diff hunk
    value: ${{ steps.review_context.outputs.comment_diff_hunk }}
  prompt_body:
    description: Comment body to use for the agent prompt (resolved from linked comment when internal no-op triggers)
    value: ${{ steps.prompt_body.outputs.body }}
  prompt_path:
    description: File path for prompt context (when resolved from review comment)
    value: ${{ steps.prompt_body.outputs.path }}
  prompt_side:
    description: Diff side for prompt context
    value: ${{ steps.prompt_body.outputs.side }}
  prompt_line:
    description: Line number for prompt context
    value: ${{ steps.prompt_body.outputs.line }}
  prompt_start_line:
    description: Start line for prompt context
    value: ${{ steps.prompt_body.outputs.start_line }}
  prompt_diff_hunk:
    description: Diff hunk for prompt context
    value: ${{ steps.prompt_body.outputs.diff_hunk }}
  resolve_failed:
    description: True when we tried to resolve from a linked comment but the fetch failed or returned empty body
    value: ${{ steps.prompt_body.outputs.resolve_failed }}
  resolved_from_link:
    description: True when the trigger was an internal "No changes needed" comment and we resolved the prompt from the linked comment
    value: ${{ steps.should_skip.outputs.resolved_from_link }}

runs:
  using: composite
  steps:
    - name: Check if should skip
      id: should_skip
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        COMMENT_BODY: ${{ inputs.comment_body }}
        COMMENT_USER: ${{ inputs.comment_user }}
        REPO: ${{ inputs.repo }}
        REPO_OWNER: ${{ inputs.repo_owner }}
        INTERNAL_MARKER: ${{ inputs.internal_marker }}
        EVENT_NAME: ${{ inputs.event_name }}
      run: |
        skip() { echo "Skipping: $1"; echo "skip=true" >> "$GITHUB_OUTPUT"; exit 0; }

        echo "Commenter: '$COMMENT_USER' | Event: $EVENT_NAME"

        # Allowlist: repo owner, coderabbitai[bot]
        case "$COMMENT_USER" in
          "$REPO_OWNER"|"coderabbitai[bot]") ;;
          *) skip "commenter is not in the allowlist" ;;
        esac

        # Internal workflow comments: skip unless it's a "No changes needed" comment with a
        # resolvable "In response to" link — in that case we run the agent with the linked comment.
        # Skip when the linked comment is itself a noop to avoid unbounded retry loops.
        RESOLVED_FROM_LINK=""
        if [[ "$COMMENT_BODY" == *"$INTERNAL_MARKER"* ]]; then
          RESOLVE_ID=""
          RESOLVE_TYPE=""
          if [[ "$COMMENT_BODY" == *"No changes needed"* ]] && [[ "$COMMENT_BODY" == *"In response to"* ]]; then
            if [[ "$COMMENT_BODY" =~ \#issuecomment-([0-9]+) ]]; then
              RESOLVE_ID="${BASH_REMATCH[1]}"
              RESOLVE_TYPE="issue"
            elif [[ "$COMMENT_BODY" =~ \#discussion_r([0-9]+) ]]; then
              RESOLVE_ID="${BASH_REMATCH[1]}"
              RESOLVE_TYPE="review"
            fi
          fi
          if [[ -z "$RESOLVE_ID" ]]; then
            skip "internal workflow comment"
          fi
          # Avoid noop retry loop: if the linked comment is itself a noop report, skip.
          LINKED_JSON=""
          if [[ "$RESOLVE_TYPE" == "issue" ]]; then
            LINKED_JSON=$(gh api "repos/$REPO/issues/comments/$RESOLVE_ID" 2>/dev/null) || true
          else
            LINKED_JSON=$(gh api "repos/$REPO/pulls/comments/$RESOLVE_ID" 2>/dev/null) || true
          fi
          if [[ -n "$LINKED_JSON" ]]; then
            LINKED_BODY=$(echo "$LINKED_JSON" | jq -r '.body // ""')
            if [[ "$LINKED_BODY" == *"$INTERNAL_MARKER"* ]] && [[ "$LINKED_BODY" == *"No changes needed"* ]]; then
              skip "noop retry chain (linked comment is a noop report)"
            fi
          fi
          echo "resolve_from_comment_id=$RESOLVE_ID" >> "$GITHUB_OUTPUT"
          echo "resolve_from_comment_type=$RESOLVE_TYPE" >> "$GITHUB_OUTPUT"
          echo "resolved_from_link=true" >> "$GITHUB_OUTPUT"
          RESOLVED_FROM_LINK="1"
        fi

        # Skip-pattern checks do not apply when we resolved from a linked comment: the current
        # COMMENT_BODY is the noop report (with arbitrary agent output) and must not be
        # evaluated against these patterns.
        if [[ -z "$RESOLVED_FROM_LINK" ]]; then
          COMMENT_BODY_LC="${COMMENT_BODY,,}"
          # Skip comments that contain "full review" text (case-insensitive).
          [[ "$COMMENT_BODY_LC" =~ full[[:space:]]+review ]] && skip "comment contains full review text"
          # Skip CodeRabbit status comments that indicate there is nothing to do.
          [[ "$COMMENT_BODY_LC" =~ no[[:space:]]+actionable[[:space:]]+comments ]] && skip "comment contains no actionable comments text"
          # Skip Codex bot comments about usage/rate limits.
          COMMENT_USER_LC="${COMMENT_USER,,}"
          [[ "$COMMENT_USER_LC" == *codex* && "$COMMENT_BODY_LC" =~ usage[[:space:]]+limit ]] && skip "Codex usage limit notice"
        fi

        # Review events without body text
        [[ "$EVENT_NAME" == "pull_request_review" && ( -z "$COMMENT_BODY" || "$COMMENT_BODY" == "null" ) ]] && skip "review without body"

        echo "skip=false" >> "$GITHUB_OUTPUT"
        [[ -z "$RESOLVED_FROM_LINK" ]] && echo "resolve_from_comment_id=" >> "$GITHUB_OUTPUT"
        [[ -z "$RESOLVED_FROM_LINK" ]] && echo "resolve_from_comment_type=" >> "$GITHUB_OUTPUT"
        [[ -z "$RESOLVED_FROM_LINK" ]] && echo "resolved_from_link=false" >> "$GITHUB_OUTPUT"

    - name: Extract PR metadata
      id: pr_meta
      if: ${{ steps.should_skip.outputs.skip != 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        REPO: ${{ inputs.repo }}
        REPO_OWNER: ${{ inputs.repo_owner }}
        EVENT_NAME: ${{ inputs.event_name }}
        COMMENT_ID: ${{ inputs.comment_id }}
        COMMENT_USER: ${{ inputs.comment_user }}
        PR_NUMBER: ${{ inputs.pr_number }}
        ISSUE_PR_URL: ${{ inputs.issue_pull_request_url }}
      run: |
        IS_PR="false"

        if [[ "$EVENT_NAME" == "pull_request_review" ]] || [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
          IS_PR="true"
        elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
          IS_PR=$([[ -n "$ISSUE_PR_URL" && "$ISSUE_PR_URL" != "null" ]] && echo "true" || echo "false")
        fi

        if [[ "$IS_PR" == "true" ]]; then
          PR_JSON=$(gh api "repos/$REPO/pulls/$PR_NUMBER")
          HEAD_REPO=$(echo "$PR_JSON" | jq -r '.head.repo.full_name')
          HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')
          HEAD_SHA=$(echo "$PR_JSON" | jq -r '.head.sha')
          PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.user.login // ""')
          IS_AUTHOR=$([[ "$PR_AUTHOR" == "$REPO_OWNER" ]] && echo "true" || echo "false")
        else
          HEAD_REPO=""
          HEAD_REF=""
          HEAD_SHA=""
          PR_AUTHOR=""
          IS_AUTHOR="false"
        fi

        # Construct relative comment anchor by event type
        case "$EVENT_NAME" in
          pull_request_review_comment) COMMENT_URL="#discussion_r$COMMENT_ID" ;;
          issue_comment)               COMMENT_URL="#issuecomment-$COMMENT_ID" ;;
          pull_request_review)         COMMENT_URL="#pullrequestreview-$COMMENT_ID" ;;
          *)                           COMMENT_URL="" ;;
        esac

        COMMENT_REFERENCE=""
        [[ -n "$COMMENT_URL" ]] && COMMENT_REFERENCE="In response to [this comment]($COMMENT_URL)."

        {
          echo "pr_number=$PR_NUMBER"
          echo "head_repo=$HEAD_REPO"
          echo "head_ref=$HEAD_REF"
          echo "head_sha=$HEAD_SHA"
          echo "comment_id=$COMMENT_ID"
          echo "comment_user=$COMMENT_USER"
          echo "event_name=$EVENT_NAME"
          echo "is_pr=$IS_PR"
          echo "pr_author=$PR_AUTHOR"
          echo "is_author=$IS_AUTHOR"
          echo "comment_url=$COMMENT_URL"
          echo "comment_reference=$COMMENT_REFERENCE"
        } >> "$GITHUB_OUTPUT"

    - name: Fetch review comment context
      id: review_context
      if: ${{ steps.should_skip.outputs.skip != 'true' && steps.pr_meta.outputs.is_pr == 'true' && inputs.event_name == 'pull_request_review_comment' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        REPO: ${{ inputs.repo }}
        PR_NUMBER: ${{ steps.pr_meta.outputs.pr_number }}
        COMMENT_ID: ${{ steps.pr_meta.outputs.comment_id }}
      run: |
        # Get a single review comment: path is pulls/comments/{id}, not pulls/{pr}/comments/{id}.
        COMMENT_JSON=$(gh api "repos/$REPO/pulls/comments/$COMMENT_ID")
        COMMENT_PATH=$(echo "$COMMENT_JSON" | jq -r '.path // ""')
        COMMENT_SIDE=$(echo "$COMMENT_JSON" | jq -r '.side // ""')
        COMMENT_LINE=$(echo "$COMMENT_JSON" | jq -r '.line // ""')
        COMMENT_START_LINE=$(echo "$COMMENT_JSON" | jq -r '.start_line // ""')
        COMMENT_DIFF_HUNK=$(echo "$COMMENT_JSON" | jq -r '.diff_hunk // ""')

        {
          echo "comment_path=$COMMENT_PATH"
          echo "comment_side=$COMMENT_SIDE"
          echo "comment_line=$COMMENT_LINE"
          echo "comment_start_line=$COMMENT_START_LINE"
          echo "comment_diff_hunk<<EOF"
          echo "$COMMENT_DIFF_HUNK"
          echo "EOF"
        } >> "$GITHUB_OUTPUT"

    - name: Compute prompt body
      id: prompt_body
      if: ${{ steps.should_skip.outputs.skip != 'true' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        REPO: ${{ inputs.repo }}
        COMMENT_BODY: ${{ inputs.comment_body }}
        RESOLVE_ID: ${{ steps.should_skip.outputs.resolve_from_comment_id }}
        RESOLVE_TYPE: ${{ steps.should_skip.outputs.resolve_from_comment_type }}
        REVIEW_PATH: ${{ steps.review_context.outputs.comment_path }}
        REVIEW_SIDE: ${{ steps.review_context.outputs.comment_side }}
        REVIEW_LINE: ${{ steps.review_context.outputs.comment_line }}
        REVIEW_START_LINE: ${{ steps.review_context.outputs.comment_start_line }}
        REVIEW_DIFF_HUNK: ${{ steps.review_context.outputs.comment_diff_hunk }}
      run: |
        BODY="$COMMENT_BODY"
        PATH_OUT=""
        SIDE_OUT=""
        LINE_OUT=""
        START_LINE_OUT=""
        DIFF_HUNK_OUT=""
        RESOLVE_FAILED="false"

        if [[ -n "$RESOLVE_ID" ]] && [[ -n "$RESOLVE_TYPE" ]]; then
          BODY=""
          # Prefer embedded CURSOR_AGENT_ORIGINAL_PROMPT when present: it is the exact prompt
          # that was sent to the agent, whereas API fetch can fail or return unexpected content.
          if [[ "$COMMENT_BODY" == *"<!-- CURSOR_AGENT_ORIGINAL_PROMPT"*"CURSOR_AGENT_ORIGINAL_PROMPT_END -->"* ]]; then
            BODY=$(echo "$COMMENT_BODY" | sed -n '/<!-- CURSOR_AGENT_ORIGINAL_PROMPT/,/CURSOR_AGENT_ORIGINAL_PROMPT_END -->/p' | sed '1d;$d')
          fi
          # Fall back to API fetch when embedded prompt is missing or empty
          if [[ -z "$BODY" ]]; then
            if [[ "$RESOLVE_TYPE" == "issue" ]]; then
              JSON=$(gh api "repos/$REPO/issues/comments/$RESOLVE_ID" 2>/dev/null) || JSON=""
            else
              JSON=$(gh api "repos/$REPO/pulls/comments/$RESOLVE_ID" 2>/dev/null) || JSON=""
            fi
            if [[ -n "$JSON" ]]; then
              BODY=$(echo "$JSON" | jq -r '.body // ""')
              if [[ "$RESOLVE_TYPE" == "review" ]]; then
                PATH_OUT=$(echo "$JSON" | jq -r '.path // ""')
                SIDE_OUT=$(echo "$JSON" | jq -r '.side // ""')
                LINE_OUT=$(echo "$JSON" | jq -r '.line // ""')
                START_LINE_OUT=$(echo "$JSON" | jq -r '.start_line // ""')
                DIFF_HUNK_OUT=$(echo "$JSON" | jq -r '.diff_hunk // ""')
              fi
              [[ -z "$BODY" ]] && RESOLVE_FAILED="true" || RESOLVE_FAILED="false"
            else
              RESOLVE_FAILED="true"
            fi
          fi
        else
          PATH_OUT="$REVIEW_PATH"
          SIDE_OUT="$REVIEW_SIDE"
          LINE_OUT="$REVIEW_LINE"
          START_LINE_OUT="$REVIEW_START_LINE"
          DIFF_HUNK_OUT="$REVIEW_DIFF_HUNK"
        fi

        # When BODY references review comments (e.g. discussion_r3925837801), fetch them and
        # append their content so the agent has full context without needing GitHub API access.
        if [[ -n "$BODY" ]]; then
          REVIEW_IDS=()
          TEMP="$BODY"
          while [[ "$TEMP" =~ discussion_r([0-9]+) ]]; do
            REVIEW_IDS+=("${BASH_REMATCH[1]}")
            TEMP="${TEMP/discussion_r${BASH_REMATCH[1]}/}"
          done
          if [[ ${#REVIEW_IDS[@]} -gt 0 ]]; then
            REVIEW_IDS=($(printf '%s\n' "${REVIEW_IDS[@]}" | sort -u))
            for RID in "${REVIEW_IDS[@]}"; do
              RJSON=$(gh api "repos/$REPO/pulls/comments/$RID" 2>/dev/null) || true
              if [[ -n "$RJSON" ]]; then
                RBODY=$(echo "$RJSON" | jq -r '.body // ""')
                RPATH=$(echo "$RJSON" | jq -r '.path // ""')
                RLINE=$(echo "$RJSON" | jq -r '.line // ""')
                RSTART=$(echo "$RJSON" | jq -r '.start_line // ""')
                RDIFF=$(echo "$RJSON" | jq -r '.diff_hunk // ""')
                if [[ -n "$RBODY" ]]; then
                  BODY="${BODY}

---
**Referenced review comment (discussion_r${RID})**"
                  [[ -n "$RPATH" ]] && BODY="${BODY}
File: \`${RPATH}\`"
                  [[ -n "$RLINE" ]] && BODY="${BODY}
Line: ${RLINE}"
                  [[ -n "$RSTART" ]] && [[ "$RSTART" != "null" ]] && BODY="${BODY}
Start line: ${RSTART}"
                  [[ -n "$RDIFF" ]] && [[ "$RDIFF" != "null" ]] && BODY="${BODY}

Diff context:
\`\`\`
${RDIFF}
\`\`\`

${RBODY}"
                  # Use first referenced review's path/line for COMMENT_PATH etc
                  if [[ -z "$PATH_OUT" ]] && [[ -n "$RPATH" ]]; then
                    PATH_OUT="$RPATH"
                    SIDE_OUT=$(echo "$RJSON" | jq -r '.side // ""')
                    LINE_OUT="$RLINE"
                    START_LINE_OUT="$RSTART"
                    DIFF_HUNK_OUT="$RDIFF"
                  fi
                fi
              fi
            done
          fi
        fi

        echo "body<<EOF" >> "$GITHUB_OUTPUT"
        echo "$BODY" >> "$GITHUB_OUTPUT"
        echo "EOF" >> "$GITHUB_OUTPUT"
        echo "path=$PATH_OUT" >> "$GITHUB_OUTPUT"
        echo "side=$SIDE_OUT" >> "$GITHUB_OUTPUT"
        echo "line=$LINE_OUT" >> "$GITHUB_OUTPUT"
        echo "start_line=$START_LINE_OUT" >> "$GITHUB_OUTPUT"
        echo "diff_hunk<<DIFFEOF" >> "$GITHUB_OUTPUT"
        echo "$DIFF_HUNK_OUT" >> "$GITHUB_OUTPUT"
        echo "DIFFEOF" >> "$GITHUB_OUTPUT"
        echo "resolve_failed=$RESOLVE_FAILED" >> "$GITHUB_OUTPUT"

    - name: Set run flags
      id: guard
      shell: bash
      env:
        SKIP: ${{ steps.should_skip.outputs.skip }}
        IS_PR: ${{ steps.pr_meta.outputs.is_pr }}
        IS_AUTHOR: ${{ steps.pr_meta.outputs.is_author }}
        RESOLVE_FAILED: ${{ steps.prompt_body.outputs.resolve_failed }}
      run: |
        RUN_AGENT="false"
        if [[ "$SKIP" != "true" && "$IS_PR" == "true" && "$IS_AUTHOR" == "true" && "$RESOLVE_FAILED" != "true" ]]; then
          RUN_AGENT="true"
        fi
        echo "run_agent=$RUN_AGENT" >> "$GITHUB_OUTPUT"
