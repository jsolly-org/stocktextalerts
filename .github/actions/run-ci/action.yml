name: Run CI
description: Shared CI steps (lint, typecheck, Supabase, test, build)

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Biome
      uses: biomejs/setup-biome@v2
      with:
        version: 2.3.13
    - name: Run Biome
      shell: bash
      run: biome ci .
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      shell: bash
      run: npm ci
    - name: Deep Type check
      shell: bash
      run: npm run check:ts
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: "2.58.5"
    - name: Start Supabase
      shell: bash
      run: supabase start
    - name: Wait for Supabase
      shell: bash
      run: |
        echo "Waiting for Supabase services to be ready..."
        for i in $(seq 1 30); do
          if supabase status -o json > /tmp/supabase-status.json 2>/dev/null; then
            API_URL=$(jq -r '.API_URL // empty' /tmp/supabase-status.json)
            if [[ -n "$API_URL" ]]; then
              echo "Supabase ready (attempt $i)"
              exit 0
            fi
          fi
          echo "Waiting... ($i/30)"
          sleep 2
        done
        echo "Supabase failed to become ready"
        exit 1
    - name: Load Supabase env
      shell: bash
      run: |
        supabase status -o json > /tmp/sb-status.json
        # Extract DB vars once, then write to both .env.local and GITHUB_ENV
        DB_VARS=$(jq -r '
          "PUBLIC_SUPABASE_URL=\(.API_URL)",
          "PUBLIC_SUPABASE_ANON_KEY=\(.ANON_KEY)",
          "SUPABASE_SECRET_KEY=\(.SERVICE_ROLE_KEY)",
          "DATABASE_URL=\(.DB_URL)"
        ' /tmp/sb-status.json)
        INVALID_DB_VARS=0
        DB_VARS_NONEMPTY_LINES=0
        declare -A DB_VARS_SEEN_KEYS=()
        while IFS= read -r LINE; do
          [[ -z "$LINE" ]] && continue
          DB_VARS_NONEMPTY_LINES=$((DB_VARS_NONEMPTY_LINES + 1))
          if [[ "$LINE" != *"="* ]]; then
            echo "Error: Supabase env var line is malformed (expected KEY=VALUE): $LINE"
            INVALID_DB_VARS=1
            continue
          fi
          KEY="${LINE%%=*}"
          VALUE="${LINE#*=}"
          DB_VARS_SEEN_KEYS["$KEY"]=1
          if [[ -z "$VALUE" || "$VALUE" == "null" ]]; then
            echo "Error: Supabase status did not provide a valid value for $KEY (got '$VALUE')."
            INVALID_DB_VARS=1
          fi
        done <<< "$DB_VARS"
        for KEY in PUBLIC_SUPABASE_URL PUBLIC_SUPABASE_ANON_KEY SUPABASE_SECRET_KEY DATABASE_URL; do
          if [[ -z "${DB_VARS_SEEN_KEYS[$KEY]:-}" ]]; then
            echo "Error: Supabase env var $KEY was not produced by jq."
            INVALID_DB_VARS=1
          fi
        done
        if [[ "$DB_VARS_NONEMPTY_LINES" -eq 0 ]]; then
          echo "Error: jq produced no Supabase env vars."
          INVALID_DB_VARS=1
        fi
        if [[ "$INVALID_DB_VARS" -ne 0 ]]; then
          echo "Error: Refusing to export Supabase env vars with null/empty values."
          exit 1
        fi
        STATIC_VARS=$'CRON_SECRET=ci-cron-secret\nVERCEL_URL=http://localhost:4321'
        printf '%s\n%s\n' "$DB_VARS" "$STATIC_VARS" > .env.local
        printf '%s\n%s\n' "$DB_VARS" "$STATIC_VARS" >> $GITHUB_ENV
    - name: Test
      shell: bash
      run: npm run test:ci
    - name: Build application
      shell: bash
      run: npm run build
