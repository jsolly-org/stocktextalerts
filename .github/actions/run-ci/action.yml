name: Run CI
description: Shared CI steps (lint, typecheck, Supabase, test, build)

runs:
  using: composite
  steps:
    - name: Checkout
      uses: actions/checkout@v6
    - name: Setup Biome
      uses: biomejs/setup-biome@v2
      with:
        version: 2.3.13
    - name: Run Biome
      shell: bash
      run: biome ci .
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      shell: bash
      run: npm ci
    - name: Deep Type check
      shell: bash
      run: npm run check:ts
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: "2.58.5"
    - name: Start Supabase
      shell: bash
      run: supabase start
    - name: Wait for Supabase
      shell: bash
      run: |
        echo "Waiting for Supabase services to be ready..."
        for i in $(seq 1 30); do
          if supabase status -o json > /tmp/supabase-status.json 2>/dev/null; then
            API_URL=$(jq -r '.API_URL // empty' /tmp/supabase-status.json)
            if [[ -n "$API_URL" ]]; then
              echo "Supabase ready (attempt $i)"
              exit 0
            fi
          fi
          echo "Waiting... ($i/30)"
          sleep 2
        done
        echo "Supabase failed to become ready"
        exit 1
    - name: Load Supabase env
      shell: bash
      run: |
        supabase status -o json > /tmp/sb-status.json
        jq -r '
          "PUBLIC_SUPABASE_URL=\(.API_URL)",
          "PUBLIC_SUPABASE_ANON_KEY=\(.ANON_KEY)",
          "SUPABASE_SERVICE_ROLE_KEY=\(.SERVICE_ROLE_KEY)",
          "DATABASE_URL=\(.DB_URL)",
          "CRON_SECRET=ci-cron-secret",
          "VERCEL_URL=http://localhost:4321"
        ' /tmp/sb-status.json > .env.local
        jq -r '
          "PUBLIC_SUPABASE_URL=\(.API_URL)",
          "PUBLIC_SUPABASE_ANON_KEY=\(.ANON_KEY)",
          "SUPABASE_SERVICE_ROLE_KEY=\(.SERVICE_ROLE_KEY)",
          "DATABASE_URL=\(.DB_URL)"
        ' /tmp/sb-status.json >> $GITHUB_ENV
        echo "CRON_SECRET=ci-cron-secret" >> $GITHUB_ENV
        echo "VERCEL_URL=http://localhost:4321" >> $GITHUB_ENV
    - name: Test
      shell: bash
      run: npm run test:ci
    - name: Build application
      shell: bash
      run: npm run build
