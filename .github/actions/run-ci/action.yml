name: Run CI
description: Shared CI steps (lint, typecheck, Supabase, test, build)

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      shell: bash
      run: npm ci
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: "2.58.5"
    - name: Start Supabase (background)
      shell: bash
      run: nohup supabase start > /tmp/supabase-start.log 2>&1 &
    - name: Run Biome
      shell: bash
      run: npx biome ci .
    - name: Deep Type check
      shell: bash
      run: npm run check:ts
    - name: Wait for Supabase
      shell: bash
      run: |
        echo "Waiting for Supabase services to be ready..."
        for i in $(seq 1 30); do
          if supabase status -o json > /tmp/supabase-status.json 2>/dev/null; then
            API_URL=$(jq -r '.API_URL // empty' /tmp/supabase-status.json)
            if [[ -n "$API_URL" ]]; then
              echo "Supabase ready (attempt $i)"
              exit 0
            fi
          fi
          echo "Waiting... ($i/30)"
          sleep 2
        done
        echo "Supabase failed to become ready"
        echo "=== supabase start output ==="
        cat /tmp/supabase-start.log 2>/dev/null || true
        exit 1
    - name: Load Supabase env
      shell: bash
      run: |
        supabase status -o json > /tmp/sb-status.json
        # Extract DB vars once, then write to both .env.local and GITHUB_ENV
        DB_VARS=$(jq -r '
          "SUPABASE_URL=\(.API_URL // "")",
          "SUPABASE_PUBLISHABLE_KEY=\(.ANON_KEY // "")",
          "SUPABASE_SECRET_KEY=\(.SERVICE_ROLE_KEY // "")",
          "DATABASE_URL=\(.DB_URL // "")"
        ' /tmp/sb-status.json)
        INVALID_DB_VARS=0
        DB_VARS_NONEMPTY_LINES=0
        declare -A DB_VARS_SEEN_KEYS=()
        while IFS= read -r LINE; do
          [[ -z "$LINE" ]] && continue
          DB_VARS_NONEMPTY_LINES=$((DB_VARS_NONEMPTY_LINES + 1))
          if [[ "$LINE" != *"="* ]]; then
            echo "Error: Supabase env var line is malformed (expected KEY=VALUE): $LINE" >&2
            INVALID_DB_VARS=1
            continue
          fi
          KEY="${LINE%%=*}"
          VALUE="${LINE#*=}"
          DB_VARS_SEEN_KEYS["$KEY"]=1
          VALUE_TRIMMED="${VALUE//[[:space:]]/}"
          if [[ -z "$VALUE_TRIMMED" || "$VALUE" == "null" ]]; then
            echo "Error: Supabase status did not provide a valid value for $KEY (got '$VALUE')." >&2
            INVALID_DB_VARS=1
          fi
        done <<< "$DB_VARS"
        for KEY in SUPABASE_URL SUPABASE_PUBLISHABLE_KEY SUPABASE_SECRET_KEY DATABASE_URL; do
          if [[ -z "${DB_VARS_SEEN_KEYS[$KEY]:-}" ]]; then
            echo "Error: Supabase env var $KEY was not produced by jq." >&2
            INVALID_DB_VARS=1
          fi
        done
        if [[ "$DB_VARS_NONEMPTY_LINES" -eq 0 ]]; then
          echo "Error: jq produced no Supabase env vars." >&2
          INVALID_DB_VARS=1
        fi
        if [[ "$INVALID_DB_VARS" -ne 0 ]]; then
          echo "Error: Refusing to export Supabase env vars with null/empty values." >&2
          exit 1
        fi
        # CI only needs these values to exist (Astro prerender runs middleware during build).
        # Real production values live in Vercel env.
        STATIC_VARS=$'CRON_SECRET=ci-cron-secret\nVERCEL_URL=http://localhost:4321\nTWILIO_ACCOUNT_SID=AC00000000000000000000000000000000\nTWILIO_AUTH_TOKEN=ci-twilio-auth-token\nTWILIO_PHONE_NUMBER=+15555550100\nTWILIO_VERIFY_SERVICE_SID=VA00000000000000000000000000000000\nRESEND_API_KEY=re_ci_dummy_key\nEMAIL_FROM=ci@example.com\nFINNHUB_API_KEY=ci-finnhub-api-key'
        printf '%s\n%s\n' "$DB_VARS" "$STATIC_VARS" > .env.local
        printf '%s\n%s\n' "$DB_VARS" "$STATIC_VARS" >> $GITHUB_ENV
    - name: Test
      shell: bash
      run: npm run test:ci
    - name: Build application
      shell: bash
      run: npm run build
