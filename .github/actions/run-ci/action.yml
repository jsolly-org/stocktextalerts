name: Run CI
description: Shared CI steps (lint, typecheck, Supabase, test, build)

inputs:
  skip-lint:
    description: 'Skip Biome and type check (when a separate lint job already covers them)'
    required: false
    default: 'false'
  production-site-url:
    description: 'Canonical production URL (e.g. https://www.stocktextalerts.com). When set, the build uses it for site, sitemap, canonicals, and OG URLs so prebuilt deploys are correct.'
    required: false
    default: ''
  skip-e2e:
    description: 'Skip Playwright install and E2E tests (unit tests + build only)'
    required: false
    default: 'false'

runs:
  using: composite
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@v6.4.0
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      shell: bash
      run: npm ci
    - name: Guard Biome rules contract
      if: inputs.skip-lint != 'true'
      shell: bash
      run: bash .agents/scripts/check-biome-rules.sh biome.jsonc
    - name: Install YAML linters
      if: inputs.skip-lint != 'true'
      shell: bash
      run: |
        pipx install yamllint==1.38.0
        bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
        sudo mv actionlint /usr/local/bin/actionlint
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v2
      with:
        version: 2.98.2
    - name: Run Biome
      if: inputs.skip-lint != 'true'
      shell: bash
      run: npx biome ci . --error-on-warnings
    - name: Lint YAML
      if: inputs.skip-lint != 'true'
      shell: bash
      run: npm run check:yaml
    - name: Deep Type check
      if: inputs.skip-lint != 'true'
      shell: bash
      run: npm run check:ts
    - name: Squawk migrations
      if: inputs.skip-lint != 'true'
      shell: bash
      run: npm run check:sql
    - name: Cache Playwright browsers
      if: inputs.skip-e2e != 'true'
      id: playwright-cache
      uses: actions/cache@v5
      with:
        path: ~/.cache/ms-playwright
        key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
        restore-keys: |
          playwright-${{ runner.os }}-
    - name: Start Supabase
      shell: bash
      run: |
        set -euo pipefail
        SUPABASE_START_TIMEOUT_SEC="${SUPABASE_START_TIMEOUT_SEC:-600}"
        echo "Node: $(node -v)"
        echo "Supabase CLI: $(supabase --version)"
        echo "Starting local Supabase (timeout ${SUPABASE_START_TIMEOUT_SEC}s)..."
        # Foreground + timeout: backgrounding can leave Docker children running and stall wait.
        timeout --foreground "${SUPABASE_START_TIMEOUT_SEC}" \
          supabase start -x studio,imgproxy,logflare,vector,postgres-meta,edge-runtime,realtime,storage-api
        echo "Supabase start finished."
    - name: Install Playwright
      if: inputs.skip-e2e != 'true'
      shell: bash
      run: |
        set -euo pipefail
        PW_DEPS_TIMEOUT_SEC="${PW_DEPS_TIMEOUT_SEC:-300}"
        PW_BROWSER_ATTEMPT_TIMEOUT_SEC="${PW_BROWSER_ATTEMPT_TIMEOUT_SEC:-600}"
        PW_BROWSER_MAX_ATTEMPTS="${PW_BROWSER_MAX_ATTEMPTS:-3}"
        export PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT="${PLAYWRIGHT_DOWNLOAD_CONNECTION_TIMEOUT:-120000}"
        if [[ "${{ steps.playwright-cache.outputs.cache-hit }}" == "true" ]]; then
          echo "Installing Playwright system deps (browser cache hit, timeout ${PW_DEPS_TIMEOUT_SEC}s)..."
          timeout --foreground "${PW_DEPS_TIMEOUT_SEC}" npx playwright install-deps chromium
        else
          echo "Installing Playwright system deps (timeout ${PW_DEPS_TIMEOUT_SEC}s)..."
          timeout --foreground "${PW_DEPS_TIMEOUT_SEC}" npx playwright install-deps chromium
          echo "Installing Playwright chromium headless shell (${PW_BROWSER_MAX_ATTEMPTS} attempts, ${PW_BROWSER_ATTEMPT_TIMEOUT_SEC}s each)..."
          installed=0
          for attempt in $(seq 1 "${PW_BROWSER_MAX_ATTEMPTS}"); do
            echo "Playwright browser install attempt ${attempt}/${PW_BROWSER_MAX_ATTEMPTS}..."
            if DEBUG=pw:install timeout --foreground "${PW_BROWSER_ATTEMPT_TIMEOUT_SEC}" \
              npx playwright install chromium --only-shell; then
              installed=1
              break
            fi
            echo "Playwright install attempt ${attempt} failed or timed out."
          done
          if [[ "${installed}" -ne 1 ]]; then
            echo "Playwright browser install failed after ${PW_BROWSER_MAX_ATTEMPTS} attempts." >&2
            exit 1
          fi
        fi
        echo "Playwright install finished."
    - name: Load Supabase env
      shell: bash
      run: |
        supabase status -o json > /tmp/sb-status.json
        # Extract DB vars once, then write to both .env.local and GITHUB_ENV
        DB_VARS=$(jq -r '
          "SUPABASE_URL=\(.API_URL // "")",
          "SUPABASE_PUBLISHABLE_KEY=\(.ANON_KEY // "")",
          "SUPABASE_SECRET_KEY=\(.SERVICE_ROLE_KEY // "")",
          "DATABASE_URL=\(.DB_URL // "")"
        ' /tmp/sb-status.json)
        INVALID_DB_VARS=0
        DB_VARS_NONEMPTY_LINES=0
        declare -A DB_VARS_SEEN_KEYS=()
        while IFS= read -r LINE; do
          [[ -z "$LINE" ]] && continue
          DB_VARS_NONEMPTY_LINES=$((DB_VARS_NONEMPTY_LINES + 1))
          if [[ "$LINE" != *"="* ]]; then
            echo "Error: Supabase env var line is malformed (expected KEY=VALUE): $LINE" >&2
            INVALID_DB_VARS=1
            continue
          fi
          KEY="${LINE%%=*}"
          VALUE="${LINE#*=}"
          DB_VARS_SEEN_KEYS["$KEY"]=1
          VALUE_TRIMMED="${VALUE//[[:space:]]/}"
          if [[ -z "$VALUE_TRIMMED" || "$VALUE" == "null" ]]; then
            echo "Error: Supabase status did not provide a valid value for $KEY (got '$VALUE')." >&2
            INVALID_DB_VARS=1
          fi
        done <<< "$DB_VARS"
        for KEY in SUPABASE_URL SUPABASE_PUBLISHABLE_KEY SUPABASE_SECRET_KEY DATABASE_URL; do
          if [[ -z "${DB_VARS_SEEN_KEYS[$KEY]:-}" ]]; then
            echo "Error: Supabase env var $KEY was not produced by jq." >&2
            INVALID_DB_VARS=1
          fi
        done
        if [[ "$DB_VARS_NONEMPTY_LINES" -eq 0 ]]; then
          echo "Error: jq produced no Supabase env vars." >&2
          INVALID_DB_VARS=1
        fi
        if [[ "$INVALID_DB_VARS" -ne 0 ]]; then
          echo "Error: Refusing to export Supabase env vars with null/empty values." >&2
          exit 1
        fi
        # CI only needs these values to exist (Astro prerender runs middleware during build).
        # Real production values live in Vercel env.
        STATIC_VARS=$'UNSUBSCRIBE_TOKEN_SECRET=ci-unsubscribe-secret\nVERCEL_URL=http://localhost:4322\nTWILIO_ACCOUNT_SID=AC00000000000000000000000000000000\nTWILIO_AUTH_TOKEN=ci-twilio-auth-token\nTWILIO_PHONE_NUMBER=+15555550100\nTWILIO_VERIFY_SERVICE_SID=VA00000000000000000000000000000000\nAWS_ACCESS_KEY_ID=AKIAIOSFODNN7EXAMPLE\nAWS_SECRET_ACCESS_KEY=ci-dummy-secret\nAWS_REGION=us-east-1\nEMAIL_FROM=ci@example.com\nMASSIVE_API_KEY=ci-massive-api-key\nFINNHUB_API_KEY=ci-finnhub-api-key'
        printf '%s\n%s\n' "$DB_VARS" "$STATIC_VARS" > .env.local
        printf '%s\n%s\n' "$DB_VARS" "$STATIC_VARS" >> $GITHUB_ENV
    - name: Test
      shell: bash
      run: npm run test:ci
    - name: E2E tests
      if: inputs.skip-e2e != 'true'
      shell: bash
      run: npm run test:e2e
    - name: Build application
      shell: bash
      run: npm run build
      env:
        # When deploy workflow passes production-site-url, Astro bakes it into prerendered pages, sitemap, canonicals, and OG/JSON-LD (replacing localhost from STATIC_VARS).
        VERCEL_PROJECT_PRODUCTION_URL: ${{ inputs.production-site-url }}
        # Dummy Massive/Finnhub keys; skip live vendor HTTP during prerender (see vendor-fetch.ts).
        SKIP_VENDOR_HTTP_IN_TEST: "1"
