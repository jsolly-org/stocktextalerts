name: Run CI
description: Shared CI steps (lint, typecheck, Supabase, test, build)

runs:
  using: composite
  steps:
    - name: Guard Supabase migration history
      shell: bash
      run: |
        set -euo pipefail

        event_name="${GITHUB_EVENT_NAME:-}"
        event_path="${GITHUB_EVENT_PATH:-}"

        if [[ -z "$event_path" || ! -f "$event_path" ]]; then
          echo "Skipping migration guard: missing GITHUB_EVENT_PATH."
          exit 0
        fi

        if [[ "$event_name" != "pull_request" ]]; then
          echo "Skipping migration guard for event: $event_name"
          exit 0
        fi

        base_sha="$(jq -r '.pull_request.base.sha // empty' "$event_path")"
        head_sha="$(jq -r '.pull_request.head.sha // empty' "$event_path")"

        if [[ -z "$base_sha" || -z "$head_sha" ]]; then
          echo "Skipping migration guard: could not determine diff range."
          exit 0
        fi

        if [[ "$base_sha" =~ ^0+$ ]]; then
          echo "Skipping migration guard for initial push with no previous SHA."
          exit 0
        fi

        # Ensure both diff endpoints exist locally even with shallow checkout.
        git fetch --no-tags --depth=1 origin "$base_sha" || true
        git fetch --no-tags --depth=1 origin "$head_sha" || true

        if ! git cat-file -e "$base_sha^{commit}" 2>/dev/null; then
          echo "Skipping migration guard: base SHA $base_sha is unavailable."
          exit 0
        fi
        if ! git cat-file -e "$head_sha^{commit}" 2>/dev/null; then
          echo "Skipping migration guard: head SHA $head_sha is unavailable."
          exit 0
        fi

        migration_changes="$(git diff --name-status "$base_sha" "$head_sha" -- supabase/migrations)"

        if [[ -z "$migration_changes" ]]; then
          echo "Migration guard: no changes in supabase/migrations."
          exit 0
        fi

        invalid_changes=0
        while IFS=$'\t' read -r status path extra; do
          [[ -z "$status" ]] && continue
          case "$status" in
            A)
              if [[ ! "$path" =~ ^supabase/migrations/[0-9]{14}_.+\.sql$ ]]; then
                echo "Invalid migration addition: $path"
                echo "New migration files must match supabase/migrations/<14-digit-timestamp>_<name>.sql"
                invalid_changes=1
              fi
              ;;
            *)
              if [[ -n "${extra:-}" ]]; then
                echo "Invalid migration history change: $status $path -> $extra"
              else
                echo "Invalid migration history change: $status $path"
              fi
              invalid_changes=1
              ;;
          esac
        done <<< "$migration_changes"

        if [[ "$invalid_changes" -ne 0 ]]; then
          echo ""
          echo "Migration guard failed."
          echo "Existing migration files are immutable once committed."
          echo "Only add new migration files via: supabase migration new <name>"
          exit 1
        fi

        echo "Migration guard passed."

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: npm
        cache-dependency-path: package-lock.json
    - name: Install dependencies
      shell: bash
      run: npm ci
    - name: Setup Supabase CLI
      uses: supabase/setup-cli@v1
      with:
        version: v2.75.0
    - name: Run Biome
      shell: bash
      run: npx biome ci .
    - name: Deep Type check
      shell: bash
      run: npm run check:ts
    - name: Start Supabase
      shell: bash
      run: supabase start -x studio,imgproxy,logflare,vector,postgres-meta,edge-runtime,realtime,storage-api
    - name: Load Supabase env
      shell: bash
      run: |
        supabase status -o json > /tmp/sb-status.json
        # Extract DB vars once, then write to both .env.local and GITHUB_ENV
        DB_VARS=$(jq -r '
          "SUPABASE_URL=\(.API_URL // "")",
          "SUPABASE_PUBLISHABLE_KEY=\(.ANON_KEY // "")",
          "SUPABASE_SECRET_KEY=\(.SERVICE_ROLE_KEY // "")",
          "DATABASE_URL=\(.DB_URL // "")"
        ' /tmp/sb-status.json)
        INVALID_DB_VARS=0
        DB_VARS_NONEMPTY_LINES=0
        declare -A DB_VARS_SEEN_KEYS=()
        while IFS= read -r LINE; do
          [[ -z "$LINE" ]] && continue
          DB_VARS_NONEMPTY_LINES=$((DB_VARS_NONEMPTY_LINES + 1))
          if [[ "$LINE" != *"="* ]]; then
            echo "Error: Supabase env var line is malformed (expected KEY=VALUE): $LINE" >&2
            INVALID_DB_VARS=1
            continue
          fi
          KEY="${LINE%%=*}"
          VALUE="${LINE#*=}"
          DB_VARS_SEEN_KEYS["$KEY"]=1
          VALUE_TRIMMED="${VALUE//[[:space:]]/}"
          if [[ -z "$VALUE_TRIMMED" || "$VALUE" == "null" ]]; then
            echo "Error: Supabase status did not provide a valid value for $KEY (got '$VALUE')." >&2
            INVALID_DB_VARS=1
          fi
        done <<< "$DB_VARS"
        for KEY in SUPABASE_URL SUPABASE_PUBLISHABLE_KEY SUPABASE_SECRET_KEY DATABASE_URL; do
          if [[ -z "${DB_VARS_SEEN_KEYS[$KEY]:-}" ]]; then
            echo "Error: Supabase env var $KEY was not produced by jq." >&2
            INVALID_DB_VARS=1
          fi
        done
        if [[ "$DB_VARS_NONEMPTY_LINES" -eq 0 ]]; then
          echo "Error: jq produced no Supabase env vars." >&2
          INVALID_DB_VARS=1
        fi
        if [[ "$INVALID_DB_VARS" -ne 0 ]]; then
          echo "Error: Refusing to export Supabase env vars with null/empty values." >&2
          exit 1
        fi
        # CI only needs these values to exist (Astro prerender runs middleware during build).
        # Real production values live in Vercel env.
        STATIC_VARS=$'CRON_SECRET=ci-cron-secret\nVERCEL_URL=http://localhost:4321\nTWILIO_ACCOUNT_SID=AC00000000000000000000000000000000\nTWILIO_AUTH_TOKEN=ci-twilio-auth-token\nTWILIO_PHONE_NUMBER=+15555550100\nTWILIO_VERIFY_SERVICE_SID=VA00000000000000000000000000000000\nRESEND_API_KEY=re_ci_dummy_key\nEMAIL_FROM=ci@example.com\nFINNHUB_API_KEY=ci-finnhub-api-key'
        printf '%s\n%s\n' "$DB_VARS" "$STATIC_VARS" > .env.local
        printf '%s\n%s\n' "$DB_VARS" "$STATIC_VARS" >> $GITHUB_ENV
    - name: Test
      shell: bash
      run: npm run test:ci
    - name: Build application
      shell: bash
      run: npm run build
