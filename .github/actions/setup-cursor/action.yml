name: Setup Cursor CLI
description: Install Cursor CLI and configure git identity.

inputs:
  git_name:
    description: Git user.name for commits
    required: false
    default: Cursor Agent
  git_email:
    description: Git user.email for commits
    required: false
    default: cursoragent@cursor.com

runs:
  using: composite
  steps:
    - name: Install Cursor CLI
      shell: bash
      run: |
        # Per Cursor docs: https://cursor.com/install
        # Supply-chain risk: piping a remote script to bash. We accept this for the official
        # installer because it runs in an ephemeral GitHub Actions runner. Cursor does not
        # currently publish checksums or versioned release artifacts.
        curl https://cursor.com/install -fsS | bash
        # Cursor installer location has varied across releases; expose both known bins.
        echo "$HOME/.cursor/bin" >> $GITHUB_PATH
        echo "$HOME/.local/bin" >> $GITHUB_PATH
        if [ -x "$HOME/.local/bin/agent" ] && [ ! -x "$HOME/.cursor/bin/agent" ]; then
          mkdir -p "$HOME/.cursor/bin"
          ln -sf "$HOME/.local/bin/agent" "$HOME/.cursor/bin/agent"
        fi
        export PATH="$HOME/.cursor/bin:$HOME/.local/bin:$PATH"
        command -v agent >/dev/null 2>&1 || {
          echo "agent binary not found after Cursor install"
          ls -la "$HOME/.cursor/bin" "$HOME/.local/bin" 2>/dev/null || true
          exit 1
        }
    - name: Configure git identity
      shell: bash
      run: |
        git config user.name "${{ inputs.git_name }}"
        git config user.email "${{ inputs.git_email }}"
