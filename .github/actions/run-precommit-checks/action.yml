name: Run pre-commit checks
description: Run npm install, Biome, and TypeScript checks with logs.

runs:
  using: composite
  steps:
    - name: Run pre-commit checks
      shell: bash
      run: |
        set -o pipefail

        run_cmd() {
          local label="$1"
          shift
          echo "::group::$label"
          "$@" 2>&1 | tee "precommit-$label.log"
          local rc="${PIPESTATUS[0]}"
          echo "::endgroup::"
          return "$rc"
        }

        # Skip npm ci if node_modules already exists (caller already ran it)
        if [ ! -d node_modules ]; then
          run_cmd "npm-ci" npm ci || exit $?
        else
          echo "::group::npm-ci"
          echo "Skipped — node_modules already present."
          echo "::endgroup::"
        fi
        # Apply safe Biome fixes (format + organize imports) so agent runs don't fail on trivial issues.
        run_cmd "biome-fix" npm run check:biome || exit $?
        # Keep agent pushes strict: block on any unresolved Biome warning or error.
        run_cmd "biome-ci" npx biome ci . --error-on-warnings || exit $?
        run_cmd "check-yaml" npm run check:yaml || exit $?
        run_cmd "check-ts" npm run check:ts || exit $?
