name: Agent run queue and rate limit
description: Enforce per-PR run queue and rate limit for the agent workflow.

inputs:
  repo:
    description: GitHub repo in owner/name form
    required: true
  pr_number:
    description: PR number
    required: true
  workflow_file:
    description: Workflow file name
    required: true
  run_id:
    description: Current workflow run ID
    required: true
  internal_marker:
    description: Marker for internal workflow comments
    required: true
  gh_token:
    description: GitHub token for API calls
    required: true

runs:
  using: composite
  steps:
    - name: Wait for earlier agent runs (per PR)
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        REPO: ${{ inputs.repo }}
        PR_NUMBER: ${{ inputs.pr_number }}
        CURRENT_RUN_ID: ${{ inputs.run_id }}
        WORKFLOW_FILE: ${{ inputs.workflow_file }}
      run: |
        # GitHub Actions concurrency only keeps one pending run per group; additional triggers
        # cancel older pending runs. We want strict FIFO per PR instead, so we implement an
        # explicit queue by waiting until all *earlier* runs for this PR complete.

        WORKFLOW_FILE_NAME="${WORKFLOW_FILE##*/}"

        PR_MARKER="pr-$PR_NUMBER"
        START_TS=$(date +%s)
        MAX_WAIT_SECONDS=$((60 * 60)) # 1 hour

        while true; do
          NOW_TS=$(date +%s)
          ELAPSED=$((NOW_TS - START_TS))
          if [[ "$ELAPSED" -ge "$MAX_WAIT_SECONDS" ]]; then
            echo "Error: Timed out waiting for earlier agent runs for $PR_MARKER"
            exit 1
          fi

          RUNS_JSON=$(gh api "repos/$REPO/actions/workflows/$WORKFLOW_FILE_NAME/runs?per_page=100" 2>&1) || true

          # Parse blockers from the API response. If the API call or jq parsing fails
          # (transient rate-limit, malformed response), retry on the next loop iteration
          # instead of killing the step. This avoids silent failures from pipefail.
          BLOCKERS=""
          BLOCKER_COUNT=""
          if [[ -n "$RUNS_JSON" ]]; then
            BLOCKERS=$(echo "$RUNS_JSON" | jq --arg marker "$PR_MARKER" --argjson current "$CURRENT_RUN_ID" -r '
              [.workflow_runs[]
                | select((.display_title // "") | contains($marker))
                | select((.id // 0) < $current)
                | select((.status // "") != "completed")
                | {id, status, html_url}
              ]
              | sort_by(.id)
            ' 2>/dev/null) || true
            BLOCKER_COUNT=$(echo "$BLOCKERS" | jq 'length' 2>/dev/null) || true
          fi

          if [[ -z "$BLOCKER_COUNT" ]] || ! [[ "$BLOCKER_COUNT" =~ ^[0-9]+$ ]]; then
            echo "Warning: Could not parse workflow runs response; will retry in 20s."
            sleep 20
            continue
          fi
          if [[ "$BLOCKER_COUNT" -eq 0 ]]; then
            echo "No earlier agent runs for $PR_MARKER are active; proceeding."
            exit 0
          fi

          OLDEST=$(echo "$BLOCKERS" | jq -r '.[0].id')
          echo "Waiting for $BLOCKER_COUNT earlier agent run(s) for $PR_MARKER to complete (oldest blocking run_id=$OLDEST)."
          sleep 20
        done

    - name: Rate limit check
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.gh_token }}
        REPO: ${{ inputs.repo }}
        PR_NUMBER: ${{ inputs.pr_number }}
        WORKFLOW_FILE: ${{ inputs.workflow_file }}
        INTERNAL_MARKER: ${{ inputs.internal_marker }}
      run: |
        NOW=$(date -u +%s)
        LIMIT=$((NOW - 3600))

        WORKFLOW_FILE_NAME="${WORKFLOW_FILE##*/}"

        # Query workflow runs with error handling - if permissions are insufficient, skip rate limiting
        RUNS_JSON=$(gh api "repos/$REPO/actions/workflows/$WORKFLOW_FILE_NAME/runs?per_page=100" 2>&1)
        RUNS_EXIT=$?

        if [[ $RUNS_EXIT -ne 0 ]]; then
          echo "Warning: Could not query workflow runs for $WORKFLOW_FILE_NAME (permissions may be insufficient), skipping rate limit check"
          echo "API error: $RUNS_JSON"
          exit 0
        fi

        # Filter runs from the last hour
        # For issue_comment-triggered runs, pull_requests is empty, so we need to check head_sha associations
        RECENT_RUNS=$(echo "$RUNS_JSON" | jq --argjson limit "$LIMIT" \
          '[.workflow_runs[] | select(.created_at | fromdateiso8601 >= $limit)]' 2>&1)

        RUN_COUNT=$(echo "$RECENT_RUNS" | jq 'length' 2>/dev/null)
        if ! [[ "$RUN_COUNT" =~ ^[0-9]+$ ]]; then
          echo "Warning: Could not determine run count, skipping rate limit check"
          exit 0
        fi

        # Count runs matching this PR (via pull_requests field or commits API fallback)
        COUNT=0
        for ((i=0; i<RUN_COUNT; i++)); do
          RUN=$(echo "$RECENT_RUNS" | jq ".[$i]")

          # Try the pull_requests field first (works for pull_request-triggered runs)
          if echo "$RUN" | jq -e --arg pr "$PR_NUMBER" '(.pull_requests // []) | any(.number == ($pr|tonumber))' > /dev/null 2>&1; then
            COUNT=$((COUNT + 1))
            if [[ "$COUNT" -ge 60 ]]; then
              break
            fi
            continue
          fi

          # Fallback: check head_sha via commits API (handles issue_comment-triggered runs)
          HEAD_SHA=$(echo "$RUN" | jq -r '.head_sha // empty')
          [[ -z "$HEAD_SHA" ]] && continue

          if gh api "repos/$REPO/commits/$HEAD_SHA/pulls" 2>/dev/null | jq -e --arg pr "$PR_NUMBER" 'any(.number == ($pr|tonumber))' > /dev/null 2>&1; then
            COUNT=$((COUNT + 1))
            if [[ "$COUNT" -ge 60 ]]; then
              break
            fi
          fi
        done

        if [[ "$COUNT" -ge 60 ]]; then
          RUN_URL="https://github.com/$REPO/actions/runs/${{ inputs.run_id }}"
          gh pr comment "$PR_NUMBER" \
            --body "Rate limit reached: max 60 runs per hour. [Workflow run]($RUN_URL) $INTERNAL_MARKER"
          exit 0
        fi
