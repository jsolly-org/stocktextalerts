name: Auto Merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    runs-on: blacksmith-4vcpu-ubuntu-2404
    # Gate at the job level so events on PRs without the ship-auto-merge label skip
    # with ZERO billed runner minutes, instead of spinning a runner just to `gh pr view`
    # the labels and exit. The label lives in the webhook payload, so no API round-trip.
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository &&
      contains(github.event.pull_request.labels.*.name, 'ship-auto-merge')
    steps:
      - name: Enable auto-merge when orchestrated
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: gh pr merge --auto --squash --repo "$GITHUB_REPOSITORY" "$PR_NUMBER"
