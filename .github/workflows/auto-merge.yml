name: Auto Merge

on:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review
      - labeled

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      github.event.pull_request.draft == false &&
      github.event.pull_request.head.repo.full_name == github.repository
    steps:
      - name: Enable auto-merge when orchestrated
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          labels=$(gh pr view "$PR_NUMBER" --json labels -q '.labels[].name')
          if ! printf '%s\n' "$labels" | grep -qx 'ship-auto-merge'; then
            echo "PR lacks ship-auto-merge label; skipping auto-merge"
            exit 0
          fi
          gh pr merge --auto --squash "$PR_NUMBER"
