# Runs live data-provider API tests (Massive + Finnhub) during US market hours
# when snapshot data is guaranteed to be fresh. Mon-Fri only.
name: "Live Provider API Tests"

on:
  schedule:
    # 4 PM UTC = 12 PM ET — solidly mid-session (market open 9:30 AM – 4 PM ET)
    - cron: "0 16 * * 1-5"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  live-data-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2
        with:
          version: 2.98.2

      - name: Install dependencies and start Supabase
        run: |
          supabase start -x studio,imgproxy,logflare,vector,postgres-meta,edge-runtime,realtime,storage-api &
          SB_PID=$!
          npm ci
          wait $SB_PID

      - name: Load Supabase env and provider secrets
        run: |
          supabase status -o json > /tmp/sb-status.json
          DB_VARS=$(jq -r '
            "SUPABASE_URL=\(.API_URL // "")",
            "SUPABASE_PUBLISHABLE_KEY=\(.ANON_KEY // "")",
            "SUPABASE_SECRET_KEY=\(.SERVICE_ROLE_KEY // "")",
            "DATABASE_URL=\(.DB_URL // "")"
          ' /tmp/sb-status.json)

          {
            echo "$DB_VARS"
            echo "UNSUBSCRIBE_TOKEN_SECRET=ci-unsubscribe-secret"
            echo "VERCEL_URL=http://localhost:4321"
            echo "MASSIVE_API_KEY=$MASSIVE_API_KEY"
            echo "FINNHUB_API_KEY=$FINNHUB_API_KEY"
          } | tee .env.local >> "$GITHUB_ENV"
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Run live provider tests
        run: npm run test:live:data

  notify-failure:
    runs-on: ubuntu-latest
    needs: live-data-tests
    if: failure()
    permissions:
      id-token: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: main

      - name: Check if previous run also failed
        id: dedup
        run: |
          PREV=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/live-provider-tests.yml/runs?per_page=2&status=completed" \
            | jq -r '.workflow_runs[1].conclusion')
          if [ "$PREV" = "failure" ]; then
            echo "Previous run also failed — skipping alert-hub notification"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        if: steps.dedup.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          role-to-assume: arn:aws:iam::730335616323:role/GitHubActionsDeploymentRole
          aws-region: us-east-1

      - name: Publish failure alert via alert-hub
        if: steps.dedup.outputs.skip != 'true'
        run: bash scripts/ci/publish-live-test-failure-alert.sh
        env:
          GITHUB_SERVER_URL: ${{ github.server_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
