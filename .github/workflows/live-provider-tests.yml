# Runs live data-provider API tests (Massive + Finnhub) during US market hours
# when snapshot data is guaranteed to be fresh. Mon-Fri only.
name: "Live Provider API Tests"

on:
  schedule:
    # 4 PM UTC = 12 PM ET — solidly mid-session (market open 9:30 AM – 4 PM ET)
    - cron: "0 16 * * 1-5"
  workflow_dispatch:

jobs:
  live-data-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v2.0.0
        with:
          version: 2.76.9

      - name: Install dependencies and start Supabase
        run: |
          supabase start -x studio,imgproxy,logflare,vector,postgres-meta,edge-runtime,realtime,storage-api &
          SB_PID=$!
          npm ci
          wait $SB_PID

      - name: Load Supabase env and provider secrets
        run: |
          supabase status -o json > /tmp/sb-status.json
          DB_VARS=$(jq -r '
            "SUPABASE_URL=\(.API_URL // "")",
            "SUPABASE_PUBLISHABLE_KEY=\(.ANON_KEY // "")",
            "SUPABASE_SECRET_KEY=\(.SERVICE_ROLE_KEY // "")",
            "DATABASE_URL=\(.DB_URL // "")"
          ' /tmp/sb-status.json)

          {
            echo "$DB_VARS"
            echo "UNSUBSCRIBE_TOKEN_SECRET=ci-unsubscribe-secret"
            echo "VERCEL_URL=http://localhost:4321"
            echo "MASSIVE_API_KEY=$MASSIVE_API_KEY"
            echo "FINNHUB_API_KEY=$FINNHUB_API_KEY"
          } | tee .env.local >> "$GITHUB_ENV"
        env:
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}

      - name: Run live provider tests
        run: npm run test:live:data

  notify-failure:
    runs-on: ubuntu-latest
    needs: live-data-tests
    if: failure()
    steps:
      - name: Check if previous run also failed
        id: dedup
        run: |
          PREV=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "$GITHUB_API_URL/repos/$GITHUB_REPOSITORY/actions/workflows/live-provider-tests.yml/runs?per_page=2&status=completed" \
            | jq -r '.workflow_runs[1].conclusion')
          if [ "$PREV" = "failure" ]; then
            echo "Previous run also failed — skipping SMS"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Send failure SMS via Twilio
        if: steps.dedup.outputs.skip != 'true'
        run: |
          curl -s -X POST \
            "https://api.twilio.com/2010-04-01/Accounts/${TWILIO_ACCOUNT_SID}/Messages.json" \
            -u "${TWILIO_ACCOUNT_SID}:${TWILIO_AUTH_TOKEN}" \
            --data-urlencode "To=${ALERT_PHONE_NUMBER}" \
            --data-urlencode "From=${TWILIO_PHONE_NUMBER}" \
            --data-urlencode "Body=Live Provider Tests failed: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          ALERT_PHONE_NUMBER: ${{ secrets.ALERT_PHONE_NUMBER }}
