# Scheduled nightly job that discovers open PRs with failing CI, merge
# conflicts, or unresolved review comments and uses the Cursor agent to fix
# them automatically. Runs last in the nightly schedule so other workflows'
# PRs exist with CI results.
name: "Nightly: PR Grooming"

on:
  schedule:
    - cron: "0 7 * * *" # 2 AM ET
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

env:
  GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

jobs:
  discover-prs:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    outputs:
      prs: ${{ steps.matrix.outputs.prs }}
    steps:
      - name: Discover problematic PRs
        id: matrix
        run: |
          # Fetch all open PRs
          PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,headRefName \
            --limit 50)

          if [ "$(echo "$PRS" | jq length)" -eq 0 ]; then
            echo "No open PRs found."
            echo 'prs=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          RESULT="[]"

          for ROW in $(echo "$PRS" | jq -c '.[]'); do
            PR_NUMBER=$(echo "$ROW" | jq -r '.number')
            HEAD_REF=$(echo "$ROW" | jq -r '.headRefName')

            # --- Check for failing CI checks ---
            FAILED_CHECKS=$(gh pr checks "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --json name,state \
              --jq '[.[] | select(.state == "FAILURE" and (.name | test("lint|test-and-build")))] | map(.name)' 2>/dev/null || echo "[]")

            # --- Check for merge conflicts ---
            MERGE_STATE=$(gh pr view "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --json mergeStateStatus \
              --jq '.mergeStateStatus' 2>/dev/null || echo "UNKNOWN")

            HAS_CONFLICTS="false"
            if [ "$MERGE_STATE" = "DIRTY" ]; then
              HAS_CONFLICTS="true"
            fi

            # --- Check for unresolved review comments ---
            OWNER="${{ github.repository_owner }}"
            REPO_NAME=$(echo "${{ github.repository }}" | cut -d/ -f2)
            UNRESOLVED_THREAD_QUERY='query($owner:String!,$repo:String!,$prNumber:Int!,$cursor:String){repository(owner:$owner,name:$repo){pullRequest(number:$prNumber){reviewThreads(first:100,after:$cursor){pageInfo{hasNextPage endCursor}nodes{isResolved comments(first:1){nodes{body path author{login}}}}}}}}'

            UNRESOLVED_COUNT=0
            CURSOR=""
            while true; do
              CURSOR_ARG=()
              [[ -n "$CURSOR" ]] && CURSOR_ARG=(-f cursor="$CURSOR")
              THREAD_RESULT=$(gh api graphql \
                -f query="$UNRESOLVED_THREAD_QUERY" \
                -f owner="$OWNER" \
                -f repo="$REPO_NAME" \
                -F prNumber="$PR_NUMBER" \
                "${CURSOR_ARG[@]}" 2>/dev/null) || break

              PAGE_UNRESOLVED=$(echo "$THREAD_RESULT" | jq '[.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false)] | length')
              UNRESOLVED_COUNT=$((UNRESOLVED_COUNT + PAGE_UNRESOLVED))

              HAS_NEXT=$(echo "$THREAD_RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
              [[ "$HAS_NEXT" != "true" ]] && break
              CURSOR=$(echo "$THREAD_RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor')
            done

            HAS_UNRESOLVED="false"
            if [ "$UNRESOLVED_COUNT" -gt 0 ]; then
              HAS_UNRESOLVED="true"
            fi

            # Skip PRs with no problems
            FAILED_COUNT=$(echo "$FAILED_CHECKS" | jq 'length')
            if [ "$FAILED_COUNT" -eq 0 ] && [ "$HAS_CONFLICTS" = "false" ] && [ "$HAS_UNRESOLVED" = "false" ]; then
              echo "PR #$PR_NUMBER: no problems detected, skipping."
              continue
            fi

            # --- Count previous fix attempts via comment marker ---
            ATTEMPT_COUNT=$(gh pr view "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --json comments \
              --jq '[.comments[].body | select(contains("<!-- nightly-pr-grooming-attempt -->"))] | length' 2>/dev/null || echo "0")

            if [ "$ATTEMPT_COUNT" -ge 2 ]; then
              echo "PR #$PR_NUMBER: already has $ATTEMPT_COUNT fix attempts, skipping."
              continue
            fi

            echo "PR #$PR_NUMBER: failedChecks=$FAILED_CHECKS, hasConflicts=$HAS_CONFLICTS, unresolvedComments=$UNRESOLVED_COUNT, attempts=$ATTEMPT_COUNT"

            ENTRY=$(jq -n \
              --argjson number "$PR_NUMBER" \
              --arg headRefName "$HEAD_REF" \
              --argjson failedChecks "$FAILED_CHECKS" \
              --argjson hasConflicts "$HAS_CONFLICTS" \
              --argjson hasUnresolved "$HAS_UNRESOLVED" \
              '{number: $number, headRefName: $headRefName, failedChecks: $failedChecks, hasConflicts: $hasConflicts, hasUnresolved: $hasUnresolved}')

            RESULT=$(echo "$RESULT" | jq --argjson entry "$ENTRY" '. + [$entry]')
          done

          COUNT=$(echo "$RESULT" | jq length)
          echo "Found $COUNT PR(s) needing fixes."
          echo "$RESULT" | jq .

          echo "prs=$(echo "$RESULT" | jq -c .)" >> "$GITHUB_OUTPUT"

  fix-pr:
    needs: discover-prs
    if: ${{ needs.discover-prs.outputs.prs != '[]' && needs.discover-prs.outputs.prs != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pr: ${{ fromJson(needs.discover-prs.outputs.prs) }}
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ matrix.pr.headRefName }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        uses: ./.github/actions/setup-cursor

      - name: Build context for agent
        id: context
        env:
          PR_NUMBER: ${{ matrix.pr.number }}
          FAILED_CHECKS: ${{ toJson(matrix.pr.failedChecks) }}
          HAS_CONFLICTS: ${{ matrix.pr.hasConflicts }}
          HAS_UNRESOLVED: ${{ matrix.pr.hasUnresolved }}
        run: |
          CONTEXT=""

          # --- Failing CI context: fetch failed run logs ---
          FAILED_COUNT=$(echo "$FAILED_CHECKS" | jq 'length')
          if [ "$FAILED_COUNT" -gt 0 ]; then
            echo "Fetching failed CI logs for PR #$PR_NUMBER..."
            HEAD_SHA=$(gh pr view "$PR_NUMBER" \
              --repo "${{ github.repository }}" \
              --json headRefOid \
              --jq '.headRefOid')

            FAILED_RUNS=$(gh run list \
              --repo "${{ github.repository }}" \
              --commit "$HEAD_SHA" \
              --status failure \
              --json databaseId \
              --limit 5)

            LOGS=""
            for RUN_ID in $(echo "$FAILED_RUNS" | jq -r '.[].databaseId'); do
              RUN_LOG=$(gh run view "$RUN_ID" \
                --repo "${{ github.repository }}" \
                --log-failed 2>/dev/null | tail -200 || echo "(could not fetch logs for run $RUN_ID)")
              LOGS="${LOGS}
          --- Run ${RUN_ID} ---
          ${RUN_LOG}
          "
            done

            CONTEXT="${CONTEXT}
          ## Failing CI checks
          The following checks are failing: $(echo "$FAILED_CHECKS" | jq -r 'join(", ")')

          Failed run logs (truncated to 200 lines per run):
          ${LOGS}"
          fi

          # --- Merge conflict context: merge main to surface markers ---
          if [ "$HAS_CONFLICTS" = "true" ]; then
            echo "Merging main to surface conflict markers..."
            git fetch origin main
            git merge origin/main --no-commit --no-ff 2>/dev/null || true

            CONTEXT="${CONTEXT}
          ## Merge conflicts
          This PR has merge conflicts with the main branch. The conflicts have been
          surfaced in the working tree — look for conflict markers (<<<<<<< / ======= / >>>>>>>)
          and resolve them."
          fi

          # --- Unresolved review comments context ---
          if [ "$HAS_UNRESOLVED" = "true" ]; then
            echo "Fetching unresolved review comments for PR #$PR_NUMBER..."
            OWNER="${{ github.repository_owner }}"
            REPO_NAME=$(echo "${{ github.repository }}" | cut -d/ -f2)
            THREAD_QUERY='query($owner:String!,$repo:String!,$prNumber:Int!,$cursor:String){repository(owner:$owner,name:$repo){pullRequest(number:$prNumber){reviewThreads(first:100,after:$cursor){pageInfo{hasNextPage endCursor}nodes{isResolved comments(first:5){nodes{body path line author{login}}}}}}}}'

            COMMENT_LIST=""
            CURSOR=""
            while true; do
              CURSOR_ARG=()
              [[ -n "$CURSOR" ]] && CURSOR_ARG=(-f cursor="$CURSOR")
              THREAD_RESULT=$(gh api graphql \
                -f query="$THREAD_QUERY" \
                -f owner="$OWNER" \
                -f repo="$REPO_NAME" \
                -F prNumber="$PR_NUMBER" \
                "${CURSOR_ARG[@]}" 2>/dev/null) || break

              while IFS= read -r THREAD; do
                [[ -z "$THREAD" ]] && continue
                FILE=$(echo "$THREAD" | jq -r '.comments.nodes[0].path // "(no file)"')
                LINE=$(echo "$THREAD" | jq -r '.comments.nodes[0].line // "?"')
                AUTHOR=$(echo "$THREAD" | jq -r '.comments.nodes[0].author.login // "unknown"')
                BODY=$(echo "$THREAD" | jq -r '[.comments.nodes[].body] | join("\n---\n")' | head -20)
                COMMENT_LIST="${COMMENT_LIST}
          ### ${FILE}:${LINE} (@${AUTHOR})
          ${BODY}
          "
              done < <(echo "$THREAD_RESULT" | jq -c '.data.repository.pullRequest.reviewThreads.nodes[] | select(.isResolved == false)')

              HAS_NEXT=$(echo "$THREAD_RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
              [[ "$HAS_NEXT" != "true" ]] && break
              CURSOR=$(echo "$THREAD_RESULT" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor')
            done

            CONTEXT="${CONTEXT}
          ## Unresolved review comments
          The following review comments need to be addressed:
          ${COMMENT_LIST}"
          fi

          # Save context to file to avoid shell escaping issues
          printf '%s' "$CONTEXT" > /tmp/pr-grooming-context.txt

      - name: Run agent
        env:
          MODEL: ${{ vars.AGENT_MODEL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          PR_NUMBER: ${{ matrix.pr.number }}
        run: |
          CONTEXT=$(cat /tmp/pr-grooming-context.txt)

          agent -p "You are operating in a GitHub Actions runner. Git and the \`gh\` CLI are available and authenticated.

          # Goal
          Fix the problems on PR #${PR_NUMBER} so that CI passes, merge conflicts are resolved, and/or unresolved review comments are addressed.

          ${CONTEXT}

          # Guidelines
          - Read \`AGENTS.md\` and the \`.agents/\` directory for project conventions and guidelines.
          - Leave all changes uncommitted. The workflow will handle commit, push, and PR creation.
          - Do not create issues or PRs yourself.
          - Focus only on fixing the identified problems — do not make unrelated changes.
          " --force --model "$MODEL" --output-format=text

      - name: Drop workflow file edits
        run: |
          if git diff --name-only -- .github/workflows .github/actions | grep -q .; then
            echo "Reverting workflow and action file edits from agent output."
            git restore --staged --worktree -- .github/workflows .github/actions
          fi

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit checks (lint + type-check)
        if: steps.changes.outputs.has_changes == 'true'
        id: precommit_checks
        continue-on-error: true
        uses: ./.github/actions/run-precommit-checks

      - name: Auto-fix lint/type errors
        if: steps.changes.outputs.has_changes == 'true' && steps.precommit_checks.outcome == 'failure'
        id: autofix
        continue-on-error: true
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          MAX_FIX_ATTEMPTS: 2
        run: |
          for attempt in $(seq 1 "$MAX_FIX_ATTEMPTS"); do
            echo "::group::Fix attempt $attempt/$MAX_FIX_ATTEMPTS"

            ERRORS=""
            for log in precommit-*.log; do
              [[ -f "$log" ]] || continue
              ERRORS+="--- $log ---"$'\n'
              ERRORS+="$(tail -50 "$log")"$'\n\n'
            done

            FIX_PROMPT="$(cat <<FIXEOF
            ---SYSTEM_INSTRUCTIONS_START---
            You are running in GitHub Actions. Your previous code changes failed lint and/or type checks.

            Hard rules:
            - Do NOT create commits.
            - Do NOT push.
            - Do NOT use GitHub APIs or post comments/reactions (no \`gh\`).

            Fix the errors below. Only modify the files that have errors — do not touch unrelated code.

            --- ERRORS ---
            $ERRORS
            ---SYSTEM_INSTRUCTIONS_END---
          FIXEOF
            )"

            agent --print --model "${{ vars.AGENT_MODEL }}" --output-format=text --force "$FIX_PROMPT" 2>&1 | tail -100 || true

            set -o pipefail
            run_cmd() {
              local label="$1"; shift
              echo "::group::$label"
              "$@" 2>&1 | tee "precommit-$label.log"
              local rc="${PIPESTATUS[0]}"
              echo "::endgroup::"
              return "$rc"
            }

            CHECKS_PASSED=true
            run_cmd "npm-ci" npm ci || { CHECKS_PASSED=false; }
            if [[ "$CHECKS_PASSED" == "true" ]]; then
              run_cmd "biome-fix" npm run check:biome || { CHECKS_PASSED=false; }
            fi
            if [[ "$CHECKS_PASSED" == "true" ]]; then
              run_cmd "biome-ci" npx biome ci . --error-on-warnings || { CHECKS_PASSED=false; }
            fi
            if [[ "$CHECKS_PASSED" == "true" ]]; then
              run_cmd "check-ts" npm run check:ts || { CHECKS_PASSED=false; }
            fi

            echo "::endgroup::"

            if [[ "$CHECKS_PASSED" == "true" ]]; then
              echo "Fix attempt $attempt succeeded."
              echo "fixed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Fix attempt $attempt failed; checks still failing."
          done

          echo "All $MAX_FIX_ATTEMPTS fix attempts exhausted."
          echo "fixed=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true' && (steps.precommit_checks.outcome == 'success' || steps.autofix.outputs.fixed == 'true')
        env:
          GH_AGENT_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          HEAD_REF: ${{ matrix.pr.headRefName }}
          PR_NUMBER: ${{ matrix.pr.number }}
        run: |
          REMOTE_URL="https://x-access-token:${GH_AGENT_TOKEN}@github.com/${{ github.repository }}.git"

          git add -A
          git commit -m "fix(nightly): auto-fix PR #${PR_NUMBER} — $(date +%Y-%m-%d)"

          MAX_PUSH_ATTEMPTS=3
          for attempt in $(seq 1 "$MAX_PUSH_ATTEMPTS"); do
            LOCAL_TIP="$(git rev-parse HEAD)"
            git fetch "$REMOTE_URL" "$HEAD_REF"

            if ! git rebase FETCH_HEAD; then
              echo "##[warning]Rebase failed, retrying with auto-resolution."
              git rebase --abort || true
              if ! git rebase -X theirs FETCH_HEAD; then
                echo "##[warning]Rebase with auto-resolution failed. Falling back to reset + cherry-pick."
                git rebase --abort || true
                git reset --hard FETCH_HEAD
                if ! git cherry-pick -X theirs "$LOCAL_TIP"; then
                  echo "##[error]Failed to replay local commit."
                  git cherry-pick --abort || true
                  exit 1
                fi
              fi
            fi

            if git push "$REMOTE_URL" HEAD:"$HEAD_REF" 2> push-error.log; then
              break
            fi

            echo "##[warning]Push attempt $attempt/$MAX_PUSH_ATTEMPTS failed."
            cat push-error.log || true

            if [ "$attempt" = "$MAX_PUSH_ATTEMPTS" ]; then
              echo "##[error]Failed to push after $MAX_PUSH_ATTEMPTS attempts."
              exit 1
            fi
          done

      - name: Post fix-attempt comment
        if: steps.changes.outputs.has_changes == 'true' && (steps.precommit_checks.outcome == 'success' || steps.autofix.outputs.fixed == 'true')
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          PR_NUMBER: ${{ matrix.pr.number }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          gh pr comment "$PR_NUMBER" --body "$(cat <<EOF
          ## Nightly PR Grooming: Fix applied

          The nightly PR grooming workflow detected issues and pushed a fix commit.

          [Workflow run]($RUN_URL)

          ---
          *Auto-generated by the nightly-pr-grooming workflow.*
          <!-- nightly-pr-grooming-attempt -->
          EOF
          )"
