# Scheduled nightly job that uses the Cursor agent to find and fix performance
# issues such as slow queries, bundle size problems, and unnecessary re-renders.
# Opens a PR with the optimizations.
name: "Nightly: Performance"

on:
  schedule:
    - cron: "0 5 * * *" # 12 AM ET
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

jobs:
  performance:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check for existing nightly PR
        id: check-pr
        run: |
          EXISTING_PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --label "nightly" \
            --search "perf(nightly): performance improvements" \
            --state open \
            --json number,url \
            --limit 1)
          if [ "$(echo "$EXISTING_PR" | jq length)" -gt 0 ]; then
            PR_URL=$(echo "$EXISTING_PR" | jq -r '.[0].url')
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Existing nightly performance PR found: $PR_URL"
            gh pr comment "$PR_URL" --body "Nightly run skipped — this PR is still open."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Checkout repository
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        if: steps.check-pr.outputs.skip != 'true'
        uses: ./.github/actions/setup-cursor

      - name: Create branch
        if: steps.check-pr.outputs.skip != 'true'
        run: git checkout -b "nightly/performance-$(date +%Y-%m-%d)-${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Run agent
        if: steps.check-pr.outputs.skip != 'true'
        env:
          MODEL: ${{ vars.AGENT_MODEL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          agent -p "You are operating in a GitHub Actions runner. Git and the \`gh\` CLI are available and authenticated.

          # Goal
          Find and fix performance issues — slow queries, bundle size problems, unnecessary re-renders, and opportunities to use static/precomputed values.

          # Guidelines
          - Read \`AGENTS.md\` and the \`.agents/\` directory for project conventions and guidelines.
          - Leave all changes uncommitted. The workflow will handle commit, push, and PR creation.
          - Do not create issues or PRs yourself.
          " --force --model "$MODEL" --output-format=text

      - name: Drop workflow file edits
        if: steps.check-pr.outputs.skip != 'true'
        run: |
          if git diff --name-only -- .github/workflows .github/actions | grep -q .; then
            echo "Reverting workflow and action file edits from agent output."
            git restore --staged --worktree -- .github/workflows .github/actions
          fi

      - name: Check for changes
        if: steps.check-pr.outputs.skip != 'true'
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit checks (lint + type-check)
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        id: precommit_checks
        continue-on-error: true
        uses: ./.github/actions/run-precommit-checks

      - name: Auto-fix lint/type errors
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true' && steps.precommit_checks.outcome == 'failure'
        id: autofix
        continue-on-error: true
        uses: ./.github/actions/autofix-lint-type-errors
        with:
          cursor_api_key: ${{ secrets.CURSOR_API_KEY }}
          agent_model: ${{ vars.AGENT_MODEL }}
          max_fix_attempts: "2"

      - name: Commit and push
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true' && (steps.precommit_checks.outcome == 'success' || steps.autofix.outputs.fixed == 'true')
        run: |
          git add -A
          git commit -m "perf(nightly): performance improvements — $(date +%Y-%m-%d)"
          git push origin HEAD

      - name: Create pull request
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true' && (steps.precommit_checks.outcome == 'success' || steps.autofix.outputs.fixed == 'true')
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          gh pr create \
            --title "perf(nightly): performance improvements — $(date +%Y-%m-%d)" \
            --label "bot-generated" \
            --body "$(cat <<'EOF'
          ## Summary
          Automated performance improvements — query optimization, bundle size reduction, rendering fixes, and static opportunity conversion.

          ---
          *Auto-generated by the nightly-performance workflow.*
          EOF
          )"
