# Automatically enables squash-merge for PRs labeled "bot-generated" once all
# required status checks pass. Covers nightly agent PRs (code-quality, security,
# performance) and post-push follow-up PRs.
name: Auto-merge bot PRs

on:
  pull_request:
    types: [opened, labeled]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: >-
      contains(github.event.pull_request.labels.*.name, 'bot-generated')
      && github.actor != 'nektos/act'
    steps:
      - uses: actions/checkout@v4
      - name: Enable auto-merge for bot PR
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash
        env:
          # Use GH_AGENT_TOKEN so auto-merge works on PRs that modify workflow files (default GITHUB_TOKEN lacks workflows permission)
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
