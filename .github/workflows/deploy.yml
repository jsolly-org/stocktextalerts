# Deploys the site to Supabase on every push to main. Runs CI checks, links
# the Supabase project, verifies there is no migration drift, and pushes
# database migrations to production.
name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'nektos/act' }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Require production site URL for prebuilt deploy
        run: |
          if [[ -z "${{ vars.PRODUCTION_SITE_URL }}" ]]; then
            echo "::error::PRODUCTION_SITE_URL repo variable is not set. Set it (e.g. https://stocktextalerts.com) so the prebuilt build bakes the correct domain into prerendered pages, sitemap, canonicals, and OG/JSON-LD."
            exit 1
          fi
      - uses: ./.github/actions/run-ci
        with:
          production-site-url: ${{ vars.PRODUCTION_SITE_URL }}
      - name: E2E tests
        run: npm run test:e2e
      - name: Load live-test secrets
        run: |
          cat > .env.local <<EOF
          SUPABASE_URL=$SUPABASE_URL
          SUPABASE_PUBLISHABLE_KEY=$SUPABASE_PUBLISHABLE_KEY
          SUPABASE_SECRET_KEY=$SUPABASE_SECRET_KEY
          DATABASE_URL=$DATABASE_URL
          CRON_SECRET=ci-cron-secret
          VERCEL_URL=http://localhost:4321
          TWILIO_ACCOUNT_SID=$TWILIO_ACCOUNT_SID
          TWILIO_AUTH_TOKEN=$TWILIO_AUTH_TOKEN
          TWILIO_PHONE_NUMBER=$TWILIO_PHONE_NUMBER
          TWILIO_VERIFY_SERVICE_SID=$TWILIO_VERIFY_SERVICE_SID
          RESEND_API_KEY=$RESEND_API_KEY
          EMAIL_FROM=$EMAIL_FROM
          MASSIVE_API_KEY=$MASSIVE_API_KEY
          FINNHUB_API_KEY=$FINNHUB_API_KEY
          XAI_API_KEY=$XAI_API_KEY
          EOF
          cat .env.local >> $GITHUB_ENV
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          TWILIO_VERIFY_SERVICE_SID: ${{ secrets.TWILIO_VERIFY_SERVICE_SID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      - name: Run live tests
        run: npm run test:live:all
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      - name: Check for migration drift
        run: |
          # Get remote migration versions from the linked project
          remote_versions=$(supabase migration list 2>/dev/null \
            | grep -oE '[0-9]{14}' \
            | sort -u)

          orphaned=()
          for version in $remote_versions; do
            if ! ls supabase/migrations/${version}_*.sql 1>/dev/null 2>&1; then
              orphaned+=("$version")
            fi
          done

          if [ ${#orphaned[@]} -gt 0 ]; then
            echo "::error::Migration drift detected! The following remote versions have no local file:"
            for v in "${orphaned[@]}"; do
              echo "  - $v"
            done
            echo ""
            echo "To repair, run for each orphaned version:"
            echo "  supabase migration repair <version> --status reverted --linked"
            exit 1
          fi

          echo "All remote migration versions have matching local files."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Push migrations to production
        run: supabase db push --include-all --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Deploy to Vercel production
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
