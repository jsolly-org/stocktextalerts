# Deploys the site to Supabase on every push to main. Runs CI checks, links
# the Supabase project, verifies there is no migration drift, and pushes
# database migrations to production.
name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'nektos/act' }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/run-ci
      - name: E2E tests
        run: npm run test:e2e
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      - name: Check for migration drift
        run: |
          # Get remote migration versions from the linked project
          remote_versions=$(supabase migration list 2>/dev/null \
            | grep -oE '[0-9]{14}' \
            | sort -u)

          orphaned=()
          for version in $remote_versions; do
            if ! ls supabase/migrations/${version}_*.sql 1>/dev/null 2>&1; then
              orphaned+=("$version")
            fi
          done

          if [ ${#orphaned[@]} -gt 0 ]; then
            echo "::error::Migration drift detected! The following remote versions have no local file:"
            for v in "${orphaned[@]}"; do
              echo "  - $v"
            done
            echo ""
            echo "To repair, run for each orphaned version:"
            echo "  supabase migration repair <version> --status reverted --linked"
            exit 1
          fi

          echo "All remote migration versions have matching local files."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Push migrations to production
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

  live-tests:
    runs-on: ubuntu-latest
    needs: deploy
    if: ${{ github.actor != 'nektos/act' }}
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.2.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - uses: supabase/setup-cli@v1.6.0
        with:
          version: 2.76.9
      - name: Start Supabase
        run: supabase start -x studio,imgproxy,logflare,vector,postgres-meta,edge-runtime,realtime,storage-api
      - name: Load env
        run: |
          supabase status -o json > /tmp/sb-status.json
          DB_VARS=$(jq -r '
            "SUPABASE_URL=\(.API_URL // "")",
            "SUPABASE_PUBLISHABLE_KEY=\(.ANON_KEY // "")",
            "SUPABASE_SECRET_KEY=\(.SERVICE_ROLE_KEY // "")",
            "DATABASE_URL=\(.DB_URL // "")"
          ' /tmp/sb-status.json)
          cat > .env.local <<EOF
          $DB_VARS
          CRON_SECRET=ci-cron-secret
          VERCEL_URL=http://localhost:4321
          TWILIO_ACCOUNT_SID=$TWILIO_ACCOUNT_SID
          TWILIO_AUTH_TOKEN=$TWILIO_AUTH_TOKEN
          TWILIO_PHONE_NUMBER=$TWILIO_PHONE_NUMBER
          TWILIO_VERIFY_SERVICE_SID=$TWILIO_VERIFY_SERVICE_SID
          RESEND_API_KEY=$RESEND_API_KEY
          EMAIL_FROM=$EMAIL_FROM
          MASSIVE_API_KEY=$MASSIVE_API_KEY
          FINNHUB_API_KEY=$FINNHUB_API_KEY
          XAI_API_KEY=$XAI_API_KEY
          EOF
          cat .env.local >> $GITHUB_ENV
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          TWILIO_VERIFY_SERVICE_SID: ${{ secrets.TWILIO_VERIFY_SERVICE_SID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ secrets.EMAIL_FROM }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
      - name: Run all live tests
        run: npm run test:live:all
