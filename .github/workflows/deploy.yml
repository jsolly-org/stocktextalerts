# Deploys the website and Lambda code on every push to main. Runs CI checks,
# links the Supabase project, verifies there is no migration drift, pushes
# database migrations to production, deploys Vercel, then deploys Lambda bundles.
name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'nektos/act' }}
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Require production site URL for prebuilt deploy
        run: |
          if [[ -z "${{ vars.PRODUCTION_SITE_URL }}" ]]; then
            echo "::error::PRODUCTION_SITE_URL repo variable is not set. Set it (e.g. https://stocktextalerts.com) so the prebuilt build bakes the correct domain into prerendered pages, sitemap, canonicals, and OG/JSON-LD."
            exit 1
          fi
      - uses: ./.github/actions/run-ci
        with:
          production-site-url: ${{ vars.PRODUCTION_SITE_URL }}
      - name: E2E tests
        run: npm run test:e2e
      - name: Link Supabase project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
      - name: Check for migration drift
        run: |
          # Get remote migration versions from the linked project
          remote_versions=$(supabase migration list 2>/dev/null \
            | grep -oE '[0-9]{14}' \
            | sort -u)

          orphaned=()
          for version in $remote_versions; do
            if ! ls supabase/migrations/${version}_*.sql 1>/dev/null 2>&1; then
              orphaned+=("$version")
            fi
          done

          if [ ${#orphaned[@]} -gt 0 ]; then
            echo "::error::Migration drift detected! The following remote versions have no local file:"
            for v in "${orphaned[@]}"; do
              echo "  - $v"
            done
            echo ""
            echo "To repair, run for each orphaned version:"
            echo "  supabase migration repair <version> --status reverted --linked"
            exit 1
          fi

          echo "All remote migration versions have matching local files."
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Push migrations to production
        run: supabase db push --include-all --yes
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      - name: Inject crons into Vercel output config
        run: |
          config=".vercel/output/config.json"
          crons=$(jq '.crons' vercel.json)
          jq --argjson crons "$crons" '.crons = $crons' "$config" > tmp.json && mv tmp.json "$config"
      - name: Deploy to Vercel production
        run: npx vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

  deploy-lambdas:
    name: Deploy Lambdas
    runs-on: ubuntu-24.04-arm
    needs: deploy
    if: ${{ github.actor != 'nektos/act' }}
    env:
      STACK_NAME: stocktextalerts-crons
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@v6.3.0
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Install root dependencies
        run: npm ci

      - name: Install Lambda dependencies
        working-directory: aws
        run: npm ci

      - name: Setup SAM CLI
        uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      - name: Build Lambda bundles (SAM-native esbuild)
        working-directory: aws
        # Prepend repo node_modules/.bin so SAM's esbuild integration finds
        # the pinned esbuild binary (it resolves via walk-up from base_dir).
        run: PATH="$GITHUB_WORKSPACE/node_modules/.bin:$PATH" sam build

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v6.0.0
        with:
          role-to-assume: arn:aws:iam::730335616323:role/GitHubActionsDeploymentRole
          aws-region: us-east-1

      - name: Get Lambda function names from CloudFormation
        id: functions
        run: |
          get_physical_id() {
            aws cloudformation describe-stack-resource \
              --stack-name "$STACK_NAME" \
              --logical-resource-id "$1" \
              --query 'StackResourceDetail.PhysicalResourceId' \
              --output text
          }
          echo "schedule=$(get_physical_id ScheduleFunction)" >> "$GITHUB_OUTPUT"
          echo "asset_events=$(get_physical_id AssetEventsFunction)" >> "$GITHUB_OUTPUT"
          echo "daily_stats=$(get_physical_id ComputeDailyStatsFunction)" >> "$GITHUB_OUTPUT"

      - name: Zip Lambda bundles
        working-directory: aws/.aws-sam/build
        run: |
          (cd ScheduleFunction && zip -r ../../schedule.zip .)
          (cd AssetEventsFunction && zip -r ../../asset-events.zip .)
          (cd ComputeDailyStatsFunction && zip -r ../../compute-daily-stats.zip .)

      - name: Deploy ScheduleFunction
        run: |
          aws lambda update-function-code \
            --function-name "${{ steps.functions.outputs.schedule }}" \
            --zip-file fileb://aws/.aws-sam/schedule.zip
          aws lambda wait function-updated-v2 \
            --function-name "${{ steps.functions.outputs.schedule }}"

      - name: Deploy AssetEventsFunction
        run: |
          aws lambda update-function-code \
            --function-name "${{ steps.functions.outputs.asset_events }}" \
            --zip-file fileb://aws/.aws-sam/asset-events.zip
          aws lambda wait function-updated-v2 \
            --function-name "${{ steps.functions.outputs.asset_events }}"

      - name: Deploy ComputeDailyStatsFunction
        run: |
          aws lambda update-function-code \
            --function-name "${{ steps.functions.outputs.daily_stats }}" \
            --zip-file fileb://aws/.aws-sam/compute-daily-stats.zip
          aws lambda wait function-updated-v2 \
            --function-name "${{ steps.functions.outputs.daily_stats }}"
