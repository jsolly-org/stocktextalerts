name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: production
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: Production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    env:
      CI: true
      AWS_REGION: ${{ vars.AWS_REGION }}
      DATABASE_URL_PROD: ${{ secrets.DATABASE_URL_PROD }}
      PRODUCTION_SITE_URL: ${{ vars.PRODUCTION_SITE_URL }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          # Depth 2 so "Refuse infra-only deploys" can diff HEAD against its parent.
          # At the default depth 1 the parent object is absent and `git diff-tree HEAD`
          # prints NOTHING — the gate passed vacuously for every commit (caught 2026-07-03
          # when a template.yaml-touching commit sailed through).
          fetch-depth: 2

      - name: Refuse stale deploy
        if: github.event_name == 'workflow_run'
        run: |
          set -euo pipefail
          git fetch origin main --depth=1
          tip="$(git rev-parse origin/main)"
          ci_sha="${{ github.event.workflow_run.head_sha }}"
          if [ "$tip" != "$ci_sha" ]; then
            echo "CI passed for $ci_sha but main is now at $tip; refusing deploy."
            exit 1
          fi

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      # No supabase/setup-cli: the production `supabase db push` in aws/deploy-web.sh resolves the
      # lock-pinned `supabase` devDependency via node_modules/.bin on PATH (deploy-web.sh prepends it;
      # `npm ci` above installs it). One pinned CLI (2.109.0) is validated in CI AND applied to prod —
      # keeping a `version: latest` setup-cli here would be dead, shadowed config and reintroduce the
      # exact validate-on-X / apply-on-Y drift this repo pins the CLI to avoid.

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Refuse infra-only deploys
        run: |
          set -euo pipefail
          changed="$(git diff-tree --no-commit-id --name-only -r HEAD)"
          # Fail CLOSED on an empty file list: with a too-shallow checkout diff-tree
          # prints nothing and this gate silently passes for EVERY commit (the
          # 2026-07-03 vacuous-pass). An unverifiable diff must block, not wave through.
          if [ -z "$changed" ]; then
            echo "git diff-tree returned no files (shallow checkout?) — cannot verify the landed commit; refusing deploy."
            exit 1
          fi
          if grep -Eq '^aws/(template\.yaml|deploy\.sh)$' <<<"$changed"; then
            echo "aws/template.yaml or aws/deploy.sh changed in the landed commit."
            echo "Run npm run deploy:infra manually with admin credentials, then re-run this workflow."
            exit 1
          fi

      - name: Deploy migrations and Lambdas
        run: bash aws/deploy-web.sh --deploy-ci

      - name: Live provider check
        run: |
          set -euo pipefail
          payload="{\"id\":\"github-actions-deploy\",\"time\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
          response="$(aws lambda invoke \
            --function-name stocktextalerts-live-provider-check \
            --payload "$payload" \
            --cli-binary-format raw-in-base64-out \
            --query '{StatusCode:StatusCode,FunctionError:FunctionError}' \
            --output json \
            /tmp/live-provider-check.json)"
          echo "$response"
          function_error="$(python3 -c 'import json,sys; print((json.load(sys.stdin).get("FunctionError") or ""))' <<<"$response")"
          if [ -n "$function_error" ] && [ "$function_error" != "None" ]; then
            echo "Live provider check failed with FunctionError=$function_error"
            python3 -m json.tool /tmp/live-provider-check.json || true
            exit 1
          fi
