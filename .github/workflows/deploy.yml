name: Deploy

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: production
    runs-on: ubuntu-latest
    timeout-minutes: 45
    environment: Production
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.head_branch == 'main'
      )
    env:
      CI: true
      AWS_REGION: ${{ vars.AWS_REGION }}
      DATABASE_URL_PROD: ${{ secrets.DATABASE_URL_PROD }}
      PRODUCTION_SITE_URL: ${{ vars.PRODUCTION_SITE_URL }}

    steps:
      - uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      - uses: supabase/setup-cli@v2
        with:
          version: latest
          github-token: ${{ github.token }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Refuse infra-only deploys
        run: |
          set -euo pipefail
          changed="$(git diff-tree --no-commit-id --name-only -r HEAD)"
          if grep -Eq '^aws/(template\.yaml|deploy\.sh)$' <<<"$changed"; then
            echo "aws/template.yaml or aws/deploy.sh changed in the landed commit."
            echo "Run npm run deploy:infra manually with admin credentials, then re-run this workflow."
            exit 1
          fi

      - name: Deploy migrations and Lambdas
        run: bash aws/deploy-web.sh --deploy-ci

      - name: Live provider check
        run: |
          set -euo pipefail
          payload="{\"id\":\"github-actions-deploy\",\"time\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}"
          response="$(aws lambda invoke \
            --function-name stocktextalerts-live-provider-check \
            --payload "$payload" \
            --cli-binary-format raw-in-base64-out \
            --query '{StatusCode:StatusCode,FunctionError:FunctionError}' \
            --output json \
            /tmp/live-provider-check.json)"
          echo "$response"
          function_error="$(python3 -c 'import json,sys; print((json.load(sys.stdin).get("FunctionError") or ""))' <<<"$response")"
          if [ -n "$function_error" ] && [ "$function_error" != "None" ]; then
            echo "Live provider check failed with FunctionError=$function_error"
            python3 -m json.tool /tmp/live-provider-check.json || true
            exit 1
          fi
