name: Deploy Lambdas

on:
  push:
    branches: [main]
    paths:
      - "aws/**"
      - "src/lib/**"
      - ".github/workflows/deploy-lambdas.yml"
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

env:
  STACK_NAME: stocktextalerts-crons

jobs:
  deploy:
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version-file: ".nvmrc"
          cache: "npm"
          cache-dependency-path: "**/package-lock.json"

      - name: Install root dependencies
        run: npm ci

      - name: Install Lambda dependencies
        working-directory: aws
        run: npm ci

      - name: Build Lambda bundles
        run: npx tsx aws/esbuild.config.ts

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5
        with:
          role-to-assume: arn:aws:iam::730335616323:role/GitHubActionsDeploymentRole
          aws-region: us-east-1

      - name: Get Lambda function names from CloudFormation
        id: functions
        run: |
          get_physical_id() {
            aws cloudformation describe-stack-resource \
              --stack-name "$STACK_NAME" \
              --logical-resource-id "$1" \
              --query 'StackResourceDetail.PhysicalResourceId' \
              --output text
          }
          echo "schedule=$(get_physical_id ScheduleFunction)" >> "$GITHUB_OUTPUT"
          echo "asset_events=$(get_physical_id AssetEventsFunction)" >> "$GITHUB_OUTPUT"
          echo "daily_stats=$(get_physical_id ComputeDailyStatsFunction)" >> "$GITHUB_OUTPUT"

      - name: Zip Lambda bundles
        working-directory: aws/dist/handlers
        run: |
          zip schedule.zip schedule.mjs
          zip asset-events.zip asset-events.mjs
          zip compute-daily-stats.zip compute-daily-stats.mjs

      - name: Deploy ScheduleFunction
        run: |
          aws lambda update-function-code \
            --function-name "${{ steps.functions.outputs.schedule }}" \
            --zip-file fileb://aws/dist/handlers/schedule.zip
          aws lambda wait function-updated-v2 \
            --function-name "${{ steps.functions.outputs.schedule }}"

      - name: Deploy AssetEventsFunction
        run: |
          aws lambda update-function-code \
            --function-name "${{ steps.functions.outputs.asset_events }}" \
            --zip-file fileb://aws/dist/handlers/asset-events.zip
          aws lambda wait function-updated-v2 \
            --function-name "${{ steps.functions.outputs.asset_events }}"

      - name: Deploy ComputeDailyStatsFunction
        run: |
          aws lambda update-function-code \
            --function-name "${{ steps.functions.outputs.daily_stats }}" \
            --zip-file fileb://aws/dist/handlers/compute-daily-stats.zip
          aws lambda wait function-updated-v2 \
            --function-name "${{ steps.functions.outputs.daily_stats }}"
