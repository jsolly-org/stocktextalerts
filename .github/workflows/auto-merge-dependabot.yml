# Automatically approves and squash-merges Dependabot PRs for minor/patch
# updates. Major version bumps are left for manual review.
name: Auto-merge Dependabot PRs

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-merge:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.actor != 'nektos/act'
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Fetch Dependabot metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2.5.0
        with:
          github-token: ${{ secrets.GH_AGENT_TOKEN }}
      - name: Enable auto-merge for Dependabot PR
        if: steps.metadata.outputs.update-type != 'version-update:semver-major'
        run: gh pr merge ${{ github.event.pull_request.number }} --auto --squash
        env:
          # Use GH_AGENT_TOKEN so auto-merge works on PRs that modify workflow files (default GITHUB_TOKEN lacks workflows permission)
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
