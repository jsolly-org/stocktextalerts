name: Update Open PR Branches

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-open-pr-branches
  cancel-in-progress: true

jobs:
  update-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Update open PR branches that are behind main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          prs="$(gh pr list \
            --repo "$GH_REPO" \
            --state open \
            --base main \
            --limit 200 \
            --json number,mergeStateStatus,isDraft,url)"

          count="$(jq 'length' <<<"$prs")"
          echo "Found $count open PR(s)."

          if [[ "$count" -eq 0 ]]; then
            exit 0
          fi

          updated=0
          update_failed=0
          skipped_drafts=0
          skipped_not_behind=0

          while IFS= read -r pr; do
            number="$(jq -r '.number' <<<"$pr")"
            state="$(jq -r '.mergeStateStatus' <<<"$pr")"
            draft="$(jq -r '.isDraft' <<<"$pr")"
            url="$(jq -r '.url' <<<"$pr")"

            if [[ "$draft" == "true" ]]; then
              echo "Skipping draft PR #$number ($url)."
              skipped_drafts=$((skipped_drafts + 1))
              continue
            fi

            if [[ "$state" != "BEHIND" ]]; then
              echo "Skipping PR #$number ($url): mergeStateStatus=$state."
              skipped_not_behind=$((skipped_not_behind + 1))
            else
              echo "Updating PR #$number ($url)."
              if gh api \
                --method PUT \
                "repos/$GH_REPO/pulls/$number/update-branch" \
                --silent; then
                updated=$((updated + 1))
              else
                echo "Could not update PR #$number (permissions or merge constraints)."
                update_failed=$((update_failed + 1))
              fi
            fi

          done < <(jq -c '.[]' <<<"$prs")

          echo "Summary:"
          echo "- updated=$updated"
          echo "- update_failed=$update_failed"
          echo "- skipped_drafts=$skipped_drafts"
          echo "- skipped_not_behind=$skipped_not_behind"
