name: Update Dependabot Branches

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: update-dependabot-branches
  cancel-in-progress: true

jobs:
  update-branches:
    runs-on: ubuntu-latest
    steps:
      - name: Update open Dependabot PR branches that are behind main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          prs="$(gh pr list \
            --repo "$GH_REPO" \
            --state open \
            --base main \
            --author 'app/dependabot' \
            --json number,mergeStateStatus,isDraft,url)"

          count="$(jq 'length' <<<"$prs")"
          echo "Found $count open Dependabot PR(s)."

          if [[ "$count" -eq 0 ]]; then
            exit 0
          fi

          updated=0

          while IFS= read -r pr; do
            number="$(jq -r '.number' <<<"$pr")"
            state="$(jq -r '.mergeStateStatus' <<<"$pr")"
            draft="$(jq -r '.isDraft' <<<"$pr")"
            url="$(jq -r '.url' <<<"$pr")"

            if [[ "$draft" == "true" ]]; then
              echo "Skipping draft PR #$number ($url)."
              continue
            fi

            if [[ "$state" != "BEHIND" ]]; then
              echo "Skipping PR #$number ($url): mergeStateStatus=$state."
              continue
            fi

            echo "Updating PR #$number ($url)."
            gh api \
              --method PUT \
              "repos/$GH_REPO/pulls/$number/update-branch" \
              --silent

            updated=$((updated + 1))
          done < <(jq -c '.[]' <<<"$prs")

          echo "Queued updates for $updated PR(s)."
