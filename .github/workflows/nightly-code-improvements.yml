# Scheduled nightly job that uses the Cursor agent to find and fix code quality
# issues and refactor for simplicity. Covers dead code, unused imports, lint
# violations, duplication reduction, complexity, and type safety. Opens a PR
# with the changes if any are made.
name: "Nightly: Code Improvements"

on:
  schedule:
    - cron: "0 5 * * *" # 12 AM ET
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

jobs:
  code-improvements:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check for existing nightly PR
        id: check-pr
        run: |
          EXISTING_PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --search "chore(nightly): code improvements label:bot-generated" \
            --state open \
            --json number,url \
            --limit 1)
          if [ "$(echo "$EXISTING_PR" | jq length)" -gt 0 ]; then
            PR_URL=$(echo "$EXISTING_PR" | jq -r '.[0].url')
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Existing nightly code-improvements PR found: $PR_URL"
            gh pr comment "$PR_URL" --body "Nightly run skipped — this PR is still open."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Checkout repository
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: dev # default branch is dev
          fetch-depth: 0
          # Use GH_AGENT_TOKEN so git push can modify workflow files (default GITHUB_TOKEN lacks workflows permission)
          token: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Setup Node.js
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.check-pr.outputs.skip != 'true'
        run: npm ci

      - name: Run knip (dead code / unused exports)
        if: steps.check-pr.outputs.skip != 'true'
        run: |
          REPORT=$(npx knip --reporter compact --no-exit-code 2>&1 || true)
          if [ -n "$REPORT" ] && [ "$REPORT" != "No issues found" ]; then
            # Truncate to 8000 chars to keep agent prompt manageable
            echo "$REPORT" | head -c 8000 > knip-report.txt
          fi

      - name: Check knip findings
        if: steps.check-pr.outputs.skip != 'true'
        id: knip
        run: |
          if [ -f knip-report.txt ] && [ -s knip-report.txt ]; then
            echo "has_findings=true" >> "$GITHUB_OUTPUT"
            echo "Knip findings detected."
          else
            echo "has_findings=false" >> "$GITHUB_OUTPUT"
            echo "No knip findings."
          fi

      - name: Setup Cursor CLI
        if: steps.check-pr.outputs.skip != 'true'
        uses: ./.github/actions/setup-cursor

      - name: Create branch
        if: steps.check-pr.outputs.skip != 'true'
        run: git checkout -b "nightly/code-improvements-$(date +%Y-%m-%d)-${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Run agent
        if: steps.check-pr.outputs.skip != 'true'
        env:
          MODEL: ${{ vars.AGENT_MODEL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          HAS_KNIP_FINDINGS: ${{ steps.knip.outputs.has_findings }}
        run: |
          KNIP_SECTION=""
          if [ "$HAS_KNIP_FINDINGS" = "true" ]; then
            KNIP_SECTION="
          # Knip Analysis Results
          The file \`knip-report.txt\` contains dead code findings from knip (unused files, exports, dependencies, and types).
          Read this file first and prioritize fixing these findings:
          - Remove unused exports and files
          - Remove unused dependencies from package.json
          - Remove unused types
          Do not modify \`knip-report.txt\` — it will be cleaned up by the workflow.
          "
          fi

          agent -p "You are operating in a GitHub Actions runner. Git and the \`gh\` CLI are available and authenticated.

          # Goal
          Improve code quality and refactor for simplicity:
          - Find and fix dead code, unused imports/exports, lint issues, and other quality problems.
          - Reduce duplication, lower complexity, improve type safety, and clean up code structure.
          - Look for performance issues: slow queries, unnecessary re-renders, bundle size problems, and opportunities to use static/precomputed values.
          ${KNIP_SECTION}
          # Guidelines
          - Read \`AGENTS.md\` and the \`.agents/\` directory for project conventions and guidelines.
          - Leave all changes uncommitted. The workflow will handle commit, push, and PR creation.
          - Do not create issues or PRs yourself.
          " --force --model "$MODEL" --output-format=text

      - name: Clean up knip report
        if: steps.check-pr.outputs.skip != 'true'
        run: rm -f knip-report.txt

      # Note: we intentionally keep agent edits to .github/ — the PR review
      # process is the right place to catch bad workflow changes, not a blanket revert.

      - name: Check for changes
        if: steps.check-pr.outputs.skip != 'true'
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit checks
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        uses: ./.github/actions/run-precommit-checks

      - name: Commit and push
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "chore(nightly): code improvements — $(date +%Y-%m-%d)"
          git push origin HEAD

      - name: Create pull request
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          gh pr create \
            --title "chore(nightly): code improvements — $(date +%Y-%m-%d)" \
            --label "bot-generated" \
            --label "nightly" \
            --body "$(cat <<'EOF'
          ## Summary
          Automated code improvements — dead code removal, unused import cleanup, lint fixes, duplication reduction, complexity simplification, type safety improvements, and structural cleanup.

          ---
          *Auto-generated by the nightly-code-improvements workflow.*
          EOF
          )"
