# Runs after every push to dev. Creates up to 3 follow-up PRs with code
# changes based on the recent push, and updates documentation files (README,
# FAQ, HowItWorks) to reflect the latest code.
name: Post Dev Push

on:
  push:
    branches: [dev]
    paths-ignore:
      - 'README.md'
      - 'src/pages/faq.astro'
      - 'src/components/landing/HowItWorks.astro'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

jobs:
  discover-followups:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.actor == 'jsolly') && github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    outputs:
      followups: ${{ steps.parse.outputs.followups }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        uses: ./.github/actions/setup-cursor

      - name: Discover follow-up tasks
        env:
          MODEL: ${{ vars.AGENT_MODEL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          agent -p "You are operating in a GitHub Actions runner.

          The GitHub CLI is available as \`gh\` and authenticated via \`GH_TOKEN\`. Git is available.

          # Context:
          - Repo: ${{ github.repository }}
          - Owner: ${{ github.repository_owner }}
          - Trigger: ${{ github.event_name }}
          - Before SHA: ${{ github.event.before }}
          - After SHA: ${{ github.sha }}
          - Actor: ${{ github.actor }}

          # Goal:
          Identify high-quality follow-up tasks inspired by the changes just pushed to dev, and write them to a JSON file. Quality over quantity — zero tasks is perfectly fine.

          # Phase 1 — Understand the changes:
          - If Trigger is \`push\`: run \`git log ${{ github.event.before }}..${{ github.sha }} --format='%H %s'\` and \`git diff ${{ github.event.before }}..${{ github.sha }}\` to understand what changed. Also try to find an associated merged PR: \`gh pr list --search '${{ github.sha }}' --state merged --json number,title,url --limit 1\`.
          - If Trigger is \`workflow_dispatch\`: review the latest 3 commits on \`dev\` using \`git log -3 --format='%H %s'\` and \`git diff HEAD~3..HEAD\` to understand recent changes.

          # Phase 2 — Check for duplicates:
          - Fetch open PRs: \`gh pr list --state open --limit 50 --json number,title,body,labels\`
          - Fetch recently merged PRs: \`gh pr list --state merged --limit 20 --json number,title,body,labels\`
          - Use these to avoid proposing tasks that duplicate existing or recently completed work.

          # Phase 3 — Brainstorm and filter:
          Consider these categories:
          - Follow-up features that naturally extend the pushed changes
          - Edge cases or error handling gaps revealed by the diff
          - UX improvements for any UI changes
          - Missing or insufficient test coverage
          - Performance or security considerations

          Apply these quality filters aggressively:
          - Would a senior developer consider this task worth doing? If not, skip it.
          - Is the task specific and actionable (not vague like 'improve performance')? If not, skip it.
          - Does a similar open or recently merged PR already cover this? If so, skip it.
          - Is this something the author likely already considered and intentionally left out? If so, skip it.
          - Is this a trivial nitpick or stylistic preference? If so, skip it.

          # Phase 4 — Write follow-ups to file:
          Write a JSON file at \`/tmp/followups.json\` containing an array of follow-up tasks.
          Maximum 3 tasks. Fewer is better. Zero (empty array \`[]\`) is a valid outcome.

          Each task must have:
          - \`title\`: a concise imperative title (e.g. \"Add unit tests for bar parsing edge cases\")
          - \`description\`: 2-4 sentences describing what to implement and why, referencing the change context

          Example:
          \`\`\`json
          [
            {
              \"title\": \"Add unit tests for bar parsing edge cases\",
              \"description\": \"The recent changes to extractClosesFromBars added new parsing logic but only cover the happy path. Add tests for empty arrays, malformed bar data, and bars with missing close prices to prevent regressions.\"
            }
          ]
          \`\`\`

          # Strict rules:
          - Do NOT modify any repository files, create commits, or push anything.
          - Do NOT create issues or PRs.
          - ONLY write to \`/tmp/followups.json\`.
          - The file MUST contain valid JSON — an array of objects with \`title\` and \`description\` fields.
          - Maximum 3 tasks. Zero is fine.
          " --force --model "$MODEL" --output-format=text

      - name: Parse follow-ups
        id: parse
        run: |
          if [ ! -f /tmp/followups.json ]; then
            echo "No followups file found."
            echo 'followups=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Validate JSON and limit to 3
          FOLLOWUPS=$(jq -c '.[0:3]' /tmp/followups.json 2>/dev/null || echo '[]')
          COUNT=$(echo "$FOLLOWUPS" | jq 'length')
          echo "Found $COUNT follow-up task(s)."
          echo "$FOLLOWUPS" | jq .
          echo "followups=$FOLLOWUPS" >> "$GITHUB_OUTPUT"

  create-followup-pr:
    needs: discover-followups
    if: ${{ needs.discover-followups.outputs.followups != '[]' && needs.discover-followups.outputs.followups != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 3
      matrix:
        followup: ${{ fromJson(needs.discover-followups.outputs.followups) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        uses: ./.github/actions/setup-cursor

      - name: Create branch
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          INDEX=${{ strategy.job-index }}
          git checkout -b "post-push/followup-${SHORT_SHA}-${INDEX}-${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Run agent
        env:
          MODEL: ${{ vars.AGENT_MODEL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          TASK_TITLE: ${{ matrix.followup.title }}
          TASK_DESCRIPTION: ${{ matrix.followup.description }}
        run: |
          agent -p "You are operating in a GitHub Actions runner. Git and the \`gh\` CLI are available and authenticated.

          # Goal
          Implement the following task:

          **${TASK_TITLE}**

          ${TASK_DESCRIPTION}

          # Guidelines
          - Read \`AGENTS.md\` and the \`.agents/\` directory for project conventions and guidelines.
          - Leave all changes uncommitted. The workflow will handle commit, push, and PR creation.
          - Do not create issues or PRs yourself.
          " --force --model "$MODEL" --output-format=text

      - name: Drop workflow file edits
        uses: ./.github/actions/drop-workflow-edits

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit checks (lint + type-check)
        if: steps.changes.outputs.has_changes == 'true'
        id: precommit_checks
        continue-on-error: true
        uses: ./.github/actions/run-precommit-checks

      - name: Auto-fix lint/type errors
        if: steps.changes.outputs.has_changes == 'true' && steps.precommit_checks.outcome == 'failure'
        id: autofix
        continue-on-error: true
        uses: ./.github/actions/autofix-lint-type-errors
        with:
          cursor_api_key: ${{ secrets.CURSOR_API_KEY }}
          agent_model: ${{ vars.AGENT_MODEL }}
          max_fix_attempts: "2"

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true' && (steps.precommit_checks.outcome == 'success' || steps.autofix.outputs.fixed == 'true')
        env:
          TASK_TITLE: ${{ matrix.followup.title }}
        run: |
          git add -A
          git commit -m "feat(post-push): ${TASK_TITLE}"
          git push origin HEAD

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true' && (steps.precommit_checks.outcome == 'success' || steps.autofix.outputs.fixed == 'true')
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          TASK_TITLE: ${{ matrix.followup.title }}
          TASK_DESCRIPTION: ${{ matrix.followup.description }}
        run: |
          gh pr create \
            --base dev \
            --title "feat(post-push): ${TASK_TITLE}" \
            --label "bot-generated" \
            --body "$(cat <<EOF
          ## Summary
          ${TASK_DESCRIPTION}

          ---
          *Auto-generated from push ${{ github.sha }} by the post-dev-push workflow.*
          EOF
          )"

  update-docs:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.actor == 'jsolly') && github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: dev
          fetch-depth: 0
          # Use GH_AGENT_TOKEN so git push can modify workflow files (default GITHUB_TOKEN lacks workflows permission)
          token: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        uses: ./.github/actions/setup-cursor

      - name: Update docs
        env:
          MODEL: ${{ vars.AGENT_MODEL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          agent -p "You are operating in a GitHub Actions runner.

          The GitHub CLI is available as \`gh\` and authenticated via \`GH_TOKEN\`. Git is available.

          # Context:
          - Repo: ${{ github.repository }}
          - Owner: ${{ github.repository_owner }}
          - Trigger: ${{ github.event_name }}
          - Before SHA: ${{ github.event.before }}
          - After SHA: ${{ github.sha }}
          - Actor: ${{ github.actor }}

          # Goal:
          - Update docs on \`dev\`. Leave all changes uncommitted — the workflow will handle commit and push.

          # Allowed files (ONLY these may be modified):
          - \`README.md\` — project documentation
          - \`src/pages/faq.astro\` — FAQ page (question/answer pairs in the \`faqs\` array and page copy)
          - \`src/components/landing/HowItWorks.astro\` — \"How it works\" section (steps in the \`steps\` array and section copy)

          # Requirements:
          1) If Trigger is \`push\` (Before SHA and After SHA are set): determine what changed using \`git diff ${{ github.event.before }}..${{ github.sha }}\` or \`git log ${{ github.event.before }}..${{ github.sha }} --format='%H %s'\`. Update the allowed files if the changes warrant it.
          2) If Trigger is \`workflow_dispatch\` (manual run; SHAs may be empty): review the current state of the codebase on \`dev\` and update the allowed files to accurately reflect it.
          3) Only modify the allowed files listed above. Do NOT touch any other files.
          4) For \`src/pages/faq.astro\`: only update the \`faqs\` array entries and surrounding page copy. Do NOT change the component imports, layout structure, JSON-LD logic, or Tailwind classes.
          5) For \`src/components/landing/HowItWorks.astro\`: only update the \`steps\` array entries and surrounding section copy. Do NOT change the component imports, template structure, or Tailwind classes.
          6) Do NOT create commits, push, or create/edit pull requests.

          # Inputs and conventions:
          - If no updates are necessary, make no changes.
          - Keep changes minimal and consistent with repo style.
          " --force --model "$MODEL" --output-format=text

      - name: Drop workflow file edits
        uses: ./.github/actions/drop-workflow-edits

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit checks (lint + type-check)
        if: steps.changes.outputs.has_changes == 'true'
        id: precommit_checks
        continue-on-error: true
        uses: ./.github/actions/run-precommit-checks

      - name: Auto-fix lint/type errors
        if: steps.changes.outputs.has_changes == 'true' && steps.precommit_checks.outcome == 'failure'
        id: autofix
        continue-on-error: true
        uses: ./.github/actions/autofix-lint-type-errors
        with:
          cursor_api_key: ${{ secrets.CURSOR_API_KEY }}
          agent_model: ${{ vars.AGENT_MODEL }}
          max_fix_attempts: "2"

      - name: Create PR with doc updates
        if: steps.changes.outputs.has_changes == 'true' && (steps.precommit_checks.outcome == 'success' || steps.autofix.outputs.fixed == 'true')
        run: |
          # Verify only allowed files were changed
          UNEXPECTED=$(git status --porcelain | grep -v -E '^.. (README\.md|src/pages/faq\.astro|src/components/landing/HowItWorks\.astro)$' || true)
          if [[ -n "$UNEXPECTED" ]]; then
            echo "##[warning]Unexpected file changes detected:"
            echo "$UNEXPECTED"
          fi

          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          BRANCH="docs/auto-update-${SHORT_SHA}"

          git checkout -b "$BRANCH"
          git add -A
          if [ "${{ github.event_name }}" = "push" ]; then
            git commit -m "docs: update docs for ${{ github.sha }}"
          else
            git commit -m "docs: update docs (manual trigger)"
          fi
          git push origin "$BRANCH"

          PR_URL=$(gh pr create \
            --base dev \
            --head "$BRANCH" \
            --title "docs: auto-update docs for ${SHORT_SHA}" \
            --body "Automated doc updates triggered by push to dev.

          Source commit: ${{ github.sha }}
          Trigger: ${{ github.event_name }}")

          echo "PR created: $PR_URL"
          gh pr merge "$PR_URL" --admin --merge --delete-branch
          echo "PR merged successfully."
