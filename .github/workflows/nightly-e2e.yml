# Nightly E2E tests on dev to catch regressions before code reaches main.
# When tests fail, the Cursor agent attempts to fix the failures and opens a PR.
name: "Nightly: E2E"

on:
  schedule:
    - cron: "0 8 * * *" # 3 AM ET
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

env:
  GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: dev
      - uses: ./.github/actions/run-ci
        with:
          skip-lint: "true"
      - name: E2E tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  fix-failures:
    runs-on: ubuntu-latest
    needs: e2e
    if: failure()
    steps:
      - name: Check for existing nightly PR
        id: check-pr
        run: |
          EXISTING_PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --label "bot-generated" \
            --search "fix(nightly): e2e test fixes" \
            --state open \
            --json number,url \
            --limit 1)
          if [ "$(echo "$EXISTING_PR" | jq length)" -gt 0 ]; then
            PR_URL=$(echo "$EXISTING_PR" | jq -r '.[0].url')
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Existing nightly E2E PR found: $PR_URL"
            gh pr comment "$PR_URL" --body "Nightly run skipped — this PR is still open."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Checkout repository
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: dev
          fetch-depth: 0
          token: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Setup Node.js
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.check-pr.outputs.skip != 'true'
        run: npm ci

      - name: Download Playwright report
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/download-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/

      - name: Setup Cursor CLI
        if: steps.check-pr.outputs.skip != 'true'
        uses: ./.github/actions/setup-cursor

      - name: Create branch
        if: steps.check-pr.outputs.skip != 'true'
        run: git checkout -b "nightly/e2e-fix-$(date +%Y-%m-%d)-${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Run agent
        if: steps.check-pr.outputs.skip != 'true'
        env:
          MODEL: ${{ vars.AGENT_MODEL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          agent -p "You are operating in a GitHub Actions runner. Git and the \`gh\` CLI are available and authenticated.

          # Goal
          Fix the E2E test failures from the nightly run.

          The Playwright HTML report is available at \`playwright-report/\` in the repo root.
          It contains the test results, failure messages, and screenshots from the failed run.

          # Guidelines
          - Read \`AGENTS.md\` and the \`.agents/\` directory for project conventions and guidelines.
          - Examine the Playwright report in \`playwright-report/\` to understand which tests failed and why.
          - Diagnose the root causes of each failure — look at the test code, the application code it exercises, and the error messages.
          - Fix the root causes in the application or test code as appropriate.
          - Leave all changes uncommitted. The workflow will handle commit, push, and PR creation.
          - Do not create issues or PRs yourself.
          " --force --model "$MODEL" --output-format=text

      # Note: we intentionally keep agent edits to .github/ — the PR review
      # process is the right place to catch bad workflow changes, not a blanket revert.

      - name: Check for changes
        if: steps.check-pr.outputs.skip != 'true'
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit checks
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        uses: ./.github/actions/run-precommit-checks

      - name: Commit and push
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "fix(nightly): e2e test fixes — $(date +%Y-%m-%d)"
          git push origin HEAD

      - name: Create pull request
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          gh pr create \
            --title "fix(nightly): e2e test fixes — $(date +%Y-%m-%d)" \
            --label "bot-generated" \
            --body "$(cat <<'EOF'
          ## Summary
          Automated E2E test failure fixes based on Playwright report analysis — diagnosed and fixed root causes of failing end-to-end tests.

          ---
          *Auto-generated by the nightly-e2e workflow.*
          EOF
          )"
