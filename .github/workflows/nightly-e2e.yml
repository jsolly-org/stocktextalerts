# Nightly E2E tests on dev to catch regressions before code reaches main.
name: "Nightly: E2E"

on:
  schedule:
    - cron: "0 8 * * *" # 3 AM ET
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: dev
      - uses: ./.github/actions/run-ci
        with:
          skip-lint: "true"
      - name: E2E tests
        run: npm run test:e2e
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  report-failure:
    runs-on: ubuntu-latest
    needs: e2e
    if: failure()
    steps:
      - name: Create failure issue
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          gh issue create \
            --repo "${{ github.repository }}" \
            --title "Nightly E2E failure — $(date +%Y-%m-%d)" \
            --label "nightly" \
            --body "E2E tests failed in the nightly run.

          **Run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ---
          *Auto-generated by the nightly-e2e workflow.*"
