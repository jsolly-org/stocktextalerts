# Keeps open PR branches up to date with dev. When a push lands on dev, this
# workflow finds all open PRs and calls the GitHub API to update their
# branches (including drafts). PRs already up to date are handled gracefully.
name: Update Open PR Branches

on:
  push:
    branches:
      - dev
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-open-pr-branches
  cancel-in-progress: true

jobs:
  update-branches:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'nektos/act' }}
    steps:
      - name: Update open PR branches that are behind dev
        env:
          # Use GH_AGENT_TOKEN so branch updates work on PRs that modify workflow files (default GITHUB_TOKEN lacks workflows permission)
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail

          prs="$(gh pr list \
            --repo "$GH_REPO" \
            --state open \
            --base dev \
            --limit 200 \
            --json number,url)"

          count="$(jq 'length' <<<"$prs")"
          echo "Found $count open PR(s)."

          if [[ "$count" -eq 0 ]]; then
            exit 0
          fi

          updated=0
          already_up_to_date=0
          update_failed=0
          merge_conflict=0
          head_sha_mismatch=0

          while IFS= read -r pr; do
            number="$(jq -r '.number' <<<"$pr")"
            url="$(jq -r '.url' <<<"$pr")"

            echo "Updating PR #$number ($url)."
            if err="$(gh api \
              --method PUT \
              "repos/$GH_REPO/pulls/$number/update-branch" \
              --silent 2>&1)"; then
              updated=$((updated + 1))
            else
              if echo "$err" | grep -qi "already up.to.date"; then
                echo "PR #$number is already up to date."
                already_up_to_date=$((already_up_to_date + 1))
              elif echo "$err" | grep -qi "merge conflict"; then
                echo "::warning::PR #$number has a merge conflict — skipping ($url): $err"
                merge_conflict=$((merge_conflict + 1))
              elif echo "$err" | grep -qi "expected head sha"; then
                echo "::warning::PR #$number head SHA changed during update — skipping ($url): $err"
                head_sha_mismatch=$((head_sha_mismatch + 1))
              else
                echo "::error::Failed to update PR #$number ($url): $err"
                update_failed=$((update_failed + 1))
              fi
            fi

          done < <(jq -c '.[]' <<<"$prs")

          echo "Summary:"
          echo "- updated=$updated"
          echo "- already_up_to_date=$already_up_to_date"
          echo "- merge_conflict=$merge_conflict"
          echo "- head_sha_mismatch=$head_sha_mismatch"
          echo "- update_failed=$update_failed"

          if [[ "$update_failed" -gt 0 ]]; then
            echo "::warning::$update_failed PR(s) failed to update."
            exit 1
          fi
