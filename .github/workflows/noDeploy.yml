# CI gate for pull requests. Runs Biome linting, TypeScript type checking, and
# a full build to catch issues before merging. No deployment occurs.
name: No Deploy (Test and Build)

on:
  push:
    branches: [dev]
  pull_request:
  workflow_dispatch:

concurrency:
  group: no-deploy-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.2.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Biome
        run: npx biome ci . --error-on-warnings
      - name: Lint YAML
        run: npm run check:yaml
      - name: Type check
        run: npm run check:ts

  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/run-ci
        with:
          skip-lint: 'true'
