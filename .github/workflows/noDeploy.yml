# CI gate — runs Biome linting, TypeScript type checking, and a full build.
# No deployment occurs.
name: No Deploy (Test and Build)

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: no-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          # Need history so squawk can diff changed migrations against the previous push.
          fetch-depth: 0
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Biome
        run: npx biome ci . --error-on-warnings
      - name: Lint YAML
        run: npm run check:yaml
      - name: Type check
        run: npm run check:ts
      - name: Squawk migrations (changed files only)
        shell: bash
        run: |
          set -euo pipefail
          BASE="${{ github.event.before || '' }}"
          if [[ -z "$BASE" || "$BASE" =~ ^0+$ ]]; then
            BASE="HEAD~1"
          fi
          if ! git cat-file -e "${BASE}^{commit}" 2>/dev/null; then
            echo "Base $BASE unavailable; skipping squawk."
            exit 0
          fi
          mapfile -t CHANGED < <(git diff --name-only --diff-filter=AM "$BASE" HEAD -- 'supabase/migrations/*.sql')
          if [[ ${#CHANGED[@]} -eq 0 || -z "${CHANGED[0]:-}" ]]; then
            echo "No migration changes."
            exit 0
          fi
          echo "Linting changed migrations:"
          printf '  %s\n' "${CHANGED[@]}"
          npx squawk "${CHANGED[@]}"

  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/run-ci
        with:
          skip-lint: 'true'

  # Full Playwright E2E suite. Skipped on normal pushes to keep CI fast;
  # only runs on manual workflow_dispatch or under local `act` (so
  # `npm run gha:local:e2e` reproduces the deploy workflow's E2E step
  # without needing production credentials).
  e2e:
    if: ${{ github.event_name == 'workflow_dispatch' || github.actor == 'nektos/act' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/run-ci
        with:
          skip-lint: 'true'
      - name: E2E tests
        shell: bash
        run: npm run test:e2e
