# CI gate for pull requests. Runs Biome linting, TypeScript type checking, and
# a full build to catch issues before merging. No deployment occurs.
name: No Deploy (Test and Build)

on:
  push:
    branches: [dev]
  pull_request:
  workflow_dispatch:

concurrency:
  group: no-deploy-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run Biome
        run: npx biome ci . --error-on-warnings
      - name: Lint YAML
        run: npm run check:yaml
      - name: Type check
        run: npm run check:ts

  auto-fix-lint:
    runs-on: ubuntu-latest
    needs: lint
    if: failure() && github.event_name == 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6.0.2
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GH_AGENT_TOKEN }}
      - uses: actions/setup-node@v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Auto-fix and push
        run: |
          npx biome check --write . || true
          git add -A
          if git diff --cached --quiet; then
            echo "No auto-fixable changes found."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "style: auto-fix formatting"
          git push

  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/run-ci
        with:
          skip-lint: 'true'
