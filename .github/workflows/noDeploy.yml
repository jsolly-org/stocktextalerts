# CI gate — runs Biome linting, TypeScript type checking, and a full build.
# No deployment occurs.
name: No Deploy (Test and Build)

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.markdownlint-cli2.jsonc'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'LICENSE'
      - '.markdownlint-cli2.jsonc'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: no-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Guard Biome rules contract
        run: bash .agents/scripts/check-biome-rules.sh biome.jsonc
      - name: Install YAML linters
        shell: bash
        run: |
          pipx install yamllint==1.38.0
          bash <(curl -sSf https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash) 1.7.12
          sudo mv actionlint /usr/local/bin/actionlint
      - name: Run Biome
        run: npx biome ci . --error-on-warnings
      - name: Lint YAML
        run: npm run check:yaml
      - name: Type check
        run: npm run check:ts
      - name: Squawk migrations
        run: npm run check:sql

  test-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/run-ci
        with:
          skip-lint: 'true'
          skip-e2e: 'true'

  # Full Playwright E2E suite. Skipped on normal pushes to keep CI fast;
  # only runs on manual workflow_dispatch or under local `act` (so
  # `npm run gha:local:e2e` reproduces the deploy workflow's E2E step
  # without needing production credentials).
  e2e:
    if: ${{ github.event_name == 'workflow_dispatch' || github.actor == 'nektos/act' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - uses: ./.github/actions/run-ci
        with:
          skip-lint: 'true'
      - name: E2E tests
        shell: bash
        run: npm run test:e2e
