name: Post-Merge

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:
  create-issues:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login == 'jsolly') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        uses: ./.github/actions/setup-cursor

      - name: Create follow-up issues
        env:
          MODEL: gpt-5.2
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          agent -p "You are operating in a GitHub Actions runner.

          The GitHub CLI is available as \`gh\` and authenticated via \`GH_TOKEN\`. Git is available. You have read-only access to repository contents and write access to issues.

          # Context:
          - Repo: ${{ github.repository }}
          - Owner: ${{ github.repository_owner }}
          - Trigger: ${{ github.event_name }}
          - PR Number: ${{ github.event.pull_request.number }}
          - Base Ref: ${{ github.event.pull_request.base.ref }}
          - Head Ref: ${{ github.event.pull_request.head.ref }}
          - Base SHA: ${{ github.event.pull_request.base.sha }}
          - Head SHA: ${{ github.event.pull_request.head.sha }}
          - Merge Commit SHA: ${{ github.event.pull_request.merge_commit_sha }}

          # Goal:
          Create high-quality follow-up GitHub issues inspired by the merged PR. Quality over quantity — zero issues is perfectly fine.

          # Phase 1 — Understand the PR:
          - If Trigger is \`pull_request\`: run \`gh pr view \$PR_NUMBER --json title,body,labels\` and \`gh pr diff \$PR_NUMBER\` (where PR_NUMBER=${{ github.event.pull_request.number }}) to understand what changed.
          - If Trigger is \`workflow_dispatch\`: review the latest 3 commits on \`main\` using \`git log -3 --format='%H %s'\` and \`git diff HEAD~3..HEAD\` to understand recent changes.

          # Phase 2 — Check existing issues:
          - Fetch open issues: \`gh issue list --state open --limit 50 --json number,title,body,labels\`
          - Fetch recently closed issues: \`gh issue list --state closed --limit 20 --json number,title,body,labels\`
          - Use these to avoid creating duplicates or issues that were already addressed.

          # Phase 3 — Brainstorm and filter:
          Consider these categories:
          - Follow-up features that naturally extend the PR's work
          - Edge cases or error handling gaps revealed by the diff
          - UX improvements for any UI changes in the PR
          - Missing or insufficient test coverage
          - Performance or security considerations

          Apply these quality filters aggressively:
          - Would a senior developer consider this issue worth filing? If not, skip it.
          - Is the issue specific and actionable (not vague like 'improve performance')? If not, skip it.
          - Does a similar open or recently closed issue already exist? If so, skip it.
          - Is this something the PR author likely already considered and intentionally left out? If so, skip it.
          - Is this a trivial nitpick or stylistic preference? If so, skip it.

          # Phase 4 — Create issues:
          For each issue that passes all filters (maximum 3, fewer is better, zero is fine):
          1. Choose a label: \`enhancement\` for features/improvements, \`bug\` for defects.
          2. Create the issue with:
             \`\`\`
             gh issue create \\
               --title \"<concise title>\" \\
               --label \"<enhancement or bug>,bot-generated\" \\
               --body \"## Summary
             <1-2 sentence description>

             ## Requirements
             - <specific requirement 1>
             - <specific requirement 2>

             ## Motivation
             <why this matters, referencing the PR context>

             ---
             *Auto-generated from PR #${{ github.event.pull_request.number }} by the create-issues workflow.*\"
             \`\`\`

          # Strict rules:
          - Do NOT modify any files, create commits, or push anything.
          - Do NOT create more than 3 issues. Zero issues is a valid outcome.
          - Do NOT create vague, low-value, or duplicate issues.
          - Every issue MUST have both the category label AND the \`bot-generated\` label.
          - Every issue body MUST end with the auto-generated footer.

          # Output:
          After completing all phases, print a summary:
          - ISSUES_CREATED=<number>
          - For each issue created, print: ISSUE_URL=<url>
          - If zero issues were created, print: NO_ISSUES_NEEDED
          " --force --model "$MODEL" --output-format=text

      - name: Log results
        run: |
          echo "---"
          echo "Issues with bot-generated label:"
          gh issue list --label "bot-generated" --state open --limit 5 --json number,title,url
          echo "---"

  update-docs:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login == 'jsolly') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        uses: ./.github/actions/setup-cursor

      - name: Update docs
        env:
          MODEL: gpt-5.2
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          agent -p "You are operating in a GitHub Actions runner.

          The GitHub CLI is available as \`gh\` and authenticated via \`GH_TOKEN\`. Git is available. You have write access to repository contents.

          # Context:
          - Repo: ${{ github.repository }}
          - Owner: ${{ github.repository_owner }}
          - Trigger: ${{ github.event_name }}
          - PR Number: ${{ github.event.pull_request.number }}
          - Base Ref: ${{ github.event.pull_request.base.ref }}
          - Head Ref: ${{ github.event.pull_request.head.ref }}
          - Base SHA: ${{ github.event.pull_request.base.sha }}
          - Head SHA: ${{ github.event.pull_request.head.sha }}
          - Merge Commit SHA: ${{ github.event.pull_request.merge_commit_sha }}

          # Goal:
          - Update docs on \`main\`, then commit + push directly to \`main\` (no follow-up PR).

          # Allowed files (ONLY these may be modified):
          - \`README.md\` — project documentation
          - \`src/pages/faq.astro\` — FAQ page (question/answer pairs in the \`faqs\` array and page copy)
          - \`src/components/landing/HowItWorks.astro\` — \"How it works\" section (steps in the \`steps\` array and section copy)

          # Requirements:
          1) If Trigger is \`pull_request\` (PR Number and SHAs are set): determine what changed in the merged PR using \`gh pr diff <PR_NUMBER>\` or \`git diff <BASE_SHA> <HEAD_SHA>\` (PR-level diff; do NOT use merge-commit-vs-parent). Update the allowed files if the PR changes warrant it.
          2) If Trigger is \`workflow_dispatch\` (manual run; PR Number/SHAs may be empty): review the current state of the codebase on \`main\` and update the allowed files to accurately reflect it.
          3) Only modify the allowed files listed above. Do NOT touch any other files.
          4) For \`src/pages/faq.astro\`: only update the \`faqs\` array entries and surrounding page copy. Do NOT change the component imports, layout structure, JSON-LD logic, or Tailwind classes.
          5) For \`src/components/landing/HowItWorks.astro\`: only update the \`steps\` array entries and surrounding section copy. Do NOT change the component imports, template structure, or Tailwind classes.
          6) Commit and push changes directly to \`main\`. Only create a commit if at least one allowed file changed.
          7) Do NOT create or edit pull requests.

          # Inputs and conventions:
          - If no updates are necessary, make no changes and do not commit.
          - Keep changes minimal and consistent with repo style.

          # Implementation notes:
          - You are checked out on \`main\`. After making changes, run \`git status --porcelain\` to confirm only allowed files changed.
          - If any allowed files changed, run:
            - \`git add README.md src/pages/faq.astro src/components/landing/HowItWorks.astro\`
            - \`git commit -m \"docs: update docs for PR #${{ github.event.pull_request.number }}\" \` when Trigger is \`pull_request\`, or \`git commit -m \"docs: update docs (manual trigger)\" \` when Trigger is \`workflow_dispatch\`
            - \`git push origin main\`

          # Deliverables when updates occur:
          - A commit pushed directly to \`main\` that changes only the allowed files.
          - After pushing, print exactly one line so the workflow can log it: \`DOCS_PUSHED_SHA=\$(git rev-parse HEAD)\`
          " --force --model "$MODEL" --output-format=text

      - name: Log latest commit on main
        run: |
          git fetch origin main --depth=1
          echo "---"
          echo "Latest commit on origin/main after run:"
          git log -1 origin/main --format="  SHA: %H%n  Subject: %s%n  Author: %an <%ae>%n  Date: %ai"
          echo "---"
