name: CI

on:
  pull_request:
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

# PRs / merge queue: one active run per PR or merge entry (supersede cancels).
# Other events: one group per commit SHA.
concurrency:
  group: >-
    ci-${{ github.workflow }}-${{
      github.event.pull_request.number
      || (github.event_name == 'merge_group' && github.event.merge_group.head_sha)
      || github.sha
    }}
  cancel-in-progress: >-
    ${{
      github.event_name == 'pull_request'
      || github.event_name == 'merge_group'
    }}

env:
  CI: true
  DOCKER_HOST: unix:///var/run/docker.sock
  DEFAULT_PASSWORD: ci-local-seed-password
  # Container-registry throttle signature, shared by the db:start / db:reset retry loops below.
  # Single source of truth so the two steps' retry classifier can never silently diverge.
  TRANSIENT_REGEX: 'toomanyrequests|rate exceeded|\b429\b|TLS handshake timeout|i/o timeout|connection reset by peer'

jobs:
  ci:
    name: ci
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false

      - uses: aws-actions/setup-sam@v3
        with:
          use-installer: true

      # No supabase/setup-cli here on purpose: the Supabase CLI is the lock-pinned
      # `supabase` devDependency (node_modules/.bin/supabase). `npm ci` above installs it,
      # and every DB step below routes through it (db:start/db:reset via scripts/db, and the
      # bare `supabase status` call is invoked as ./node_modules/.bin/supabase). One pinned
      # CLI, no `version: latest` drift between the binary that starts the stack and reads it.

      - name: Run Biome
        run: npx --no-install biome ci . --error-on-warnings

      - name: Lint YAML
        run: npm run check:yaml

      - name: Lint GitHub Actions workflows
        run: npm run check:actions

      - name: Deep type check
        run: npm run check:ts

      - name: Knip (unused code)
        run: npm run check:knip

      - name: Squawk migrations
        run: npm run check:sql

      - name: Deploy function coverage
        run: npm run check:deploy-functions

      - name: Check migration grants (static)
        run: npm run check:migration-grants

      - name: Build Lambda bundle
        run: bash aws/deploy-web.sh --build

      - name: Prepare .env.local
        run: |
          cp env.example .env.local
          {
            echo "DEFAULT_PASSWORD=${DEFAULT_PASSWORD}"
            echo "UNSUBSCRIBE_TOKEN_SECRET=ci-unsubscribe-secret-min-12-chars"
            echo "VERCEL_URL=http://localhost:4322"
            echo "EMAIL_FROM=ci@example.com"
            echo "MASSIVE_API_KEY=ci-massive-api-key"
            echo "FINNHUB_API_KEY=ci-finnhub-api-key"
            echo "EMAIL_SMTP_HOST=localhost"
            echo "EMAIL_SMTP_PORT=1025"
          } >> .env.local

      - name: Start Supabase
        run: |
          set -Eeuo pipefail   # explicit: the `cmd | tee` failure check below must not rely on the runner's default shell flags
          # Retry ONLY on a transient container-registry throttle: the Supabase stack pulls
          # images from public.ecr.aws / Docker Hub, whose anonymous per-IP rate limits are
          # shared across GitHub's runner pool. Any non-throttle failure fails fast so a real
          # error isn't masked by three pointless retries. Backoff gives the per-IP limit time.
          for attempt in 1 2 3; do
            if npm run db:start 2>&1 | tee /tmp/db-start.log; then exit 0; fi
            if ! grep -qiE "$TRANSIENT_REGEX" /tmp/db-start.log; then
              echo "::error::db:start failed for a non-transient reason (see log above); not retrying." >&2
              exit 1
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::db:start hit a transient registry throttle (attempt ${attempt}/3); retrying in $((attempt * 30))s." >&2
              sleep "$((attempt * 30))"
            fi
          done
          echo "::error::db:start still throttled by the container registry after 3 attempts." >&2
          exit 1

      - name: Load Supabase env
        run: |
          ./node_modules/.bin/supabase status -o json > /tmp/sb-status.json
          DB_VARS=$(jq -r '
            "SUPABASE_URL=\(.API_URL // "")",
            "SUPABASE_PUBLISHABLE_KEY=\(.ANON_KEY // "")",
            "SUPABASE_SECRET_KEY=\(.SERVICE_ROLE_KEY // "")",
            "DATABASE_URL=\(.DB_URL // "")"
          ' /tmp/sb-status.json)
          INVALID_DB_VARS=0
          declare -A DB_VARS_SEEN_KEYS=()
          while IFS= read -r LINE; do
            [[ -z "$LINE" ]] && continue
            if [[ "$LINE" != *"="* ]]; then
              echo "Error: Supabase env var line is malformed: $LINE" >&2
              INVALID_DB_VARS=1
              continue
            fi
            KEY="${LINE%%=*}"
            VALUE="${LINE#*=}"
            DB_VARS_SEEN_KEYS["$KEY"]=1
            VALUE_TRIMMED="${VALUE//[[:space:]]/}"
            if [[ -z "$VALUE_TRIMMED" || "$VALUE" == "null" ]]; then
              echo "Error: Supabase status did not provide a valid value for $KEY." >&2
              INVALID_DB_VARS=1
            fi
          done <<< "$DB_VARS"
          for KEY in SUPABASE_URL SUPABASE_PUBLISHABLE_KEY SUPABASE_SECRET_KEY DATABASE_URL; do
            if [[ -z "${DB_VARS_SEEN_KEYS[$KEY]:-}" ]]; then
              echo "Error: Supabase env var $KEY was not produced." >&2
              INVALID_DB_VARS=1
            fi
          done
          if [[ "$INVALID_DB_VARS" -ne 0 ]]; then
            exit 1
          fi
          while IFS= read -r LINE; do
            [[ -z "$LINE" ]] && continue
            KEY="${LINE%%=*}"
            VALUE="${LINE#*=}"
            if grep -q "^${KEY}=" .env.local; then
              sed -i "s|^${KEY}=.*|${KEY}=${VALUE}|" .env.local
            else
              echo "${KEY}=${VALUE}" >> .env.local
            fi
            echo "${KEY}=${VALUE}" >> "$GITHUB_ENV"
          done <<< "$DB_VARS"
          echo "DEFAULT_PASSWORD=${DEFAULT_PASSWORD}" >> "$GITHUB_ENV"

      - name: Reset database
        run: |
          set -Eeuo pipefail   # explicit: the `cmd | tee` failure check below must not rely on the runner's default shell flags
          # Same registry-throttle retry as Start Supabase: db:reset regenerates types via a
          # freshly-pulled postgres-meta container, the exact pull that flakes under rate limits.
          # db:reset is idempotent (stop -> start -> migrate -> seed -> gen-types), so re-running
          # a throttled attempt is safe. Non-throttle failures (bad migration, seed error) fail fast.
          for attempt in 1 2 3; do
            if npm run db:reset 2>&1 | tee /tmp/db-reset.log; then exit 0; fi
            if ! grep -qiE "$TRANSIENT_REGEX" /tmp/db-reset.log; then
              echo "::error::db:reset failed for a non-transient reason (see log above); not retrying." >&2
              exit 1
            fi
            if [ "$attempt" -lt 3 ]; then
              echo "::warning::db:reset hit a transient registry throttle (attempt ${attempt}/3); retrying in $((attempt * 30))s." >&2
              sleep "$((attempt * 30))"
            fi
          done
          echo "::error::db:reset still throttled by the container registry after 3 attempts." >&2
          exit 1

      - name: Verify generated types are checked in
        run: |
          if ! git diff --ignore-space-at-eol --exit-code --quiet src/lib/db/generated/database.types.ts; then
            echo "Detected uncommitted changes to database.types.ts after db:reset."
            git diff src/lib/db/generated/database.types.ts
            exit 1
          fi

      - id: playwright-cache
        uses: actions/cache@v6
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            playwright-${{ runner.os }}-

      - name: Install Playwright
        run: |
          if [[ "${{ steps.playwright-cache.outputs.cache-hit }}" == "true" ]]; then
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: DB doctor
        run: npm run db:doctor

      - name: Check DB privileges
        run: npm run check:db-privileges

      - name: Check notification-option catalog
        run: npm run check:option-catalog

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

      - name: Build application
        run: npm run build

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: .playwright-mcp/cli/
          if-no-files-found: ignore
