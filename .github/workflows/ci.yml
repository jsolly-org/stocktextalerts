name: CI

on:
  pull_request:
  # Post-merge gate: with branch-up-to-date (strict) dropped, PRs no longer prove
  # they were green against the latest main before merging. Running the full battery
  # on the landed main commit is the green-together backstop — it flags a main that
  # two separately-green PRs broke, so it can be fixed forward. Concurrency keys main
  # runs by github.sha (the `|| github.sha` fallback below) and does NOT cancel them.
  push:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

# The repo's default workflow token is RESTRICTED (contents: read only) — without this
# explicit grant the gate step's PR/check-run lookups 403 and silently fail-open, turning
# the run-gating below into a dead feature that always runs the full battery.
permissions:
  contents: read
  pull-requests: read
  checks: read

# PRs / merge queue: one active run per PR or merge entry (supersede cancels).
# Other events: one group per commit SHA.
concurrency:
  group: >-
    ci-${{ github.workflow }}-${{
      github.event.pull_request.number
      || (github.event_name == 'merge_group' && github.event.merge_group.head_sha)
      || github.sha
    }}
  cancel-in-progress: >-
    ${{
      github.event_name == 'pull_request'
      || github.event_name == 'merge_group'
    }}

env:
  CI: true
  DOCKER_HOST: unix:///var/run/docker.sock
  DEFAULT_PASSWORD: ci-local-seed-password
  # Container-registry throttle signature, shared by scripts/db/ci-db-retry.sh
  # (used by ci-bootstrap for start + reset). Single source of truth so the
  # classifier can never silently diverge between those steps.
  TRANSIENT_REGEX: 'toomanyrequests|rate exceeded|\b429\b|TLS handshake timeout|i/o timeout|connection reset by peer'

jobs:
  gate:
    name: gate
    # ARM: ~37% cheaper per minute than the x64 tier ($0.0025 vs $0.004). The test
    # battery is arch-neutral (multi-arch Supabase images, arm64 Chromium, esbuild/
    # sharp ship arm64 builds; deploy.yml deliberately stays on x64 for artifacts
    # that ship to production).
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 5
    outputs:
      static: ${{ steps.decide.outputs.static }}
      heavy: ${{ steps.decide.outputs.heavy }}
      reason: ${{ steps.decide.outputs.reason }}

    steps:
      # Run-gating: decide how much of the battery this event actually needs.
      # Two independent skips, both FAIL-OPEN (any error or ambiguity -> run everything):
      #
      # 1. Tree-identity skip (push to main): a squash merge whose base did not advance
      #    while the PR was open produces a main commit whose TREE is byte-identical to
      #    the PR head tree that the required `ci` check already validated. Re-running
      #    the battery on an identical tree proves nothing — skip everything. When the
      #    trees differ (another PR merged first — the only case the post-merge backstop
      #    exists for), run the full battery. Direct pushes have no merged PR -> full run.
      #
      # 2. Docs-only fast path (pull_request): a diff touching only documentation
      #    (docs/**, any *.md) cannot affect the runtime, DB, or builds — run the static
      #    checks and skip the Supabase/test/build steps. The allowlist is deliberately
      #    conservative: package.json, workflows, config, or anything ambiguous runs the
      #    full battery. The required check remains the final `ci` job.
      #
      # No checkout needed: both decisions use only the event payload + REST API.
      - name: Gate — decide run depth
        id: decide
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          static=true
          heavy=true
          reason="default: full battery"

          if [ "${{ github.event_name }}" = "push" ]; then
            merged_tree=$(gh api "repos/${{ github.repository }}/git/commits/${{ github.sha }}" --jq .tree.sha 2>/dev/null) || merged_tree=""
            pr_head=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              --paginate --jq '[.[] | select(.merge_commit_sha == "${{ github.sha }}")][0].head.sha // empty' 2>/dev/null) || pr_head=""
            if [ -n "$merged_tree" ] && [ -n "$pr_head" ]; then
              pr_tree=$(gh api "repos/${{ github.repository }}/git/commits/${pr_head}" --jq .tree.sha 2>/dev/null) || pr_tree=""
              if [ -n "$pr_tree" ] && [ "$merged_tree" = "$pr_tree" ]; then
                # Trees identical — but only skip if the required ci check actually SUCCEEDED
                # on the PR head. Admin/break-glass merges can land a PR whose ci never ran
                # (enforce_admins is off); assuming validation would skip the backstop for a
                # tree no CI ever touched. Verify, don't assume — fail-open to a full run.
                ci_green=$(gh api "repos/${{ github.repository }}/commits/${pr_head}/check-runs?check_name=ci" \
                  --jq '[.check_runs[] | select(.conclusion == "success")] | length' 2>/dev/null) || ci_green=0
                if [ "${ci_green:-0}" -gt 0 ]; then
                  static=false
                  heavy=false
                  reason="tree-identity skip: merge tree ${merged_tree:0:12} == PR head tree, and a successful ci check-run exists on the PR head (base did not advance)"
                else
                  reason="full battery: trees identical but no successful ci check-run found on the PR head (break-glass/admin merge?)"
                fi
              else
                reason="full battery: merge tree differs from PR head tree (base advanced under the PR) or tree lookup failed"
              fi
            else
              reason="full battery: no merged PR associated with this push (direct push?) or API lookup failed"
            fi

          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
              --paginate --jq '.[].filename' 2>/dev/null) || files=""
            if [ -n "$files" ]; then
              docs_only=true
              while IFS= read -r f; do
                case "$f" in
                  docs/*|*.md) ;;
                  *) docs_only=false; break ;;
                esac
              done <<< "$files"
              if [ "$docs_only" = "true" ]; then
                heavy=false
                reason="docs-only fast path: every changed file matches docs/** or *.md — static checks only"
              else
                reason="full battery: diff touches non-docs paths"
              fi
            else
              reason="full battery: PR file listing unavailable (fail-open)"
            fi
          fi

          {
            echo "static=$static"
            echo "heavy=$heavy"
            printf 'reason=%s\n' "$reason"
          } >> "$GITHUB_OUTPUT"
          echo "gate: static=$static heavy=$heavy — $reason"
          echo "**ci gate:** static=\`$static\` heavy=\`$heavy\` — $reason" >> "$GITHUB_STEP_SUMMARY"

  static:
    name: static checks
    needs: gate
    if: needs.gate.outputs.static == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: false

      - uses: aws-actions/setup-sam@v3
        if: needs.gate.outputs.heavy == 'true'
        with:
          use-installer: true

      - name: Run Biome
        run: npx --no-install biome ci . --error-on-warnings

      - name: Lint YAML
        run: npm run check:yaml

      - name: Lint GitHub Actions workflows
        run: npm run check:actions

      - name: Deep type check
        run: npm run check:ts

      - name: Knip (unused code)
        run: npm run check:knip

      - name: Squawk migrations
        run: npm run check:sql

      - name: Deploy function coverage
        run: npm run check:deploy-functions

      - name: Check migration grants (static)
        run: npm run check:migration-grants

      # Build the Lambda bundle only for code-affecting runs. Docs-only PRs keep
      # the conservative static checks above but skip SAM/esbuild setup entirely.
      - name: Build Lambda bundle
        if: needs.gate.outputs.heavy == 'true'
        run: bash aws/deploy-web.sh --build

  unit-tests:
    name: unit tests (${{ matrix.shard }}/${{ matrix.total }})
    needs: gate
    if: needs.gate.outputs.heavy == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6]
        total: [6]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Stubs for the test battery. Supabase keys are filled in by the background
      # bootstrap after `supabase status`. The unsubscribe stub is concatenated so
      # gitleaks' generic-api-key rule doesn't false-positive on a known CI placeholder
      # (same value as before; not a real secret).
      - name: Prepare .env.local
        run: |
          cp env.example .env.local
          {
            echo "DEFAULT_PASSWORD=${DEFAULT_PASSWORD}"
            echo "UNSUBSCRIBE_TOKEN_SECRET=ci-unsub""scribe-secret-min-12-chars"
            echo "VERCEL_URL=http://localhost:4322"
            echo "EMAIL_FROM=ci@example.com"
            echo "MASSIVE_API_KEY=ci-massive-api-key"
            echo "FINNHUB_API_KEY=ci-finnhub-api-key"
            echo "EMAIL_SMTP_HOST=localhost"
            echo "EMAIL_SMTP_PORT=1025"
          } >> .env.local

      # One background unit per shard: start → write env → reset. Each matrix job
      # runs on an isolated runner/Supabase stack, so sharding preserves the
      # existing serial-in-one-database test behavior inside each shard while
      # reducing wall-clock by running shards in parallel.
      - name: Bootstrap Supabase (background)
        run: |
          set -Eeuo pipefail
          (
            bash scripts/db/ci-bootstrap.sh
            # ci-bootstrap.sh already writes /tmp/ci-bootstrap.rc; this is a belt
            # in case the script is killed before write_rc runs.
            echo $? > /tmp/ci-bootstrap.outer.rc
          ) > /tmp/ci-bootstrap.log 2>&1 &
          echo $! > /tmp/ci-bootstrap.pid
          echo "ci-bootstrap launched in background (pid $(cat /tmp/ci-bootstrap.pid))"

      - name: Wait for Supabase bootstrap
        run: |
          set -Eeuo pipefail
          pid="$(cat /tmp/ci-bootstrap.pid)"
          echo "Waiting for background ci-bootstrap (pid $pid)…"
          # Each `run:` step is a new shell — poll with kill -0 (wait only works
          # for children of THIS shell).
          while kill -0 "$pid" 2>/dev/null; do
            sleep 2
          done
          bg_rc=1
          if [ -f /tmp/ci-bootstrap.rc ]; then
            bg_rc="$(cat /tmp/ci-bootstrap.rc)"
          elif [ -f /tmp/ci-bootstrap.outer.rc ]; then
            bg_rc="$(cat /tmp/ci-bootstrap.outer.rc)"
          fi
          if [ -f /tmp/ci-bootstrap.log ]; then
            echo "——— /tmp/ci-bootstrap.log (tail) ———"
            tail -n 80 /tmp/ci-bootstrap.log || true
            echo "——— end log ———"
          fi
          if [ "$bg_rc" != "0" ]; then
            echo "::error::Background ci-bootstrap failed (rc=$bg_rc); retrying in foreground"
            bash scripts/db/ci-bootstrap.sh
          else
            echo "Background ci-bootstrap succeeded"
          fi
          # Promote env file written by the bootstrap into GITHUB_ENV for later steps.
          if [ ! -f /tmp/ci-bootstrap.env ]; then
            echo "::error::/tmp/ci-bootstrap.env missing after bootstrap" >&2
            exit 1
          fi
          cat /tmp/ci-bootstrap.env >> "$GITHUB_ENV"
          echo "Loaded Supabase env into GITHUB_ENV"

      - name: Verify generated types are checked in
        if: matrix.shard == 1
        run: |
          if ! git diff --ignore-space-at-eol --exit-code --quiet src/lib/db/generated/database.types.ts; then
            echo "Detected uncommitted changes to database.types.ts after db:reset."
            git diff src/lib/db/generated/database.types.ts
            exit 1
          fi

      # npm pretest still runs db:doctor for this shard, so the separate historical
      # DB doctor step is intentionally not duplicated here.
      - name: Unit tests
        run: npm test -- --shard=${{ matrix.shard }}/${{ matrix.total }}

  e2e-tests:
    name: e2e tests (${{ matrix.shard }}/${{ matrix.total }})
    needs: gate
    if: needs.gate.outputs.heavy == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
        total: [2]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Stubs for the test battery. Supabase keys are filled in by the background
      # bootstrap after `supabase status`. The unsubscribe stub is concatenated so
      # gitleaks' generic-api-key rule doesn't false-positive on a known CI placeholder
      # (same value as before; not a real secret).
      - name: Prepare .env.local
        run: |
          cp env.example .env.local
          {
            echo "DEFAULT_PASSWORD=${DEFAULT_PASSWORD}"
            echo "UNSUBSCRIBE_TOKEN_SECRET=ci-unsub""scribe-secret-min-12-chars"
            echo "VERCEL_URL=http://localhost:4322"
            echo "EMAIL_FROM=ci@example.com"
            echo "MASSIVE_API_KEY=ci-massive-api-key"
            echo "FINNHUB_API_KEY=ci-finnhub-api-key"
            echo "EMAIL_SMTP_HOST=localhost"
            echo "EMAIL_SMTP_PORT=1025"
          } >> .env.local

      # One background unit per shard: start → write env → reset. Each matrix job
      # owns its runner-local Supabase stack and Mailpit instance, so the same
      # port numbers are safe across shards.
      - name: Bootstrap Supabase (background)
        run: |
          set -Eeuo pipefail
          (
            bash scripts/db/ci-bootstrap.sh
            # ci-bootstrap.sh already writes /tmp/ci-bootstrap.rc; this is a belt
            # in case the script is killed before write_rc runs.
            echo $? > /tmp/ci-bootstrap.outer.rc
          ) > /tmp/ci-bootstrap.log 2>&1 &
          echo $! > /tmp/ci-bootstrap.pid
          echo "ci-bootstrap launched in background (pid $(cat /tmp/ci-bootstrap.pid))"

      # Sticky disk (~3s mount) beats actions/cache download for browser binaries.
      # No lockfile hash in the key: `playwright install` is idempotent and updates
      # in place when @playwright/test bumps, so Dependabot PRs don't cold-start a
      # new empty disk. Arch is required — runner.os is "Linux" on both x64 and ARM.
      - name: Mount Playwright browsers (sticky disk)
        uses: useblacksmith/stickydisk@v1
        with:
          key: playwright-shell-${{ runner.os }}-${{ runner.arch }}
          path: ~/.cache/ms-playwright

      # Background so a cold download + apt install-deps overlaps background
      # db:start/reset. Warm sticky-disk runs finish in seconds (browser install is
      # a no-op verify; apt still runs once per runner via /tmp marker — apt
      # packages are not on the sticky disk).
      - name: Install Playwright (background)
        run: |
          set -Eeuo pipefail
          # Exit status goes to /tmp/playwright-install.rc — later steps can't
          # `wait` this pid (each run: is a new shell).
          nohup bash scripts/db/ci-playwright-install.sh \
            > /tmp/playwright-install.log 2>&1 &
          echo $! > /tmp/playwright-install.pid
          echo "Playwright install launched in background (pid $(cat /tmp/playwright-install.pid))"

      - name: Wait for Supabase bootstrap
        run: |
          set -Eeuo pipefail
          pid="$(cat /tmp/ci-bootstrap.pid)"
          echo "Waiting for background ci-bootstrap (pid $pid)…"
          # Each `run:` step is a new shell — poll with kill -0 (wait only works
          # for children of THIS shell).
          while kill -0 "$pid" 2>/dev/null; do
            sleep 2
          done
          bg_rc=1
          if [ -f /tmp/ci-bootstrap.rc ]; then
            bg_rc="$(cat /tmp/ci-bootstrap.rc)"
          elif [ -f /tmp/ci-bootstrap.outer.rc ]; then
            bg_rc="$(cat /tmp/ci-bootstrap.outer.rc)"
          fi
          if [ -f /tmp/ci-bootstrap.log ]; then
            echo "——— /tmp/ci-bootstrap.log (tail) ———"
            tail -n 80 /tmp/ci-bootstrap.log || true
            echo "——— end log ———"
          fi
          if [ "$bg_rc" != "0" ]; then
            echo "::error::Background ci-bootstrap failed (rc=$bg_rc); retrying in foreground"
            bash scripts/db/ci-bootstrap.sh
          else
            echo "Background ci-bootstrap succeeded"
          fi
          # Promote env file written by the bootstrap into GITHUB_ENV for later steps.
          if [ ! -f /tmp/ci-bootstrap.env ]; then
            echo "::error::/tmp/ci-bootstrap.env missing after bootstrap" >&2
            exit 1
          fi
          cat /tmp/ci-bootstrap.env >> "$GITHUB_ENV"
          echo "Loaded Supabase env into GITHUB_ENV"

      - name: Wait for Playwright
        run: |
          set -Eeuo pipefail
          pid="$(cat /tmp/playwright-install.pid)"
          echo "Waiting for background Playwright install (pid $pid)…"
          # Poll — `wait` only works for children of this shell (each step is new).
          while kill -0 "$pid" 2>/dev/null; do
            sleep 2
          done
          bg_rc=1
          if [ -f /tmp/playwright-install.rc ]; then
            bg_rc="$(cat /tmp/playwright-install.rc)"
          fi
          if [ -f /tmp/playwright-install.log ]; then
            echo "——— /tmp/playwright-install.log (tail) ———"
            tail -n 40 /tmp/playwright-install.log || true
            echo "——— end log ———"
          fi
          if [ "$bg_rc" = "0" ]; then
            echo "Background Playwright install succeeded"
            exit 0
          fi
          if [[ -d "${HOME}/.cache/ms-playwright" ]] && compgen -G "${HOME}/.cache/ms-playwright/chromium_headless_shell-*" > /dev/null; then
            echo "chromium-headless-shell present despite background exit $bg_rc — continuing"
            exit 0
          fi
          echo "::warning::Background Playwright install failed (rc=$bg_rc); retrying in foreground"
          bash scripts/db/ci-playwright-install.sh

      # npm pretest:e2e still runs db:doctor for this shard, so the separate
      # historical DB doctor step is intentionally not duplicated here.
      - name: E2E tests
        run: npm run test:e2e -- --shard=${{ matrix.shard }}/${{ matrix.total }}

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces-${{ matrix.shard }}-of-${{ matrix.total }}
          path: .playwright-mcp/cli/
          if-no-files-found: ignore

  app-build:
    name: app build
    needs: gate
    if: needs.gate.outputs.heavy == 'true'
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      # Build needs validated env values but should not need a live Supabase stack.
      # Keep these CI-only stubs deterministic and side-effect-free.
      - name: Prepare .env.local
        run: |
          cp env.example .env.local
          {
            echo "DEFAULT_PASSWORD=${DEFAULT_PASSWORD}"
            echo "UNSUBSCRIBE_TOKEN_SECRET=ci-unsub""scribe-secret-min-12-chars"
            echo "VERCEL_URL=http://localhost:4322"
            echo "EMAIL_FROM=ci@example.com"
            echo "MASSIVE_API_KEY=ci-massive-api-key"
            echo "FINNHUB_API_KEY=ci-finnhub-api-key"
            echo "EMAIL_SMTP_HOST=localhost"
            echo "EMAIL_SMTP_PORT=1025"
          } >> .env.local

      - name: Build application
        run: npm run build

  # Branch protection requires `CI / ci`. Keep this final aggregator named `ci`
  # while fan-out jobs do the expensive work. It passes only when the jobs that
  # the gate decided to run succeeded; any unexpected skip/fail/cancel fails closed.
  ci:
    name: ci
    needs: [gate, static, unit-tests, e2e-tests, app-build]
    if: always()
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 5

    steps:
      - name: Verify CI fan-out results
        env:
          GATE_RESULT: ${{ needs.gate.result }}
          STATIC_GATE: ${{ needs.gate.outputs.static }}
          HEAVY_GATE: ${{ needs.gate.outputs.heavy }}
          GATE_REASON: ${{ needs.gate.outputs.reason }}
          STATIC_RESULT: ${{ needs.static.result }}
          UNIT_RESULT: ${{ needs.unit-tests.result }}
          E2E_RESULT: ${{ needs.e2e-tests.result }}
          BUILD_RESULT: ${{ needs.app-build.result }}
        run: |
          set -Eeuo pipefail

          echo "gate result: ${GATE_RESULT}"
          echo "gate decision: static=${STATIC_GATE:-<empty>} heavy=${HEAVY_GATE:-<empty>}"
          echo "gate reason: ${GATE_REASON:-<empty>}"
          echo "static result: ${STATIC_RESULT}"
          echo "unit result: ${UNIT_RESULT}"
          echo "e2e result: ${E2E_RESULT}"
          echo "build result: ${BUILD_RESULT}"

          {
            echo "## CI fan-out summary"
            echo
            echo "- gate: \`${GATE_RESULT}\`"
            echo "- decision: static=\`${STATIC_GATE:-<empty>}\`, heavy=\`${HEAVY_GATE:-<empty>}\`"
            echo "- reason: ${GATE_REASON:-<empty>}"
            echo "- static: \`${STATIC_RESULT}\`"
            echo "- unit shards: \`${UNIT_RESULT}\`"
            echo "- e2e shards: \`${E2E_RESULT}\`"
            echo "- app build: \`${BUILD_RESULT}\`"
          } >> "$GITHUB_STEP_SUMMARY"

          fail=0
          require_result() {
            local label="$1"
            local actual="$2"
            local expected="$3"
            if [ "$actual" != "$expected" ]; then
              echo "::error::${label} result was '${actual}', expected '${expected}'"
              fail=1
            fi
          }

          require_result "gate" "$GATE_RESULT" "success"

          if [ "${STATIC_GATE}" = "false" ] && [ "${HEAVY_GATE}" = "false" ]; then
            require_result "static checks" "$STATIC_RESULT" "skipped"
            require_result "unit tests" "$UNIT_RESULT" "skipped"
            require_result "e2e tests" "$E2E_RESULT" "skipped"
            require_result "app build" "$BUILD_RESULT" "skipped"
          elif [ "${STATIC_GATE}" = "true" ] && [ "${HEAVY_GATE}" = "false" ]; then
            require_result "static checks" "$STATIC_RESULT" "success"
            require_result "unit tests" "$UNIT_RESULT" "skipped"
            require_result "e2e tests" "$E2E_RESULT" "skipped"
            require_result "app build" "$BUILD_RESULT" "skipped"
          elif [ "${STATIC_GATE}" = "true" ] && [ "${HEAVY_GATE}" = "true" ]; then
            require_result "static checks" "$STATIC_RESULT" "success"
            require_result "unit tests" "$UNIT_RESULT" "success"
            require_result "e2e tests" "$E2E_RESULT" "success"
            require_result "app build" "$BUILD_RESULT" "success"
          else
            echo "::error::Unexpected gate outputs: static='${STATIC_GATE}' heavy='${HEAVY_GATE}'"
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            exit 1
          fi

          echo "CI fan-out results accepted."
