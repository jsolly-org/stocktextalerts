name: Shared CI

on:
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.3.13
      - name: Run Biome
        run: biome ci .
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Deep Type check
        run: npm run check:ts
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: "2.58.5"
      - name: Start Supabase
        run: supabase start
      - name: Wait for Supabase
        run: |
          echo "Waiting for Supabase services to be ready..."
          for i in $(seq 1 30); do
            if supabase status -o json > /tmp/supabase-status.json 2>/dev/null; then
              API_URL=$(jq -r '.API_URL // empty' /tmp/supabase-status.json)
              if [[ -n "$API_URL" ]]; then
                echo "Supabase ready (attempt $i)"
                exit 0
              fi
            fi
            echo "Waiting... ($i/30)"
            sleep 2
          done
          echo "Supabase failed to become ready"
          exit 1
      - name: Load Supabase env
        run: |
          supabase status -o json > /tmp/sb-status.json
          jq -r '
            "PUBLIC_SUPABASE_URL=\(.API_URL)",
            "PUBLIC_SUPABASE_ANON_KEY=\(.ANON_KEY)",
            "SUPABASE_SERVICE_ROLE_KEY=\(.SERVICE_ROLE_KEY)",
            "DATABASE_URL=\(.DB_URL)",
            "CRON_SECRET=ci-cron-secret"
          ' /tmp/sb-status.json > .env.local
          jq -r '
            "PUBLIC_SUPABASE_URL=\(.API_URL)",
            "PUBLIC_SUPABASE_ANON_KEY=\(.ANON_KEY)",
            "SUPABASE_SERVICE_ROLE_KEY=\(.SERVICE_ROLE_KEY)",
            "DATABASE_URL=\(.DB_URL)"
          ' /tmp/sb-status.json >> $GITHUB_ENV
          echo "CRON_SECRET=ci-cron-secret" >> $GITHUB_ENV
      - name: Test
        run: npm test
      - name: Build application
        run: npm run build
