name: CI

on:
  pull_request:
  # Post-merge gate: with branch-up-to-date (strict) dropped, PRs no longer prove
  # they were green against the latest main before merging. Running the full battery
  # on the landed main commit is the green-together backstop — it flags a main that
  # two separately-green PRs broke, so it can be fixed forward. Concurrency keys main
  # runs by github.sha (the `|| github.sha` fallback below) and does NOT cancel them.
  push:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

# The repo's default workflow token is RESTRICTED (contents: read only) — without this
# explicit grant the gate step's PR/check-run lookups 403 and silently fail-open, turning
# the run-gating below into a dead feature that always runs the full battery.
permissions:
  contents: read
  pull-requests: read
  checks: read

# PRs / merge queue: one active run per PR or merge entry (supersede cancels).
# Other events: one group per commit SHA.
concurrency:
  group: >-
    ci-${{ github.workflow }}-${{
      github.event.pull_request.number
      || (github.event_name == 'merge_group' && github.event.merge_group.head_sha)
      || github.sha
    }}
  cancel-in-progress: >-
    ${{
      github.event_name == 'pull_request'
      || github.event_name == 'merge_group'
    }}

env:
  CI: true
  DOCKER_HOST: unix:///var/run/docker.sock
  DEFAULT_PASSWORD: ci-local-seed-password
  # Container-registry throttle signature, shared by scripts/db/ci-db-retry.sh
  # (background db:start + db:reset). Single source of truth so the classifier
  # can never silently diverge between those steps.
  TRANSIENT_REGEX: 'toomanyrequests|rate exceeded|\b429\b|TLS handshake timeout|i/o timeout|connection reset by peer'

jobs:
  ci:
    name: ci
    # ARM: ~37% cheaper per minute than the x64 tier ($0.0025 vs $0.004). The test
    # battery is arch-neutral (multi-arch Supabase images, arm64 Chromium, esbuild/
    # sharp ship arm64 builds; the Lambda bundle here is a build CHECK — the artifact
    # that ships is built by deploy.yml, which deliberately stays on x64).
    runs-on: blacksmith-4vcpu-ubuntu-2404-arm
    timeout-minutes: 45

    steps:
      # Run-gating: decide how much of the battery this event actually needs.
      # Two independent skips, both FAIL-OPEN (any error or ambiguity -> run everything):
      #
      # 1. Tree-identity skip (push to main): a squash merge whose base did not advance
      #    while the PR was open produces a main commit whose TREE is byte-identical to
      #    the PR head tree that the required `ci` check already validated. Re-running
      #    the battery on an identical tree proves nothing — skip everything. When the
      #    trees differ (another PR merged first — the only case the post-merge backstop
      #    exists for), run the full battery. Direct pushes have no merged PR -> full run.
      #
      # 2. Docs-only fast path (pull_request): a diff touching only documentation
      #    (docs/**, any *.md) cannot affect the runtime, DB, or builds — run the static
      #    checks (lint/types/knip/sql) and skip the Supabase/test/build steps. The
      #    allowlist is deliberately conservative: package.json, workflows, config, or
      #    anything ambiguous runs the full battery. The required check stays `ci`.
      #
      # No checkout needed: both decisions use only the event payload + REST API.
      - name: Gate — decide run depth
        id: gate
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -uo pipefail
          static=true
          heavy=true
          reason="default: full battery"

          if [ "${{ github.event_name }}" = "push" ]; then
            merged_tree=$(gh api "repos/${{ github.repository }}/git/commits/${{ github.sha }}" --jq .tree.sha 2>/dev/null) || merged_tree=""
            pr_head=$(gh api "repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              --paginate --jq '[.[] | select(.merge_commit_sha == "${{ github.sha }}")][0].head.sha // empty' 2>/dev/null) || pr_head=""
            if [ -n "$merged_tree" ] && [ -n "$pr_head" ]; then
              pr_tree=$(gh api "repos/${{ github.repository }}/git/commits/${pr_head}" --jq .tree.sha 2>/dev/null) || pr_tree=""
              if [ -n "$pr_tree" ] && [ "$merged_tree" = "$pr_tree" ]; then
                # Trees identical — but only skip if the required ci check actually SUCCEEDED
                # on the PR head. Admin/break-glass merges can land a PR whose ci never ran
                # (enforce_admins is off); assuming validation would skip the backstop for a
                # tree no CI ever touched. Verify, don't assume — fail-open to a full run.
                ci_green=$(gh api "repos/${{ github.repository }}/commits/${pr_head}/check-runs?check_name=ci" \
                  --jq '[.check_runs[] | select(.conclusion == "success")] | length' 2>/dev/null) || ci_green=0
                if [ "${ci_green:-0}" -gt 0 ]; then
                  static=false
                  heavy=false
                  reason="tree-identity skip: merge tree ${merged_tree:0:12} == PR head tree, and a successful ci check-run exists on the PR head (base did not advance)"
                else
                  reason="full battery: trees identical but no successful ci check-run found on the PR head (break-glass/admin merge?)"
                fi
              else
                reason="full battery: merge tree differs from PR head tree (base advanced under the PR) or tree lookup failed"
              fi
            else
              reason="full battery: no merged PR associated with this push (direct push?) or API lookup failed"
            fi

          elif [ "${{ github.event_name }}" = "pull_request" ]; then
            files=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/files" \
              --paginate --jq '.[].filename' 2>/dev/null) || files=""
            if [ -n "$files" ]; then
              docs_only=true
              while IFS= read -r f; do
                case "$f" in
                  docs/*|*.md) ;;
                  *) docs_only=false; break ;;
                esac
              done <<< "$files"
              if [ "$docs_only" = "true" ]; then
                heavy=false
                reason="docs-only fast path: every changed file matches docs/** or *.md — static checks only"
              else
                reason="full battery: diff touches non-docs paths"
              fi
            else
              reason="full battery: PR file listing unavailable (fail-open)"
            fi
          fi

          echo "static=$static" >> "$GITHUB_OUTPUT"
          echo "heavy=$heavy" >> "$GITHUB_OUTPUT"
          echo "gate: static=$static heavy=$heavy — $reason"
          echo "**ci gate:** static=\`$static\` heavy=\`$heavy\` — $reason" >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/checkout@v7
        if: steps.gate.outputs.static == 'true'

      - uses: actions/setup-node@v6
        if: steps.gate.outputs.static == 'true'
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        if: steps.gate.outputs.static == 'true'
        run: npm ci

      # Kick off Supabase image pulls in the background so they overlap static checks,
      # sam build, and Playwright install (~30–45s wall saved). The wait step below
      # joins the background job and retries on transient registry throttle via the
      # shared scripts/db/ci-db-retry.sh classifier.
      - name: Start Supabase (background)
        if: steps.gate.outputs.heavy == 'true'
        run: |
          set -Eeuo pipefail
          # Write exit status to a file — later steps can't `wait` this pid (new shell).
          nohup bash -c '
            bash scripts/db/ci-db-retry.sh db:start /tmp/db-start.log
            echo $? > /tmp/db-start.rc
          ' > /tmp/db-start.nohup.out 2>&1 &
          echo $! > /tmp/db-start.pid
          echo "db:start launched in background (pid $(cat /tmp/db-start.pid))"

      # Sticky disk (~3s mount) beats actions/cache download for browser binaries.
      # No lockfile hash in the key: `playwright install` is idempotent and updates
      # in place when @playwright/test bumps, so Dependabot PRs don't cold-start a
      # new empty disk. Arch is required — runner.os is "Linux" on both x64 and ARM.
      - name: Mount Playwright browsers (sticky disk)
        if: steps.gate.outputs.heavy == 'true'
        uses: useblacksmith/stickydisk@v1
        with:
          key: playwright-shell-${{ runner.os }}-${{ runner.arch }}
          path: ~/.cache/ms-playwright

      # Background so a cold download + one-time apt install-deps overlaps static
      # checks / sam build / background db:start. Warm sticky-disk runs finish in
      # seconds (install is a no-op verify; apt skipped via marker on the disk).
      - name: Install Playwright (background)
        if: steps.gate.outputs.heavy == 'true'
        run: |
          set -Eeuo pipefail
          nohup bash -c '
            set +e
            set -uo pipefail
            npx playwright install --only-shell
            rc=$?
            if [ "$rc" -eq 0 ]; then
              DEPS_MARKER="${HOME}/.cache/ms-playwright/.ci-deps-installed"
              if [[ ! -f "$DEPS_MARKER" ]]; then
                echo "No OS-deps marker on sticky disk — running playwright install-deps once"
                npx playwright install-deps
                rc=$?
                if [ "$rc" -eq 0 ]; then
                  touch "$DEPS_MARKER"
                fi
              else
                echo "OS-deps marker present — skipping install-deps"
              fi
            fi
            echo "$rc" > /tmp/playwright-install.rc
            exit "$rc"
          ' > /tmp/playwright-install.log 2>&1 &
          echo $! > /tmp/playwright-install.pid
          echo "Playwright install launched in background (pid $(cat /tmp/playwright-install.pid))"

      - uses: astral-sh/setup-uv@v8.2.0
        if: steps.gate.outputs.static == 'true'
        with:
          enable-cache: false

      - uses: aws-actions/setup-sam@v3
        if: steps.gate.outputs.heavy == 'true'
        with:
          use-installer: true

      # No supabase/setup-cli here on purpose: the Supabase CLI is the lock-pinned
      # `supabase` devDependency (node_modules/.bin/supabase). `npm ci` above installs it,
      # and every DB step below routes through it (db:start/db:reset via scripts/db, and the
      # bare `supabase status` call is invoked as ./node_modules/.bin/supabase). One pinned
      # CLI, no `version: latest` drift between the binary that starts the stack and reads it.

      - name: Run Biome
        if: steps.gate.outputs.static == 'true'
        run: npx --no-install biome ci . --error-on-warnings

      - name: Lint YAML
        if: steps.gate.outputs.static == 'true'
        run: npm run check:yaml

      - name: Lint GitHub Actions workflows
        if: steps.gate.outputs.static == 'true'
        run: npm run check:actions

      - name: Deep type check
        if: steps.gate.outputs.static == 'true'
        run: npm run check:ts

      - name: Knip (unused code)
        if: steps.gate.outputs.static == 'true'
        run: npm run check:knip

      - name: Squawk migrations
        if: steps.gate.outputs.static == 'true'
        run: npm run check:sql

      - name: Deploy function coverage
        if: steps.gate.outputs.static == 'true'
        run: npm run check:deploy-functions

      - name: Check migration grants (static)
        if: steps.gate.outputs.static == 'true'
        run: npm run check:migration-grants

      - name: Build Lambda bundle
        if: steps.gate.outputs.heavy == 'true'
        run: bash aws/deploy-web.sh --build

      - name: Prepare .env.local
        if: steps.gate.outputs.heavy == 'true'
        run: |
          cp env.example .env.local
          {
            echo "DEFAULT_PASSWORD=${DEFAULT_PASSWORD}"
            echo "UNSUBSCRIBE_TOKEN_SECRET=ci-unsubscribe-secret-min-12-chars"
            echo "VERCEL_URL=http://localhost:4322"
            echo "EMAIL_FROM=ci@example.com"
            echo "MASSIVE_API_KEY=ci-massive-api-key"
            echo "FINNHUB_API_KEY=ci-finnhub-api-key"
            echo "EMAIL_SMTP_HOST=localhost"
            echo "EMAIL_SMTP_PORT=1025"
          } >> .env.local

      - name: Wait for Supabase
        if: steps.gate.outputs.heavy == 'true'
        run: |
          set -Eeuo pipefail
          pid="$(cat /tmp/db-start.pid)"
          echo "Waiting for background db:start (pid $pid)…"
          # Each `run:` step is a new shell — `wait $pid` only works for children of
          # THIS shell, so poll with kill -0 instead of wait.
          while kill -0 "$pid" 2>/dev/null; do
            sleep 2
          done
          # Reap exit status via a status file the background launcher writes, or
          # fall back to supabase status / foreground retry.
          bg_rc=1
          if [ -f /tmp/db-start.rc ]; then
            bg_rc="$(cat /tmp/db-start.rc)"
          fi
          if [ "$bg_rc" = "0" ]; then
            echo "Background db:start succeeded"
            exit 0
          fi
          if [ -f /tmp/db-start.log ]; then
            echo "——— /tmp/db-start.log ———"
            cat /tmp/db-start.log || true
            echo "——— end log ———"
          fi
          if [ -f /tmp/db-start.nohup.out ]; then
            echo "——— /tmp/db-start.nohup.out ———"
            cat /tmp/db-start.nohup.out || true
            echo "——— end nohup ———"
          fi
          if ./node_modules/.bin/supabase status >/dev/null 2>&1; then
            echo "Supabase is up despite background exit $bg_rc — continuing"
            exit 0
          fi
          echo "::warning::Background db:start failed (rc=$bg_rc); retrying in foreground via ci-db-retry.sh"
          bash scripts/db/ci-db-retry.sh db:start /tmp/db-start-fg.log

      - name: Load Supabase env
        if: steps.gate.outputs.heavy == 'true'
        run: |
          ./node_modules/.bin/supabase status -o json > /tmp/sb-status.json
          DB_VARS=$(jq -r '
            "SUPABASE_URL=\(.API_URL // "")",
            "SUPABASE_PUBLISHABLE_KEY=\(.ANON_KEY // "")",
            "SUPABASE_SECRET_KEY=\(.SERVICE_ROLE_KEY // "")",
            "DATABASE_URL=\(.DB_URL // "")"
          ' /tmp/sb-status.json)
          INVALID_DB_VARS=0
          declare -A DB_VARS_SEEN_KEYS=()
          while IFS= read -r LINE; do
            [[ -z "$LINE" ]] && continue
            if [[ "$LINE" != *"="* ]]; then
              echo "Error: Supabase env var line is malformed: $LINE" >&2
              INVALID_DB_VARS=1
              continue
            fi
            KEY="${LINE%%=*}"
            VALUE="${LINE#*=}"
            DB_VARS_SEEN_KEYS["$KEY"]=1
            VALUE_TRIMMED="${VALUE//[[:space:]]/}"
            if [[ -z "$VALUE_TRIMMED" || "$VALUE" == "null" ]]; then
              echo "Error: Supabase status did not provide a valid value for $KEY." >&2
              INVALID_DB_VARS=1
            fi
          done <<< "$DB_VARS"
          for KEY in SUPABASE_URL SUPABASE_PUBLISHABLE_KEY SUPABASE_SECRET_KEY DATABASE_URL; do
            if [[ -z "${DB_VARS_SEEN_KEYS[$KEY]:-}" ]]; then
              echo "Error: Supabase env var $KEY was not produced." >&2
              INVALID_DB_VARS=1
            fi
          done
          if [[ "$INVALID_DB_VARS" -ne 0 ]]; then
            exit 1
          fi
          while IFS= read -r LINE; do
            [[ -z "$LINE" ]] && continue
            KEY="${LINE%%=*}"
            VALUE="${LINE#*=}"
            if grep -q "^${KEY}=" .env.local; then
              sed -i "s|^${KEY}=.*|${KEY}=${VALUE}|" .env.local
            else
              echo "${KEY}=${VALUE}" >> .env.local
            fi
            echo "${KEY}=${VALUE}" >> "$GITHUB_ENV"
          done <<< "$DB_VARS"
          echo "DEFAULT_PASSWORD=${DEFAULT_PASSWORD}" >> "$GITHUB_ENV"

      - name: Reset database
        if: steps.gate.outputs.heavy == 'true'
        run: |
          set -Eeuo pipefail
          # Same registry-throttle retry as Start Supabase (shared script). db:reset
          # regenerates types via a freshly-pulled postgres-meta container — the exact
          # pull that flakes under rate limits. Idempotent, so re-running a throttled
          # attempt is safe. Non-throttle failures (bad migration, seed error) fail fast.
          # Also runs check:db-privileges + check:option-catalog (see scripts/db/reset.ts)
          # — do not re-add those as standalone CI steps.
          bash scripts/db/ci-db-retry.sh db:reset /tmp/db-reset.log

      - name: Verify generated types are checked in
        if: steps.gate.outputs.heavy == 'true'
        run: |
          if ! git diff --ignore-space-at-eol --exit-code --quiet src/lib/db/generated/database.types.ts; then
            echo "Detected uncommitted changes to database.types.ts after db:reset."
            git diff src/lib/db/generated/database.types.ts
            exit 1
          fi

      - name: Wait for Playwright
        if: steps.gate.outputs.heavy == 'true'
        run: |
          set -Eeuo pipefail
          pid="$(cat /tmp/playwright-install.pid)"
          echo "Waiting for background Playwright install (pid $pid)…"
          # Poll — `wait` only works for children of this shell (each step is new).
          while kill -0 "$pid" 2>/dev/null; do
            sleep 2
          done
          bg_rc=1
          if [ -f /tmp/playwright-install.rc ]; then
            bg_rc="$(cat /tmp/playwright-install.rc)"
          fi
          if [ -f /tmp/playwright-install.log ]; then
            echo "——— /tmp/playwright-install.log (tail) ———"
            tail -n 40 /tmp/playwright-install.log || true
            echo "——— end log ———"
          fi
          if [ "$bg_rc" = "0" ]; then
            echo "Background Playwright install succeeded"
            exit 0
          fi
          if [[ -d "${HOME}/.cache/ms-playwright" ]] && compgen -G "${HOME}/.cache/ms-playwright/chromium_headless_shell-*" > /dev/null; then
            echo "chromium-headless-shell present despite background exit $bg_rc — continuing"
            exit 0
          fi
          echo "::warning::Background Playwright install failed (rc=$bg_rc); retrying in foreground"
          npx playwright install --only-shell
          DEPS_MARKER="${HOME}/.cache/ms-playwright/.ci-deps-installed"
          if [[ ! -f "$DEPS_MARKER" ]]; then
            npx playwright install-deps
            touch "$DEPS_MARKER"
          fi
          echo 0 > /tmp/playwright-install.rc

      - name: DB doctor
        if: steps.gate.outputs.heavy == 'true'
        run: npm run db:doctor

      - name: Unit tests
        if: steps.gate.outputs.heavy == 'true'
        run: npm test

      - name: E2E tests
        if: steps.gate.outputs.heavy == 'true'
        run: npm run test:e2e

      - name: Build application
        if: steps.gate.outputs.heavy == 'true'
        run: npm run build

      - name: Upload Playwright traces
        if: failure() && steps.gate.outputs.heavy == 'true'
        uses: actions/upload-artifact@v7
        with:
          name: playwright-traces
          path: .playwright-mcp/cli/
          if-no-files-found: ignore
