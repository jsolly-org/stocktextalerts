name: Shared CI

on:
  workflow_call:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Biome
        uses: biomejs/setup-biome@v2
        with:
          version: 2.3.13
      - name: Run Biome
        run: biome ci .
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Deep Type check
        run: npm run check:ts
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.74.3
      - name: Start Supabase
        run: supabase start
      - name: Load Supabase env
        run: |
          supabase status -o env | sed 's/^export //' > supabase.env
          set -a
          . ./supabase.env
          set +a
          echo "PUBLIC_SUPABASE_URL=$API_URL" >> $GITHUB_ENV
          echo "PUBLIC_SUPABASE_ANON_KEY=$ANON_KEY" >> $GITHUB_ENV
          echo "SUPABASE_SERVICE_ROLE_KEY=$SERVICE_ROLE_KEY" >> $GITHUB_ENV
          echo "DATABASE_URL=$DB_URL" >> $GITHUB_ENV
          echo "CRON_SECRET=ci-cron-secret" >> $GITHUB_ENV
      - name: Test
        run: npm test
      - name: Build application
        run: npm run build
