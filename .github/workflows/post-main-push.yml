# Runs after every push to dev. Creates up to 3 follow-up GitHub issues based
# on the recent changes, and updates documentation files (README, FAQ,
# HowItWorks) to reflect the latest code.
name: Post Main Push

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

jobs:
  create-issues:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.actor == 'jsolly') && github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: dev
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        uses: ./.github/actions/setup-cursor

      - name: Create follow-up issues
        env:
          MODEL: ${{ vars.AGENT_MODEL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          agent -p "You are operating in a GitHub Actions runner.

          The GitHub CLI is available as \`gh\` and authenticated via \`GH_TOKEN\`. Git is available. You have read-only access to repository contents and write access to issues.

          # Context:
          - Repo: ${{ github.repository }}
          - Owner: ${{ github.repository_owner }}
          - Trigger: ${{ github.event_name }}
          - Before SHA: ${{ github.event.before }}
          - After SHA: ${{ github.sha }}
          - Actor: ${{ github.actor }}

          # Goal:
          Create high-quality follow-up GitHub issues inspired by the changes just pushed to dev. Quality over quantity — zero issues is perfectly fine.

          # Phase 1 — Understand the changes:
          - If Trigger is \`push\`: run \`git log ${{ github.event.before }}..${{ github.sha }} --format='%H %s'\` and \`git diff ${{ github.event.before }}..${{ github.sha }}\` to understand what changed. Also try to find an associated merged PR: \`gh pr list --search '${{ github.sha }}' --state merged --json number,title,url --limit 1\`.
          - If Trigger is \`workflow_dispatch\`: review the latest 3 commits on \`dev\` using \`git log -3 --format='%H %s'\` and \`git diff HEAD~3..HEAD\` to understand recent changes.

          # Phase 2 — Check existing issues:
          - Fetch open issues: \`gh issue list --state open --limit 50 --json number,title,body,labels\`
          - Fetch recently closed issues: \`gh issue list --state closed --limit 20 --json number,title,body,labels\`
          - Use these to avoid creating duplicates or issues that were already addressed.

          # Phase 3 — Brainstorm and filter:
          Consider these categories:
          - Follow-up features that naturally extend the pushed changes
          - Edge cases or error handling gaps revealed by the diff
          - UX improvements for any UI changes
          - Missing or insufficient test coverage
          - Performance or security considerations

          Apply these quality filters aggressively:
          - Would a senior developer consider this issue worth filing? If not, skip it.
          - Is the issue specific and actionable (not vague like 'improve performance')? If not, skip it.
          - Does a similar open or recently closed issue already exist? If so, skip it.
          - Is this something the author likely already considered and intentionally left out? If so, skip it.
          - Is this a trivial nitpick or stylistic preference? If so, skip it.

          # Phase 4 — Create issues:
          For each issue that passes all filters (maximum 3, fewer is better, zero is fine):
          1. Choose a label: \`enhancement\` for features/improvements, \`bug\` for defects.
          2. Create the issue with:
             \`\`\`
             gh issue create \\
               --title \"<concise title>\" \\
               --label \"<enhancement or bug>,bot-generated\" \\
               --body \"## Summary
             <1-2 sentence description>

             ## Requirements
             - <specific requirement 1>
             - <specific requirement 2>

             ## Motivation
             <why this matters, referencing the change context>

             ---
             *Auto-generated from push ${{ github.sha }} by the create-issues workflow.*\"
             \`\`\`

          # Strict rules:
          - Do NOT modify any files, create commits, or push anything.
          - Do NOT create more than 3 issues. Zero issues is a valid outcome.
          - Do NOT create vague, low-value, or duplicate issues.
          - Every issue MUST have both the category label AND the \`bot-generated\` label.
          - Every issue body MUST end with the auto-generated footer.

          # Output:
          After completing all phases, print a summary:
          - ISSUES_CREATED=<number>
          - For each issue created, print: ISSUE_URL=<url>
          - If zero issues were created, print: NO_ISSUES_NEEDED
          " --force --model "$MODEL" --output-format=text

      - name: Drop workflow file edits
        run: |
          if git diff --name-only -- .github/workflows .github/actions | grep -q .; then
            echo "Reverting workflow and action file edits from agent output."
            git restore --staged --worktree -- .github/workflows .github/actions
          fi

      - name: Log results
        run: |
          echo "---"
          echo "Issues with bot-generated label:"
          gh issue list --label "bot-generated" --state open --limit 5 --json number,title,url
          echo "---"

  update-docs:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.actor == 'jsolly') && github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2
        with:
          ref: dev
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6.2.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        uses: ./.github/actions/setup-cursor

      - name: Update docs
        env:
          MODEL: ${{ vars.AGENT_MODEL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          agent -p "You are operating in a GitHub Actions runner.

          The GitHub CLI is available as \`gh\` and authenticated via \`GH_TOKEN\`. Git is available.

          # Context:
          - Repo: ${{ github.repository }}
          - Owner: ${{ github.repository_owner }}
          - Trigger: ${{ github.event_name }}
          - Before SHA: ${{ github.event.before }}
          - After SHA: ${{ github.sha }}
          - Actor: ${{ github.actor }}

          # Goal:
          - Update docs on \`dev\`. Leave all changes uncommitted — the workflow will handle commit and push.

          # Allowed files (ONLY these may be modified):
          - \`README.md\` — project documentation
          - \`src/pages/faq.astro\` — FAQ page (question/answer pairs in the \`faqs\` array and page copy)
          - \`src/components/landing/HowItWorks.astro\` — \"How it works\" section (steps in the \`steps\` array and section copy)

          # Requirements:
          1) If Trigger is \`push\` (Before SHA and After SHA are set): determine what changed using \`git diff ${{ github.event.before }}..${{ github.sha }}\` or \`git log ${{ github.event.before }}..${{ github.sha }} --format='%H %s'\`. Update the allowed files if the changes warrant it.
          2) If Trigger is \`workflow_dispatch\` (manual run; SHAs may be empty): review the current state of the codebase on \`dev\` and update the allowed files to accurately reflect it.
          3) Only modify the allowed files listed above. Do NOT touch any other files.
          4) For \`src/pages/faq.astro\`: only update the \`faqs\` array entries and surrounding page copy. Do NOT change the component imports, layout structure, JSON-LD logic, or Tailwind classes.
          5) For \`src/components/landing/HowItWorks.astro\`: only update the \`steps\` array entries and surrounding section copy. Do NOT change the component imports, template structure, or Tailwind classes.
          6) Do NOT create commits, push, or create/edit pull requests.

          # Inputs and conventions:
          - If no updates are necessary, make no changes.
          - Keep changes minimal and consistent with repo style.
          " --force --model "$MODEL" --output-format=text

      - name: Drop workflow file edits
        run: |
          if git diff --name-only -- .github/workflows .github/actions | grep -q .; then
            echo "Reverting workflow and action file edits from agent output."
            git restore --staged --worktree -- .github/workflows .github/actions
          fi

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit checks (lint + type-check)
        if: steps.changes.outputs.has_changes == 'true'
        id: precommit_checks
        continue-on-error: true
        uses: ./.github/actions/run-precommit-checks

      - name: Auto-fix lint/type errors
        if: steps.changes.outputs.has_changes == 'true' && steps.precommit_checks.outcome == 'failure'
        id: autofix
        continue-on-error: true
        uses: ./.github/actions/auto-fix-precommit
        with:
          agent_model: ${{ vars.AGENT_MODEL }}
          cursor_api_key: ${{ secrets.CURSOR_API_KEY }}

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true' && (steps.precommit_checks.outcome == 'success' || steps.autofix.outputs.fixed == 'true')
        run: |
          git add README.md src/pages/faq.astro src/components/landing/HowItWorks.astro
          if [ "${{ github.event_name }}" = "push" ]; then
            git commit -m "docs: update docs for ${{ github.sha }}"
          else
            git commit -m "docs: update docs (manual trigger)"
          fi
          git push origin dev

      - name: Log latest commit on dev
        run: |
          git fetch origin dev --depth=1
          echo "---"
          echo "Latest commit on origin/dev after run:"
          git log -1 origin/dev --format="  SHA: %H%n  Subject: %s%n  Author: %an <%ae>%n  Date: %ai"
          echo "---"
