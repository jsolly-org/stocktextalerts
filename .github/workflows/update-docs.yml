name: Update Docs

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  docs:
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login == 'jsolly') }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        uses: ./.github/actions/setup-cursor

      - name: Update docs
        env:
          MODEL: gpt-5.2
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          agent -p "You are operating in a GitHub Actions runner.

          The GitHub CLI is available as \`gh\` and authenticated via \`GH_TOKEN\`. Git is available. You have write access to repository contents.

          # Context:
          - Repo: ${{ github.repository }}
          - Owner: ${{ github.repository_owner }}
          - Trigger: ${{ github.event_name }}
          - PR Number: ${{ github.event.pull_request.number }}
          - Base Ref: ${{ github.event.pull_request.base.ref }}
          - Head Ref: ${{ github.event.pull_request.head.ref }}
          - Base SHA: ${{ github.event.pull_request.base.sha }}
          - Head SHA: ${{ github.event.pull_request.head.sha }}
          - Merge Commit SHA: ${{ github.event.pull_request.merge_commit_sha }}

          # Goal:
          - Update \`README.md\` on \`main\`, then commit + push directly to \`main\` (no follow-up PR).

          # Requirements:
          1) If Trigger is \`pull_request\` (PR Number and SHAs are set): determine what changed in the merged PR using \`gh pr diff <PR_NUMBER>\` or \`git diff <BASE_SHA> <HEAD_SHA>\` (PR-level diff; do NOT use merge-commit-vs-parent). Update README.md based on those changes.
          2) If Trigger is \`workflow_dispatch\` (manual run; PR Number/SHAs may be empty): review the current state of the codebase on \`main\` and update README.md to accurately reflect it.
          3) Update only README.md. Do NOT update any other documentation files.
          4) Commit and push changes directly to \`main\`. Only create a commit if \`README.md\` changed.
          5) Do NOT create or edit pull requests.

          # Inputs and conventions:
          - Only update README.md. Do not modify any other files.
          - If no README updates are necessary, make no changes and do not commit.
          - Keep changes minimal and consistent with repo style.

          # Implementation notes:
          - You are checked out on \`main\`. After updating README.md, run \`git status --porcelain\` to confirm only README.md changed.
          - If README.md changed, run:
            - \`git add README.md\`
            - \`git commit -m \"docs: update README for PR #${{ github.event.pull_request.number }}\" \` when Trigger is \`pull_request\`, or \`git commit -m \"docs: update README (manual trigger)\" \` when Trigger is \`workflow_dispatch\`
            - \`git push origin main\`

          # Deliverables when updates occur:
          - A commit pushed directly to \`main\` that changes only \`README.md\`.
          " --force --model "$MODEL" --output-format=text
