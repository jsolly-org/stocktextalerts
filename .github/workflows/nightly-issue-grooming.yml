name: "Nightly: Issue Grooming"

on:
  schedule:
    - cron: "0 9 * * *" # 4 AM ET
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

jobs:
  issue-grooming:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    steps:
      - name: Ensure GitHub CLI (act only)
        if: ${{ env.ACT == 'true' }}
        run: |
          if command -v gh >/dev/null 2>&1 && command -v jq >/dev/null 2>&1; then
            exit 0
          fi
          SUDO=""
          if command -v sudo >/dev/null 2>&1; then
            SUDO="sudo"
          fi
          $SUDO apt-get update
          if ! command -v jq >/dev/null 2>&1; then
            $SUDO apt-get install -y jq
          fi
          if ! command -v gh >/dev/null 2>&1; then
            if ! $SUDO apt-get install -y gh; then
              type -p curl >/dev/null 2>&1 || $SUDO apt-get install -y curl
              curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | $SUDO dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
              $SUDO chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | $SUDO tee /etc/apt/sources.list.d/github-cli.list >/dev/null
              $SUDO apt-get update
              $SUDO apt-get install -y gh
            fi
          fi

      - name: Check for existing nightly PR
        id: check-pr
        run: |
          EXISTING_PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --label "nightly" \
            --search "feat(nightly): resolve" \
            --state open \
            --json number,url \
            --limit 1)
          if [ "$(echo "$EXISTING_PR" | jq length)" -gt 0 ]; then
            PR_URL=$(echo "$EXISTING_PR" | jq -r '.[0].url')
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Existing nightly issue-grooming PR found: $PR_URL"
            gh pr comment "$PR_URL" --body "Nightly run skipped — this PR is still open."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Pick an issue
        if: steps.check-pr.outputs.skip != 'true'
        id: pick-issue
        run: |
          ISSUE=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,title \
            --limit 1 \
            --jq '.[0]')
          if [ -z "$ISSUE" ] || [ "$ISSUE" = "null" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "No open issues found."
          else
            ISSUE_NUMBER=$(echo "$ISSUE" | jq -r '.number')
            ISSUE_TITLE=$(echo "$ISSUE" | jq -r '.title')
            echo "skip=false" >> "$GITHUB_OUTPUT"
            echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
            echo "issue_title=$ISSUE_TITLE" >> "$GITHUB_OUTPUT"
            echo "Picked issue #$ISSUE_NUMBER: $ISSUE_TITLE"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Checkout repository
        if: steps.check-pr.outputs.skip != 'true' && steps.pick-issue.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.check-pr.outputs.skip != 'true' && steps.pick-issue.outputs.skip != 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        if: steps.check-pr.outputs.skip != 'true' && steps.pick-issue.outputs.skip != 'true'
        uses: ./.github/actions/setup-cursor

      - name: Create branch
        if: steps.check-pr.outputs.skip != 'true' && steps.pick-issue.outputs.skip != 'true'
        run: git checkout -b "nightly/issue-${{ steps.pick-issue.outputs.issue_number }}-$(date +%Y-%m-%d)-${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Run agent
        if: steps.check-pr.outputs.skip != 'true' && steps.pick-issue.outputs.skip != 'true'
        env:
          MODEL: ${{ vars.AGENT_MODEL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          ISSUE_NUMBER: ${{ steps.pick-issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.pick-issue.outputs.issue_title }}
        run: |
          agent -p "You are operating in a GitHub Actions runner. Git and the \`gh\` CLI are available and authenticated.

          # Goal
          Implement a fix for issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Read the full issue details with: \`gh issue view ${ISSUE_NUMBER}\`

          # Guidelines
          - Read \`AGENTS.md\` and the \`.agents/\` directory for project conventions and guidelines.
          - Leave all changes uncommitted. The workflow will handle commit, push, and PR creation.
          - Do not create issues or PRs yourself.
          " --force --model "$MODEL" --output-format=text

      - name: Drop workflow file edits
        if: steps.check-pr.outputs.skip != 'true' && steps.pick-issue.outputs.skip != 'true'
        run: |
          if git diff --name-only -- .github/workflows .github/actions | grep -q .; then
            echo "Reverting workflow and action file edits from agent output."
            git restore --staged --worktree -- .github/workflows .github/actions
          fi

      - name: Check for changes
        if: steps.check-pr.outputs.skip != 'true' && steps.pick-issue.outputs.skip != 'true'
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit checks
        if: steps.check-pr.outputs.skip != 'true' && steps.pick-issue.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        uses: ./.github/actions/run-precommit-checks

      - name: Commit and push
        if: steps.check-pr.outputs.skip != 'true' && steps.pick-issue.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          ISSUE_NUMBER: ${{ steps.pick-issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.pick-issue.outputs.issue_title }}
        run: |
          git add -A
          git commit -m "feat(nightly): resolve #${ISSUE_NUMBER} — ${ISSUE_TITLE}"
          git push origin HEAD

      - name: Create pull request
        if: steps.check-pr.outputs.skip != 'true' && steps.pick-issue.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          ISSUE_NUMBER: ${{ steps.pick-issue.outputs.issue_number }}
          ISSUE_TITLE: ${{ steps.pick-issue.outputs.issue_title }}
        run: |
          PR_TITLE="feat(nightly): resolve #${ISSUE_NUMBER} — ${ISSUE_TITLE}"
          PR_BODY="$(cat <<EOF
          ## Summary
          Automated implementation for issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Closes #${ISSUE_NUMBER}

          ---
          *Auto-generated by the nightly-issue-grooming workflow.*
          EOF
          )"
          gh pr create \
            --title "$PR_TITLE" \
            --label "bot-generated" \
            --body "$PR_BODY"
