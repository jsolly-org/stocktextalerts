# Scheduled nightly job that picks open GitHub issues, uses the Cursor agent
# to implement fixes, and opens PRs that close each issue.
name: "Nightly: Issue Grooming"

on:
  schedule:
    - cron: "0 9 * * *" # 4 AM ET
  workflow_dispatch:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

jobs:
  discover-issues:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    outputs:
      issues: ${{ steps.matrix.outputs.issues }}
    steps:
      - name: Ensure GitHub CLI (act only)
        if: ${{ env.ACT == 'true' }}
        run: |
          if command -v gh >/dev/null 2>&1 && command -v jq >/dev/null 2>&1; then
            exit 0
          fi
          SUDO=""
          if command -v sudo >/dev/null 2>&1; then
            SUDO="sudo"
          fi
          $SUDO apt-get update
          if ! command -v jq >/dev/null 2>&1; then
            $SUDO apt-get install -y jq
          fi
          if ! command -v gh >/dev/null 2>&1; then
            if ! $SUDO apt-get install -y gh; then
              type -p curl >/dev/null 2>&1 || $SUDO apt-get install -y curl
              curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | $SUDO dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
              $SUDO chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg
              echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | $SUDO tee /etc/apt/sources.list.d/github-cli.list >/dev/null
              $SUDO apt-get update
              $SUDO apt-get install -y gh
            fi
          fi

      - name: Discover open issues and filter already-in-progress
        id: matrix
        run: |
          # Fetch all open issues
          ALL_ISSUES=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,title \
            --limit 100)

          if [ "$(echo "$ALL_ISSUES" | jq length)" -eq 0 ]; then
            echo "No open issues found."
            echo 'issues=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch open PRs from nightly issue-grooming to find issues already in progress
          OPEN_PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --search "feat(nightly): resolve" \
            --json title \
            --limit 100)

          # Extract issue numbers from PR titles matching "feat(nightly): resolve #N"
          IN_PROGRESS=$(echo "$OPEN_PRS" | jq '[.[].title | capture("feat\\(nightly\\): resolve #(?<n>[0-9]+)") | .n | tonumber]')

          # Filter out issues that already have an open PR
          FILTERED=$(echo "$ALL_ISSUES" | jq --argjson skip "$IN_PROGRESS" \
            '[.[] | select(.number as $n | $skip | index($n) | not)]')

          COUNT=$(echo "$FILTERED" | jq length)
          echo "Found $COUNT actionable issue(s) after filtering."
          echo "$FILTERED" | jq .

          echo "issues=$(echo "$FILTERED" | jq -c .)" >> "$GITHUB_OUTPUT"

  resolve-issue:
    needs: discover-issues
    if: ${{ needs.discover-issues.outputs.issues != '[]' && needs.discover-issues.outputs.issues != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        issue: ${{ fromJson(needs.discover-issues.outputs.issues) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: dev
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        uses: ./.github/actions/setup-cursor

      - name: Create branch
        run: git checkout -b "nightly/issue-${{ matrix.issue.number }}-$(date +%Y-%m-%d)-${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Run agent
        env:
          MODEL: ${{ vars.AGENT_MODEL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          ISSUE_NUMBER: ${{ matrix.issue.number }}
          ISSUE_TITLE: ${{ matrix.issue.title }}
        run: |
          agent -p "You are operating in a GitHub Actions runner. Git and the \`gh\` CLI are available and authenticated.

          # Goal
          Implement a fix for issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Read the full issue details with: \`gh issue view ${ISSUE_NUMBER}\`

          # Guidelines
          - Read \`AGENTS.md\` and the \`.agents/\` directory for project conventions and guidelines.
          - Leave all changes uncommitted. The workflow will handle commit, push, and PR creation.
          - Do not create issues or PRs yourself.
          " --force --model "$MODEL" --output-format=text

      - name: Drop workflow file edits
        run: |
          if git diff --name-only -- .github/workflows .github/actions | grep -q .; then
            echo "Reverting workflow and action file edits from agent output."
            git restore --staged --worktree -- .github/workflows .github/actions
          fi

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit checks
        if: steps.changes.outputs.has_changes == 'true'
        uses: ./.github/actions/run-precommit-checks

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true'
        env:
          ISSUE_NUMBER: ${{ matrix.issue.number }}
          ISSUE_TITLE: ${{ matrix.issue.title }}
        run: |
          git add -A
          git commit -m "feat(nightly): resolve #${ISSUE_NUMBER} — ${ISSUE_TITLE}"
          git push origin HEAD

      - name: Create pull request
        id: create_pr
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          ISSUE_NUMBER: ${{ matrix.issue.number }}
          ISSUE_TITLE: ${{ matrix.issue.title }}
        run: |
          PR_TITLE="feat(nightly): resolve #${ISSUE_NUMBER} — ${ISSUE_TITLE}"
          PR_BODY="$(cat <<EOF
          ## Summary
          Automated implementation for issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Closes #${ISSUE_NUMBER}

          ---
          *Auto-generated by the nightly-issue-grooming workflow.*
          EOF
          )"
          PR_URL=$(gh pr create \
            --base dev \
            --title "$PR_TITLE" \
            --label "bot-generated" \
            --body "$PR_BODY")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

  close-issue-on-merge:
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    steps:
      - name: Close issues linked by merged PR
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          PR_URL="${{ github.event.pull_request.html_url }}"
          # Extract issue numbers from Closes #N, Fixes #N, Resolves #N (GitHub keywords)
          for N in $(printf '%s' "$PR_BODY" | grep -oiE '(closes?|fixes?|resolves?)\s*#[0-9]+' | grep -oE '[0-9]+' | sort -u); do
            gh issue close "$N" --comment "Resolved by merged PR: $PR_URL"
          done
