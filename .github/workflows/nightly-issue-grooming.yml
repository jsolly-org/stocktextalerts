# Scheduled nightly job that picks open GitHub issues, uses the Cursor agent
# to implement fixes, and opens PRs that close each issue.
name: "Nightly: Issue Grooming"

on:
  schedule:
    - cron: "0 6 * * *" # 1 AM ET
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

jobs:
  discover-issues:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    outputs:
      issues: ${{ steps.matrix.outputs.issues }}
    steps:
      - name: Discover open issues and filter already-in-progress
        id: matrix
        run: |
          # Fetch all open issues
          ALL_ISSUES=$(gh issue list \
            --repo "${{ github.repository }}" \
            --state open \
            --json number,title \
            --limit 100)

          if [ "$(echo "$ALL_ISSUES" | jq length)" -eq 0 ]; then
            echo "No open issues found."
            echo 'issues=[]' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Fetch open PRs from nightly issue-grooming to find issues already in progress
          OPEN_PRS=$(gh pr list \
            --repo "${{ github.repository }}" \
            --state open \
            --search "feat(nightly): resolve" \
            --json title \
            --limit 100)

          # Extract issue numbers from PR titles matching "feat(nightly): resolve #N"
          IN_PROGRESS=$(echo "$OPEN_PRS" | jq '[.[].title | capture("feat\\(nightly\\): resolve #(?<n>[0-9]+)") | .n | tonumber]')

          # Filter out issues that already have an open PR
          FILTERED=$(echo "$ALL_ISSUES" | jq --argjson skip "$IN_PROGRESS" \
            '[.[] | select(.number as $n | $skip | index($n) | not)]')

          COUNT=$(echo "$FILTERED" | jq length)
          echo "Found $COUNT actionable issue(s) after filtering."
          echo "$FILTERED" | jq .

          echo "issues=$(echo "$FILTERED" | jq -c .)" >> "$GITHUB_OUTPUT"

  resolve-issue:
    needs: discover-issues
    if: ${{ needs.discover-issues.outputs.issues != '[]' && needs.discover-issues.outputs.issues != '' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        issue: ${{ fromJson(needs.discover-issues.outputs.issues) }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        uses: ./.github/actions/setup-cursor

      - name: Create branch
        run: git checkout -b "nightly/issue-${{ matrix.issue.number }}-$(date +%Y-%m-%d)-${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Run agent
        env:
          MODEL: ${{ vars.AGENT_MODEL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          ISSUE_NUMBER: ${{ matrix.issue.number }}
          ISSUE_TITLE: ${{ matrix.issue.title }}
        run: |
          agent -p "You are operating in a GitHub Actions runner. Git and the \`gh\` CLI are available and authenticated.

          # Goal
          Implement a fix for issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Read the full issue details with: \`gh issue view ${ISSUE_NUMBER}\`

          # Guidelines
          - Read \`AGENTS.md\` and the \`.agents/\` directory for project conventions and guidelines.
          - Leave all changes uncommitted. The workflow will handle commit, push, and PR creation.
          - Do not create issues or PRs yourself.
          " --force --model "$MODEL" --output-format=text

      - name: Drop workflow file edits
        run: |
          if git diff --name-only -- .github/workflows .github/actions | grep -q .; then
            echo "Reverting workflow and action file edits from agent output."
            git restore --staged --worktree -- .github/workflows .github/actions
          fi

      - name: Check for changes
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit checks (lint + type-check)
        if: steps.changes.outputs.has_changes == 'true'
        id: precommit_checks
        continue-on-error: true
        uses: ./.github/actions/run-precommit-checks

      - name: Auto-fix lint/type errors
        if: steps.changes.outputs.has_changes == 'true' && steps.precommit_checks.outcome == 'failure'
        id: autofix
        continue-on-error: true
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          MAX_FIX_ATTEMPTS: 2
        run: |
          for attempt in $(seq 1 "$MAX_FIX_ATTEMPTS"); do
            echo "::group::Fix attempt $attempt/$MAX_FIX_ATTEMPTS"

            ERRORS=""
            for log in precommit-*.log; do
              [[ -f "$log" ]] || continue
              ERRORS+="--- $log ---"$'\n'
              ERRORS+="$(tail -50 "$log")"$'\n\n'
            done

            FIX_PROMPT="$(cat <<FIXEOF
            ---SYSTEM_INSTRUCTIONS_START---
            You are running in GitHub Actions. Your previous code changes failed lint and/or type checks.

            Hard rules:
            - Do NOT create commits.
            - Do NOT push.
            - Do NOT use GitHub APIs or post comments/reactions (no \`gh\`).

            Fix the errors below. Only modify the files that have errors — do not touch unrelated code.

            --- ERRORS ---
            $ERRORS
            ---SYSTEM_INSTRUCTIONS_END---
          FIXEOF
            )"

            agent --print --model "${{ vars.AGENT_MODEL }}" --output-format=text --force "$FIX_PROMPT" 2>&1 | tail -100 || true

            set -o pipefail
            run_cmd() {
              local label="$1"; shift
              echo "::group::$label"
              "$@" 2>&1 | tee "precommit-$label.log"
              local rc="${PIPESTATUS[0]}"
              echo "::endgroup::"
              return "$rc"
            }

            CHECKS_PASSED=true
            run_cmd "npm-ci" npm ci || { CHECKS_PASSED=false; }
            if [[ "$CHECKS_PASSED" == "true" ]]; then
              run_cmd "biome-fix" npm run check:biome || { CHECKS_PASSED=false; }
            fi
            if [[ "$CHECKS_PASSED" == "true" ]]; then
              run_cmd "biome-ci" npx biome ci . --error-on-warnings || { CHECKS_PASSED=false; }
            fi
            if [[ "$CHECKS_PASSED" == "true" ]]; then
              run_cmd "check-ts" npm run check:ts || { CHECKS_PASSED=false; }
            fi

            echo "::endgroup::"

            if [[ "$CHECKS_PASSED" == "true" ]]; then
              echo "Fix attempt $attempt succeeded."
              echo "fixed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Fix attempt $attempt failed; checks still failing."
          done

          echo "All $MAX_FIX_ATTEMPTS fix attempts exhausted."
          echo "fixed=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Commit and push
        if: steps.changes.outputs.has_changes == 'true' && (steps.precommit_checks.outcome == 'success' || steps.autofix.outputs.fixed == 'true')
        env:
          ISSUE_NUMBER: ${{ matrix.issue.number }}
          ISSUE_TITLE: ${{ matrix.issue.title }}
        run: |
          git add -A
          git commit -m "feat(nightly): resolve #${ISSUE_NUMBER} — ${ISSUE_TITLE}"
          git push origin HEAD

      - name: Create pull request
        id: create_pr
        if: steps.changes.outputs.has_changes == 'true' && (steps.precommit_checks.outcome == 'success' || steps.autofix.outputs.fixed == 'true')
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          ISSUE_NUMBER: ${{ matrix.issue.number }}
          ISSUE_TITLE: ${{ matrix.issue.title }}
        run: |
          PR_TITLE="feat(nightly): resolve #${ISSUE_NUMBER} — ${ISSUE_TITLE}"
          PR_BODY="$(cat <<EOF
          ## Summary
          Automated implementation for issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Closes #${ISSUE_NUMBER}

          ---
          *Auto-generated by the nightly-issue-grooming workflow.*
          EOF
          )"
          PR_URL=$(gh pr create \
            --title "$PR_TITLE" \
            --label "bot-generated" \
            --body "$PR_BODY")
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"
