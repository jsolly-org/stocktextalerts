# When a nightly-issue-grooming PR is merged, close the linked issue.
# GitHub's "Closes #N" auto-close only works when merging into main;
# these PRs target dev, so we close explicitly on merge.
name: Nightly PR merge — close issue

on:
  pull_request:
    types: [closed]
  workflow_dispatch:

permissions:
  issues: write

jobs:
  close-issue-on-merge:
    runs-on: ubuntu-latest
    if: >-
      (github.event_name == 'workflow_dispatch') ||
      (github.event.pull_request.merged == true &&
       github.event.pull_request.base.ref == 'dev' &&
       github.actor != 'nektos/act')
    steps:
      - name: Close issues from merged nightly PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_HTML_URL: ${{ github.event.pull_request.html_url }}
        run: |
          REPO="${{ github.repository }}"
          COMMENT_SUFFIX="Closed automatically because the PR targets dev (not main), so GitHub's auto-close keywords don't apply."

          close_issue_for_pr() {
            local title="$1" url="$2"
            ISSUE_NUM=$(echo "$title" | sed -n 's/.*feat(nightly): resolve #\([0-9]*\).*/\1/p')
            if [ -n "$ISSUE_NUM" ]; then
              echo "Closing issue #$ISSUE_NUM (from PR: $url)"
              gh issue close "$ISSUE_NUM" \
                --repo "$REPO" \
                --comment "Resolved by $url. $COMMENT_SUFFIX" || true
            fi
          }

          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "Manual run — scanning all merged nightly PRs to dev..."
            gh pr list --repo "$REPO" --base dev --state merged \
              --search "feat(nightly): resolve" \
              --json title,url --jq '.[] | "\(.title)\t\(.url)"' |
            while IFS=$'\t' read -r title url; do
              close_issue_for_pr "$title" "$url"
            done
          else
            close_issue_for_pr "$PR_TITLE" "$PR_HTML_URL"
          fi
