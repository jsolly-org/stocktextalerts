name: "Nightly: Dependency Maintenance"

on:
  schedule:
    - cron: "0 5 * * *" # 12 AM ET
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

jobs:
  dependency-maintenance:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check for existing nightly PR
        id: check-pr
        run: |
          EXISTING_PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --label "nightly" \
            --search "chore(nightly): dependency maintenance" \
            --state open \
            --json number,url \
            --limit 1)
          if [ "$(echo "$EXISTING_PR" | jq length)" -gt 0 ]; then
            PR_URL=$(echo "$EXISTING_PR" | jq -r '.[0].url')
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Existing nightly dependency-maintenance PR found: $PR_URL"
            gh pr comment "$PR_URL" --body "Nightly run skipped — this PR is still open."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Checkout repository
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        if: steps.check-pr.outputs.skip != 'true'
        uses: ./.github/actions/setup-cursor

      - name: Create branch
        if: steps.check-pr.outputs.skip != 'true'
        run: git checkout -b nightly/dependency-maintenance-$(date +%Y-%m-%d)-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Run agent
        if: steps.check-pr.outputs.skip != 'true'
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          agent -p "You are operating in a GitHub Actions runner. Git and the \`gh\` CLI are available and authenticated.

          # Goal
          Audit and fix dependency issues — vulnerabilities, deprecated packages, and stale lockfile entries.

          # Guidelines
          - Read \`AGENTS.md\` and the \`.agents/\` directory for project conventions and guidelines.
          - Leave all changes uncommitted. The workflow will handle commit, push, and PR creation.
          - Do not create issues or PRs yourself.
          " --force --output-format=text

      - name: Check for changes
        if: steps.check-pr.outputs.skip != 'true'
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit checks
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        uses: ./.github/actions/run-precommit-checks

      - name: Commit and push
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        run: |
          git add -A
          git commit -m "chore(nightly): dependency maintenance — $(date +%Y-%m-%d)"
          git push origin HEAD

      - name: Create pull request
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          gh pr create \
            --title "chore(nightly): dependency maintenance — $(date +%Y-%m-%d)" \
            --label "nightly,bot-generated" \
            --body "$(cat <<'EOF'
          ## Summary
          Automated dependency maintenance — vulnerability fixes, deprecated package updates, and lockfile cleanup.

          ---
          *Auto-generated by the nightly-dependency-maintenance workflow.*
          EOF
          )"
