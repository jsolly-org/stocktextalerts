# Scheduled nightly job that uses the Cursor agent to find and fix security
# issues such as hardcoded secrets, RLS policy gaps, input validation holes,
# and OWASP vulnerabilities. Opens a PR with the hardening changes.
name: "Nightly: Security"

on:
  schedule:
    - cron: "0 4 * * *" # 11 PM ET
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  issues: write

env:
  GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

jobs:
  security:
    if: ${{ (github.event_name == 'workflow_dispatch' || github.event_name == 'schedule') && github.actor != 'nektos/act' }}
    runs-on: ubuntu-latest
    steps:
      - name: Check for existing nightly PR
        id: check-pr
        run: |
          EXISTING_PR=$(gh pr list \
            --repo "${{ github.repository }}" \
            --label "nightly" \
            --search "security(nightly): security hardening" \
            --state open \
            --json number,url \
            --limit 1)
          if [ "$(echo "$EXISTING_PR" | jq length)" -gt 0 ]; then
            PR_URL=$(echo "$EXISTING_PR" | jq -r '.[0].url')
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "Existing nightly security PR found: $PR_URL"
            gh pr comment "$PR_URL" --body "Nightly run skipped — this PR is still open."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Checkout repository
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Node.js
        if: steps.check-pr.outputs.skip != 'true'
        uses: actions/setup-node@6044e13b5dc448c55e2357c09f80417699197238 # v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Cursor CLI
        if: steps.check-pr.outputs.skip != 'true'
        uses: ./.github/actions/setup-cursor

      - name: Create branch
        if: steps.check-pr.outputs.skip != 'true'
        run: git checkout -b "nightly/security-$(date +%Y-%m-%d)-${{ github.run_id }}-${{ github.run_attempt }}"

      - name: Run agent
        if: steps.check-pr.outputs.skip != 'true'
        env:
          MODEL: ${{ vars.AGENT_MODEL }}
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          agent -p "You are operating in a GitHub Actions runner. Git and the \`gh\` CLI are available and authenticated.

          # Goal
          Find and fix security issues — hardcoded secrets, RLS policy gaps, input validation holes, and other OWASP-category vulnerabilities.

          # Guidelines
          - Read \`AGENTS.md\` and the \`.agents/\` directory for project conventions and guidelines.
          - Leave all changes uncommitted. The workflow will handle commit, push, and PR creation.
          - Do not create issues or PRs yourself.
          " --force --model "$MODEL" --output-format=text

      - name: Drop workflow file edits
        if: steps.check-pr.outputs.skip != 'true'
        run: |
          if git diff --name-only -- .github/workflows .github/actions | grep -q .; then
            echo "Reverting workflow and action file edits from agent output."
            git restore --staged --worktree -- .github/workflows .github/actions
          fi

      - name: Check for changes
        if: steps.check-pr.outputs.skip != 'true'
        id: changes
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
            echo "No changes detected."
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run pre-commit checks (lint + type-check)
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true'
        id: precommit_checks
        continue-on-error: true
        uses: ./.github/actions/run-precommit-checks

      - name: Auto-fix lint/type errors
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true' && steps.precommit_checks.outcome == 'failure'
        id: autofix
        continue-on-error: true
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          MAX_FIX_ATTEMPTS: 2
        run: |
          for attempt in $(seq 1 "$MAX_FIX_ATTEMPTS"); do
            echo "::group::Fix attempt $attempt/$MAX_FIX_ATTEMPTS"

            ERRORS=""
            for log in precommit-*.log; do
              [[ -f "$log" ]] || continue
              ERRORS+="--- $log ---"$'\n'
              ERRORS+="$(tail -50 "$log")"$'\n\n'
            done

            FIX_PROMPT="$(cat <<FIXEOF
            ---SYSTEM_INSTRUCTIONS_START---
            You are running in GitHub Actions. Your previous code changes failed lint and/or type checks.

            Hard rules:
            - Do NOT create commits.
            - Do NOT push.
            - Do NOT use GitHub APIs or post comments/reactions (no \`gh\`).

            Fix the errors below. Only modify the files that have errors — do not touch unrelated code.

            --- ERRORS ---
            $ERRORS
            ---SYSTEM_INSTRUCTIONS_END---
          FIXEOF
            )"

            agent --print --model "${{ vars.AGENT_MODEL }}" --output-format=text --force "$FIX_PROMPT" 2>&1 | tail -100 || true

            set -o pipefail
            run_cmd() {
              local label="$1"; shift
              echo "::group::$label"
              "$@" 2>&1 | tee "precommit-$label.log"
              local rc="${PIPESTATUS[0]}"
              echo "::endgroup::"
              return "$rc"
            }

            CHECKS_PASSED=true
            run_cmd "npm-ci" npm ci || { CHECKS_PASSED=false; }
            if [[ "$CHECKS_PASSED" == "true" ]]; then
              run_cmd "biome-fix" npm run check:biome || { CHECKS_PASSED=false; }
            fi
            if [[ "$CHECKS_PASSED" == "true" ]]; then
              run_cmd "biome-ci" npx biome ci . --error-on-warnings || { CHECKS_PASSED=false; }
            fi
            if [[ "$CHECKS_PASSED" == "true" ]]; then
              run_cmd "check-ts" npm run check:ts || { CHECKS_PASSED=false; }
            fi

            echo "::endgroup::"

            if [[ "$CHECKS_PASSED" == "true" ]]; then
              echo "Fix attempt $attempt succeeded."
              echo "fixed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            echo "Fix attempt $attempt failed; checks still failing."
          done

          echo "All $MAX_FIX_ATTEMPTS fix attempts exhausted."
          echo "fixed=false" >> "$GITHUB_OUTPUT"
          exit 1

      - name: Commit and push
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true' && (steps.precommit_checks.outcome == 'success' || steps.autofix.outputs.fixed == 'true')
        run: |
          git add -A
          git commit -m "security(nightly): security hardening — $(date +%Y-%m-%d)"
          git push origin HEAD

      - name: Create pull request
        if: steps.check-pr.outputs.skip != 'true' && steps.changes.outputs.has_changes == 'true' && (steps.precommit_checks.outcome == 'success' || steps.autofix.outputs.fixed == 'true')
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
        run: |
          gh pr create \
            --title "security(nightly): security hardening — $(date +%Y-%m-%d)" \
            --label "bot-generated" \
            --body "$(cat <<'EOF'
          ## Summary
          Automated security hardening — secrets audit, RLS policy review, input validation, and OWASP issue fixes.

          ---
          *Auto-generated by the nightly-security workflow.*
          EOF
          )"
