# Runs all live integration tests (provider APIs, SMS, email, xAI) once daily.
# Extracted from deploy.yml so deployments aren't gated on live-service availability.
name: "Daily Live Tests"

on:
  schedule:
    # 4 PM UTC = 12 PM ET — mid-session on market days, still useful baseline on weekends
    - cron: "0 16 * * *"
  workflow_dispatch:

jobs:
  live-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1.6.0
        with:
          version: 2.76.9

      - name: Install dependencies and start Supabase
        run: |
          supabase start -x studio,imgproxy,logflare,vector,postgres-meta,edge-runtime,realtime,storage-api &
          SB_PID=$!
          npm ci
          wait $SB_PID

      - name: Load Supabase env and live-test secrets
        run: |
          supabase status -o json > /tmp/sb-status.json
          DB_VARS=$(jq -r '
            "SUPABASE_URL=\(.API_URL // "")",
            "SUPABASE_PUBLISHABLE_KEY=\(.ANON_KEY // "")",
            "SUPABASE_SECRET_KEY=\(.SERVICE_ROLE_KEY // "")",
            "DATABASE_URL=\(.DB_URL // "")"
          ' /tmp/sb-status.json)

          {
            echo "$DB_VARS"
            echo "CRON_SECRET=ci-cron-secret"
            echo "VERCEL_URL=http://localhost:4321"
            echo "TWILIO_ACCOUNT_SID=$TWILIO_ACCOUNT_SID"
            echo "TWILIO_AUTH_TOKEN=$TWILIO_AUTH_TOKEN"
            echo "TWILIO_PHONE_NUMBER=$TWILIO_PHONE_NUMBER"
            echo "TWILIO_VERIFY_SERVICE_SID=$TWILIO_VERIFY_SERVICE_SID"
            echo "RESEND_API_KEY=$RESEND_API_KEY"
            echo "EMAIL_FROM=$EMAIL_FROM"
            echo "MASSIVE_API_KEY=$MASSIVE_API_KEY"
            echo "FINNHUB_API_KEY=$FINNHUB_API_KEY"
            echo "XAI_API_KEY=$XAI_API_KEY"
          } | tee .env.local >> "$GITHUB_ENV"
        env:
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_PHONE_NUMBER: ${{ secrets.TWILIO_PHONE_NUMBER }}
          TWILIO_VERIFY_SERVICE_SID: ${{ secrets.TWILIO_VERIFY_SERVICE_SID }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          EMAIL_FROM: ${{ vars.EMAIL_FROM }}
          MASSIVE_API_KEY: ${{ secrets.MASSIVE_API_KEY }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}

      - name: Run live tests
        run: npm run test:live:all
