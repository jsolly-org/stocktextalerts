# Runs the Cursor CLI agent in response to PR comments and review feedback.
# The agent makes code changes, validates them with lint/type-check, commits,
# and reports results back on the PR.
name: Cursor Agent on PR Comment
run-name: cursor-agent pr-${{ github.event.issue.number || github.event.pull_request.number }} comment-${{ github.event.comment.id || github.event.review.id }}

on:
  issue_comment:
    types: [created]
  # NOTE: pull_request_review_comment is intentionally omitted. When bots submit
  # a review with inline comments, GitHub fires both pull_request_review AND
  # pull_request_review_comment (one per inline comment). The pull_request_review
  # handler already fetches all inline comments via the "Fetch inline review
  # comments" step, so listening for individual review comments would cause
  # duplicate agent runs (observed: 12 redundant runs in one PR).
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  run-agent:
    runs-on: ubuntu-latest
    if: ${{ github.actor != 'nektos/act' }}
    defaults:
      run:
        shell: bash
    env:
      INTERNAL_MARKER: "<!-- cursor-agent-workflow:internal -->"
      # GitHub's workflows API accepts the workflow filename (e.g. "cursor-agent-on-pr-comment.yml"),
      # not a repo path like ".github/workflows/...".
      WORKFLOW_FILE: cursor-agent-on-pr-comment.yml
      CURSOR_AGENT_NAME: "Cursor Agent"
      CURSOR_AGENT_EMAIL: "cursoragent@cursor.com"
      WARNINGS_FILE: /tmp/cursor-agent-warnings.txt
    steps:
      - name: Checkout workflow and actions
        uses: actions/checkout@v6.0.2
        with:
          ref: dev # default branch is dev
          fetch-depth: 1

      - name: Derive comment context
        id: context
        uses: ./.github/actions/pr-comment-trigger-context
        with:
          repo: ${{ github.repository }}
          repo_owner: ${{ github.repository_owner }}
          event_name: ${{ github.event_name }}
          comment_user: ${{ github.event.comment.user.login || github.event.review.user.login }}
          comment_id: ${{ github.event.comment.id || github.event.review.id }}
          pr_number: ${{ github.event.issue.number || github.event.pull_request.number }}
          issue_pull_request_url: ${{ github.event.issue.pull_request.url }}
          internal_marker: ${{ env.INTERNAL_MARKER }}
          gh_token: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Log skip context
        if: steps.context.outputs.run_agent != 'true'
        env:
          SKIP: ${{ steps.context.outputs.skip }}
          IS_PR: ${{ steps.context.outputs.is_pr }}
          IS_AUTHOR: ${{ steps.context.outputs.is_author }}
        run: |
          {
            echo "## Cursor Agent: Skipped"
            echo ""
            echo "- **skip**: \`$SKIP\`"
            echo "- **is_pr**: \`$IS_PR\`"
            echo "- **is_author**: \`$IS_AUTHOR\`"
            echo ""
            echo "Agent was not run (comment filtered, not a PR, or PR author is not repo owner)."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Log run context
        if: steps.context.outputs.run_agent == 'true'
        env:
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          SUMMARY=$(cat <<SUMMARY_EOF
          ## Cursor Agent workflow context

          - **Event**: \`${{ steps.context.outputs.event_name }}\`
          - **PR**: \`#${{ steps.context.outputs.pr_number }}\`
          - **Head**: \`${{ steps.context.outputs.head_repo }}@${{ steps.context.outputs.head_ref }}\`
          - **Head SHA**: \`${{ steps.context.outputs.head_sha }}\`
          - **Trigger**: \`${{ steps.context.outputs.comment_user }}\` (comment \`${{ steps.context.outputs.comment_id }}\`)
          - **Run**: $RUN_URL
          SUMMARY_EOF
          )
          echo "$SUMMARY"
          echo "$SUMMARY" >> "$GITHUB_STEP_SUMMARY"

      - name: Enforce run queue and rate limit
        if: steps.context.outputs.run_agent == 'true'
        uses: ./.github/actions/agent-run-queue-and-ratelimit
        with:
          repo: ${{ github.repository }}
          pr_number: ${{ steps.context.outputs.pr_number }}
          workflow_file: ${{ env.WORKFLOW_FILE }}
          run_id: ${{ github.run_id }}
          internal_marker: ${{ env.INTERNAL_MARKER }}
          gh_token: ${{ secrets.GH_AGENT_TOKEN }}

      - name: Checkout PR head
        if: steps.context.outputs.run_agent == 'true'
        uses: actions/checkout@v6.0.2
        with:
          repository: ${{ steps.context.outputs.head_repo }}
          ref: ${{ steps.context.outputs.head_ref }}
          fetch-depth: 0
          # Don't persist the token in git config so the agent can't push.
          persist-credentials: false

      - name: Setup Node.js (for agent)
        if: steps.context.outputs.run_agent == 'true'
        uses: actions/setup-node@v6.2.0
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install npm dependencies (for agent)
        if: steps.context.outputs.run_agent == 'true'
        run: npm ci

      - name: Setup Cursor CLI
        if: steps.context.outputs.run_agent == 'true'
        uses: ./.github/actions/setup-cursor
        with:
          git_name: ${{ env.CURSOR_AGENT_NAME }}
          git_email: ${{ env.CURSOR_AGENT_EMAIL }}

      - name: Run Cursor agent
        if: steps.context.outputs.run_agent == 'true'
        id: agent
        continue-on-error: true
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          COMMENT_ID: ${{ steps.context.outputs.comment_id }}
          COMMENT_EVENT: ${{ steps.context.outputs.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || github.event.review.body }}
          HEAD_REF: ${{ steps.context.outputs.head_ref }}
          HEAD_SHA: ${{ steps.context.outputs.head_sha }}
          REPO: ${{ github.repository }}
          COMMENT_PATH: ${{ steps.context.outputs.comment_path }}
          COMMENT_SIDE: ${{ steps.context.outputs.comment_side }}
          COMMENT_LINE: ${{ steps.context.outputs.comment_line }}
          COMMENT_START_LINE: ${{ steps.context.outputs.comment_start_line }}
          COMMENT_DIFF_HUNK: ${{ steps.context.outputs.comment_diff_hunk }}
          INLINE_REVIEW_COMMENTS: ${{ steps.context.outputs.inline_review_comments }}
        run: |
          BEFORE_SHA="$(git rev-parse HEAD)"
          AGENT_OUTPUT_FILE=$(mktemp)
          AGENT_ERROR_FILE=$(mktemp)
          echo "before_sha=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
          echo "noop=false" >> "$GITHUB_OUTPUT"
          echo "changes_present=false" >> "$GITHUB_OUTPUT"

          PROMPT="$(
            cat <<EOF
            ---SYSTEM_INSTRUCTIONS_START---
            You are running in GitHub Actions on a checked-out PR branch.

            Hard rules:
            - Do NOT create commits.
            - Do NOT push.
            - Do NOT use GitHub APIs or post comments/reactions (no \`gh\`).

            Context:
            - Repo: $REPO
            - PR Number: $PR_NUMBER
            - Head Branch: $HEAD_REF
            - Trigger Event: $COMMENT_EVENT
            - Trigger Comment ID: $COMMENT_ID

            Do this:
            1) Make the necessary code changes requested in the user comment below.
            2) Leave all changes as uncommitted working tree changes. The workflow will run checks, commit, and push.

            If this was triggered by a PR review comment, use this context to locate the exact spot:
            - Path: $COMMENT_PATH
            - Side: $COMMENT_SIDE
            - Line: $COMMENT_LINE
            - Start line: $COMMENT_START_LINE
            - Diff hunk:
            $COMMENT_DIFF_HUNK

            ---SYSTEM_INSTRUCTIONS_END---

            ---USER_INPUT_START---
            $COMMENT_BODY
            $([[ -n "$INLINE_REVIEW_COMMENTS" ]] && printf '\n\n--- Inline review comments (actionable feedback) ---\n\n%s' "$INLINE_REVIEW_COMMENTS")
            ---USER_INPUT_END---
          EOF
          )"

          # Use --print for non-interactive runs (enables tool access) and pass the prompt as the
          # positional argument, per Cursor CLI docs.
          # --force is required so the agent can actually execute commands (git) in CI.
          # Capture both stdout and stderr for better error reporting.
          echo "Running Cursor agent..."
          AGENT_EXIT_CODE=0
          agent --print --mode auto --model "${{ vars.AGENT_MODEL }}" --output-format=text --force "$PROMPT" > "$AGENT_OUTPUT_FILE" 2> "$AGENT_ERROR_FILE" || AGENT_EXIT_CODE=$?

          # Always persist logs for debug artifacts
          cp "$AGENT_OUTPUT_FILE" agent-stdout.txt 2>/dev/null || true
          cp "$AGENT_ERROR_FILE" agent-stderr.txt 2>/dev/null || true

          echo "=== Agent output ==="
          cat "$AGENT_OUTPUT_FILE" || true
          if [[ -s "$AGENT_ERROR_FILE" ]]; then
            echo "=== Agent stderr ==="
            cat "$AGENT_ERROR_FILE" || true
          fi

          AGENT_OUTPUT=$(cat "$AGENT_OUTPUT_FILE" || echo "")
          rm -f "$AGENT_OUTPUT_FILE" "$AGENT_ERROR_FILE"

          if [[ "$AGENT_EXIT_CODE" -ne 0 ]]; then
            echo "##[error]Agent command failed with exit code $AGENT_EXIT_CODE"
            exit $AGENT_EXIT_CODE
          fi

          AFTER_HEAD="$(git rev-parse HEAD)"
          if [[ "$AFTER_HEAD" != "$BEFORE_SHA" ]]; then
            echo "##[warning]Agent created commits locally; resetting to $BEFORE_SHA and keeping working tree changes."
            git reset --mixed "$BEFORE_SHA"
          fi

          CHANGES="$(git status --porcelain)"
          if [[ -z "$CHANGES" ]]; then
            echo "##[warning]Agent completed with no changes (working tree clean at $BEFORE_SHA)."
            echo ""
            echo "Last 50 lines of agent output:"
            echo "$AGENT_OUTPUT" | tail -50 || echo "(no agent output captured)"
            # Persist truncated agent output for the no-op PR comment (so you can see why no changes were made)
            echo "$AGENT_OUTPUT" | tail -80 > agent-noop-output.txt 2>/dev/null || true
            echo "noop=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGES"
          git diff --stat > agent-diffstat.txt 2>/dev/null || true
          git diff --name-only > agent-changed-files.txt 2>/dev/null || true

          echo "changes_present=true" >> "$GITHUB_OUTPUT"

      - name: Run pre-commit checks (lint + type-check)
        if: steps.context.outputs.run_agent == 'true' && steps.agent.outcome == 'success' && steps.agent.outputs.changes_present == 'true'
        id: precommit_checks
        continue-on-error: true
        uses: ./.github/actions/run-precommit-checks

      - name: Commit and push changes
        if: steps.context.outputs.run_agent == 'true' && steps.agent.outcome == 'success' && steps.agent.outputs.changes_present == 'true' && steps.precommit_checks.outcome == 'success'
        id: commit_push
        continue-on-error: true
        env:
          GH_AGENT_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          HEAD_REPO: ${{ steps.context.outputs.head_repo }}
          HEAD_REF: ${{ steps.context.outputs.head_ref }}
          COMMENT_ID: ${{ steps.context.outputs.comment_id }}
          BEFORE_SHA: ${{ steps.agent.outputs.before_sha }}
        run: |
          # Use a tokenized URL inline to avoid persisting credentials in git config.
          REMOTE_URL="https://x-access-token:${GH_AGENT_TOKEN}@github.com/${HEAD_REPO}.git"

          git add -A
          git commit -m "Cursor: apply requested changes (comment $COMMENT_ID)"

          # The PR branch may advance while this run is executing (e.g. manual pushes).
          # Rebase our commit(s) onto the latest remote tip so we can fast-forward push without force.
          MAX_PUSH_ATTEMPTS=3
          for attempt in $(seq 1 "$MAX_PUSH_ATTEMPTS"); do
            LOCAL_TIP="$(git rev-parse HEAD)"
            git fetch "$REMOTE_URL" "$HEAD_REF"

            if ! git rebase FETCH_HEAD; then
              echo "##[warning]Rebase onto latest tip failed for $HEAD_REF. Retrying with conflict auto-resolution."
              git rebase --abort || true
              if ! git rebase -X theirs FETCH_HEAD; then
                echo "##[warning]Rebase with auto-resolution failed. Falling back to reset + cherry-pick."
                git rebase --abort || true
                git reset --hard FETCH_HEAD
                if ! git cherry-pick -X theirs "$LOCAL_TIP"; then
                  echo "##[error]Failed to replay local commit on top of latest remote tip for $HEAD_REF."
                  git cherry-pick --abort || true
                  exit 1
                fi
              fi
            fi

            if git push "$REMOTE_URL" HEAD:"$HEAD_REF" 2> push-error.log; then
              break
            fi

            echo "##[warning]Push attempt $attempt/$MAX_PUSH_ATTEMPTS failed; will retry after fetching latest."
            cat push-error.log || true

            if [[ "$attempt" == "$MAX_PUSH_ATTEMPTS" ]]; then
              echo "##[error]Failed to push commit. Check GH_AGENT_TOKEN permissions for contents/workflows write access."
              exit 1
            fi
          done

          git fetch "$REMOTE_URL" "$HEAD_REF"
          AFTER_SHA="$(git rev-parse FETCH_HEAD)"

          echo "changes_pushed=true" >> "$GITHUB_OUTPUT"
          echo "before_sha=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
          echo "after_sha=$AFTER_SHA" >> "$GITHUB_OUTPUT"

      - name: Upload debug artifacts
        if: steps.context.outputs.run_agent == 'true' && (steps.agent.outcome == 'failure' || steps.precommit_checks.outcome == 'failure' || steps.commit_push.outcome == 'failure')
        uses: ./.github/actions/upload-agent-debug
        with:
          name: cursor-agent-logs-pr-${{ steps.context.outputs.pr_number }}-run-${{ github.run_id }}

      - name: Report push failure
        if: steps.context.outputs.run_agent == 'true' && steps.agent.outcome == 'success' && steps.agent.outputs.changes_present == 'true' && steps.precommit_checks.outcome == 'success' && steps.commit_push.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          COMMENT_REFERENCE: ${{ steps.context.outputs.comment_reference }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          PUSH_FAILED_BODY=$(cat <<EOF
          ## ❌ Cursor Agent: Checks passed but push failed
          
          The agent made changes and the pre-commit checks passed, but the workflow could not push the commit to the PR branch.

          The workflow attempted a rebase retry with conflict auto-resolution and a reset/cherry-pick fallback (favoring agent changes) before failing.
          
          $COMMENT_REFERENCE
          
          Please review the [workflow run]($RUN_URL) logs for details.
          
          $INTERNAL_MARKER
          EOF
          )
          gh pr comment "${{ steps.context.outputs.pr_number }}" --body "$PUSH_FAILED_BODY"

      - name: Report agent success
        if: steps.context.outputs.run_agent == 'true' && steps.commit_push.outputs.changes_pushed == 'true' && steps.precommit_checks.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          COMMENT_REFERENCE: ${{ steps.context.outputs.comment_reference }}
          BEFORE_SHA: ${{ steps.commit_push.outputs.before_sha }}
          AFTER_SHA: ${{ steps.commit_push.outputs.after_sha }}
          HEAD_REF: ${{ steps.context.outputs.head_ref }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          # Fetch latest refs to ensure we have the pushed commits.
          # Use a tokenized URL so fetch works with persist-credentials: false.
          REPO="${{ github.repository }}"
          REMOTE_URL="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          git fetch "$REMOTE_URL" "$HEAD_REF"
          
          # Build commit links: format as markdown links, strip redundant PR/comment references
          COMMIT_LINKS=$(git log "$BEFORE_SHA".."$AFTER_SHA" --format="%H %s" 2>/dev/null | while read -r SHA MSG; do
            MSG=${MSG//(#${{ steps.context.outputs.pr_number }}, comment ${{ steps.context.outputs.comment_id }})/}
            MSG=$(echo "$MSG" | sed -E 's/[[:space:]]+/ /g; s/[[:space:]]+$//')
            echo "- [\`${SHA:0:7}\`](https://github.com/$REPO/commit/$SHA) $MSG"
          done)
          COMMIT_LINKS=${COMMIT_LINKS:-(no commits found)}

          WARNINGS_SECTION=""
          if [[ -f "$WARNINGS_FILE" ]] && [[ -s "$WARNINGS_FILE" ]]; then
            WARNINGS_LIST=$(sed 's/^/- /' "$WARNINGS_FILE")
            WARNINGS_SECTION=$'\n\n**Warnings:**\n'"$WARNINGS_LIST"
          fi
          
          SUCCESS_BODY=$(cat <<EOF
          ## ✅ Cursor Agent: Changes applied
          
          The agent has successfully applied the requested changes and pushed commits to this branch.
          
          $COMMENT_REFERENCE
          $WARNINGS_SECTION
          
          **Commits pushed:**
          $COMMIT_LINKS
          
          [Workflow run]($RUN_URL)
          
          $INTERNAL_MARKER
          EOF
          )
          
          gh pr comment "${{ steps.context.outputs.pr_number }}" \
            --body "$SUCCESS_BODY"

      - name: Mark triggering comment as processed
        if: steps.context.outputs.run_agent == 'true' && (steps.agent.outputs.noop == 'true' || (steps.commit_push.outputs.changes_pushed == 'true' && steps.precommit_checks.outcome == 'success'))
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ steps.context.outputs.pr_number }}
          COMMENT_ID: ${{ steps.context.outputs.comment_id }}
          EVENT_NAME: ${{ steps.context.outputs.event_name }}
        run: |
          touch "$WARNINGS_FILE"
          log_warning() {
            echo "##[warning]$1"
            echo "$1" >> "$WARNINGS_FILE"
          }

          if [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            OWNER="${REPO%%/*}"
            REPO_NAME="${REPO##*/}"

            # PullRequestReviewComment does not have a pullRequestReviewThread field.
            # Instead, query the PR's reviewThreads and find the one containing our comment.
            THREAD_QUERY='query($owner:String!,$repo:String!,$prNumber:Int!,$cursor:String){repository(owner:$owner,name:$repo){pullRequest(number:$prNumber){reviewThreads(first:100,after:$cursor){pageInfo{hasNextPage endCursor}nodes{id isResolved comments(first:100){nodes{databaseId}}}}}}}'

            THREAD_ID=""
            THREAD_RESOLVED=""
            CURSOR=""
            while true; do
              CURSOR_ARG=()
              [[ -n "$CURSOR" ]] && CURSOR_ARG=(-f cursor="$CURSOR")
              THREAD_JSON=$(gh api graphql \
                -f query="$THREAD_QUERY" \
                -f owner="$OWNER" \
                -f repo="$REPO_NAME" \
                -F prNumber="$PR_NUMBER" \
                "${CURSOR_ARG[@]}" \
                2> /tmp/gh-err.txt) || { log_warning "Failed to fetch review threads for PR $PR_NUMBER. API stderr: $(cat /tmp/gh-err.txt)"; exit 0; }

              THREAD_ID=$(echo "$THREAD_JSON" | jq -r --argjson cid "$COMMENT_ID" '
                .data.repository.pullRequest.reviewThreads.nodes[]
                | select(.comments.nodes | any(.databaseId == $cid))
                | .id' | head -1)
              if [[ -n "$THREAD_ID" ]]; then
                THREAD_RESOLVED=$(echo "$THREAD_JSON" | jq -r --argjson cid "$COMMENT_ID" '
                  .data.repository.pullRequest.reviewThreads.nodes[]
                  | select(.comments.nodes | any(.databaseId == $cid))
                  | .isResolved' | head -1)
                break
              fi

              HAS_NEXT=$(echo "$THREAD_JSON" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.hasNextPage')
              [[ "$HAS_NEXT" != "true" ]] && break
              CURSOR=$(echo "$THREAD_JSON" | jq -r '.data.repository.pullRequest.reviewThreads.pageInfo.endCursor')
            done

            [[ -z "$THREAD_ID" ]] && { log_warning "Could not find review thread containing comment $COMMENT_ID in PR $PR_NUMBER."; exit 0; }
            [[ "$THREAD_RESOLVED" == "true" ]] && { echo "Review thread already resolved."; exit 0; }

            RESOLVE_MUTATION='mutation($threadId:ID!){resolveReviewThread(input:{threadId:$threadId}){thread{isResolved}}}'
            gh api graphql -f query="$RESOLVE_MUTATION" -f threadId="$THREAD_ID" 2> /tmp/gh-err.txt || log_warning "Failed to resolve review thread for comment $COMMENT_ID. API stderr: $(cat /tmp/gh-err.txt)"

          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            gh api -X POST "/repos/$REPO/issues/comments/$COMMENT_ID/reactions" -f content=eyes 2> /tmp/gh-err.txt || log_warning "Failed to add reaction for issue comment $COMMENT_ID. API stderr: $(cat /tmp/gh-err.txt)"

          else
            echo "No comment processing action needed for event: $EVENT_NAME"
          fi

      - name: Report agent no-op
        if: steps.context.outputs.run_agent == 'true' && steps.agent.outputs.noop == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          COMMENT_REFERENCE: ${{ steps.context.outputs.comment_reference }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          # Include truncated agent output so you can see why no commits were pushed (optional; sometimes no-op is expected)
          OUTPUT_SECTION=""
          if [[ -f agent-noop-output.txt ]] && [[ -s agent-noop-output.txt ]]; then
            # Escape for HTML inside <pre> so the comment renders safely
            ESCAPED=$(sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g' agent-noop-output.txt)
            OUTPUT_SECTION=$'\n\n<details><summary>Agent output (last 80 lines)</summary>\n\n<pre>'"$ESCAPED"$'</pre>\n</details>\n'
          fi

          WARNINGS_SECTION=""
          if [[ -f "$WARNINGS_FILE" ]] && [[ -s "$WARNINGS_FILE" ]]; then
            WARNINGS_LIST=$(sed 's/^/- /' "$WARNINGS_FILE")
            WARNINGS_SECTION=$'\n\n**Warnings:**\n'"$WARNINGS_LIST"
          fi
          
          NOOP_BODY=$(cat <<EOF
          ## ✅ Cursor Agent: No changes needed
          
          The agent reviewed the comment but did not apply code changes (no commit was pushed).
          
          $COMMENT_REFERENCE
          $WARNINGS_SECTION
          $OUTPUT_SECTION
          [Workflow run]($RUN_URL)
          
          $INTERNAL_MARKER
          EOF
          )
          
          gh pr comment "${{ steps.context.outputs.pr_number }}" \
            --body "$NOOP_BODY"

      - name: Report agent pushed but checks failed
        if: steps.context.outputs.run_agent == 'true' && steps.agent.outcome == 'success' && steps.agent.outputs.changes_present == 'true' && steps.precommit_checks.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          COMMENT_REFERENCE: ${{ steps.context.outputs.comment_reference }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          CHECKS_FAILED_BODY=$(cat <<EOF
          ## ⚠️ Cursor Agent: Changes made but lint/type-check failed

          The agent made changes locally, but the same checks as the pre-commit hook (Biome + TypeScript) failed. No commit was pushed.

          $COMMENT_REFERENCE

          Please fix lint/type errors locally (e.g. \`npx lint-staged\` and \`npm run check:ts\`) and push, or review the [workflow run]($RUN_URL) for details.

          $INTERNAL_MARKER
          EOF
          )
          gh pr comment "${{ steps.context.outputs.pr_number }}" --body "$CHECKS_FAILED_BODY"

      - name: Report agent failure
        if: steps.context.outputs.run_agent == 'true' && steps.agent.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          COMMENT_REFERENCE: ${{ steps.context.outputs.comment_reference }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          # Include last 20 lines of agent stderr in the comment when available
          STDERR_SECTION=""
          if [[ -f agent-stderr.txt ]] && [[ -s agent-stderr.txt ]]; then
            STDERR_TAIL=$(tail -20 agent-stderr.txt)
            ESCAPED=$(echo "$STDERR_TAIL" | sed 's/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g')
            STDERR_SECTION=$'\n\n<details><summary>Agent stderr (last 20 lines)</summary>\n\n<pre>'"$ESCAPED"$'</pre>\n</details>\n'
          fi

          # Create a more informative failure message
          FAILURE_BODY=$(cat <<EOF
          ## ❌ Cursor Agent Failed
          
          The Cursor agent failed to process the comment. Check the [workflow run]($RUN_URL) for details.
          
          $COMMENT_REFERENCE
          $STDERR_SECTION
          **Common reasons:**
          - The requested fix was already applied
          - The agent could not make the requested changes
          - An error occurred during execution
          
          $INTERNAL_MARKER
          EOF
          )
          
          gh pr comment "${{ steps.context.outputs.pr_number }}" \
            --body "$FAILURE_BODY"

      # Only fail the job for agent or pre-commit failures. Push failures (e.g. token permission
      # issues) are reported via "Report push failure" but do not fail the run.
      - name: Fail job if workflow had errors
        if: steps.context.outputs.run_agent == 'true' && (steps.agent.outcome == 'failure' || steps.precommit_checks.outcome == 'failure')
        run: exit 1

      # Catch-all: report any failure not already covered by the specific reporters above
      # (e.g. queue timeout, rate-limit step crash, unexpected infrastructure errors).
      - name: Report unexpected workflow failure
        if: failure() && steps.context.outputs.run_agent == 'true' && steps.agent.outcome != 'failure' && steps.precommit_checks.outcome != 'failure' && steps.commit_push.outcome != 'failure'
        env:
          GH_TOKEN: ${{ secrets.GH_AGENT_TOKEN }}
          COMMENT_REFERENCE: ${{ steps.context.outputs.comment_reference }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          BODY=$(cat <<EOF
          ## ❌ Cursor Agent: Workflow error

          The agent workflow failed before the agent could run (e.g. queue timeout or infrastructure error).

          $COMMENT_REFERENCE

          See the [workflow run]($RUN_URL) for details.

          $INTERNAL_MARKER
          EOF
          )
          gh pr comment "${{ steps.context.outputs.pr_number }}" --body "$BODY"
