name: Update Docs

on:
  pull_request:
    types: [closed]

permissions:
  contents: write
  pull-requests: write

jobs:
  docs:
    if: ${{ github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main' && github.event.pull_request.head.repo.full_name == github.repository && github.event.pull_request.user.login == 'jsolly' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0

      - name: Setup Cursor CLI
        uses: ./.github/shared/setup-cursor

      - name: Update docs
        env:
          MODEL: gpt-5.2
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          agent -p "You are operating in a GitHub Actions runner.

          The GitHub CLI is available as \`gh\` and authenticated via \`GH_TOKEN\`. Git is available. You have write access to repository contents.

          # Context:
          - Repo: ${{ github.repository }}
          - Owner: ${{ github.repository_owner }}
          - PR Number: ${{ github.event.pull_request.number }}
          - Base Ref: ${{ github.event.pull_request.base.ref }}
          - Head Ref: ${{ github.event.pull_request.head.ref }}
          - Base SHA: ${{ github.event.pull_request.base.sha }}
          - Head SHA: ${{ github.event.pull_request.head.sha }}
          - Merge Commit SHA: ${{ github.event.pull_request.merge_commit_sha }}

          # Goal:
          - Update \`README.md\` on \`main\` based on the merged PR changes, then commit + push directly to \`main\` (no follow-up PR).

          # Requirements:
          1) Determine what changed in the merged PR using \`gh pr diff ${{ github.event.pull_request.number }}\` (or \`git diff BASE_SHA HEAD_SHA\` with the PR base and head SHAs from Context). This inspects the full set of PR commits, including rebase merges; do NOT use merge-commit-vs-parent diff.
          2) Update only README.md based on those changes. Do NOT update any other documentation files.
          3) Commit and push changes directly to \`main\`. Only create a commit if \`README.md\` changed.
          4) Do NOT create or edit pull requests.

          # Inputs and conventions:
          - Use \`gh pr diff <PR_NUMBER>\` or \`git diff <BASE_SHA> <HEAD_SHA>\` (with PR base/head from Context) to obtain the PR-level diff. Use that diff to detect changes; do not use merge-commit-vs-parent comparison.
          - Only update README.md. Do not modify any other files.
          - If no README updates are necessary, make no changes and do not commit.
          - Keep changes minimal and consistent with repo style.

          # Implementation notes:
          - You are checked out on \`main\`. After updating README.md, run \`git status --porcelain\` to confirm only README.md changed.
          - If README.md changed, run:
            - \`git add README.md\`
            - \`git commit -m \"docs: update README for PR #${{ github.event.pull_request.number }}\" \`
            - \`git push origin main\`

          # Deliverables when updates occur:
          - A commit pushed directly to \`main\` that changes only \`README.md\`.
          " --force --model "$MODEL" --output-format=text
