name: Cursor Agent on PR Comment
run-name: cursor-agent pr-${{ github.event.issue.number || github.event.pull_request.number }} comment-${{ github.event.comment.id || github.event.review.id }}

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  run-agent:
    runs-on: ubuntu-latest
    env:
      INTERNAL_MARKER: "<!-- cursor-agent-workflow:internal -->"
      WORKFLOW_FILE: agents/cursor-agent-on-pr-comment.yml
      CURSOR_AGENT_NAME: "Cursor Agent"
      CURSOR_AGENT_EMAIL: "cursoragent@cursor.com"
    steps:
      - name: Check if should skip
        id: should_skip
        env:
          COMMENT_BODY: ${{ github.event.comment.body || github.event.review.body }}
          COMMENT_USER: ${{ github.event.comment.user.login || github.event.review.user.login }}
        run: |
          SKIP="false"
          REPO="${{ github.repository }}"

          # Debug: log the commenter username for troubleshooting
          echo "Commenter username: '$COMMENT_USER'"
          echo "Event name: ${{ github.event_name }}"

          # Skip if commenter is not in the allowlist
          OWNER=$(echo "$REPO" | cut -d'/' -f1)
          IS_OWNER=$([[ "$COMMENT_USER" == "$OWNER" ]] && echo "true" || echo "false")
          IS_CODERABBIT_BOT=$([[ "$COMMENT_USER" == "coderabbitai[bot]" ]] && echo "true" || echo "false")
          IS_VERCEL_BOT=$([[ "$COMMENT_USER" == "vercel[bot]" ]] && echo "true" || echo "false")

          if [[ "$IS_OWNER" != "true" ]] && [[ "$IS_CODERABBIT_BOT" != "true" ]] && [[ "$IS_VERCEL_BOT" != "true" ]]; then
            echo "Skipping: commenter is not in the allowlist"
            SKIP="true"
          fi

          # Check for internal marker
          if [[ "$COMMENT_BODY" == *"$INTERNAL_MARKER"* ]]; then
            echo "Skipping internal workflow comment."
            SKIP="true"
          fi

          # Skip Vercel deployment status updates (status tables, preview links, deployment notifications).
          # Process Vercel Agent review comments (actual code review comments without status markers).
          if [[ "$COMMENT_USER" == "vercel" ]] || [[ "$COMMENT_USER" == "vercel[bot]" ]]; then
            if [[ "$COMMENT_BODY" == *"The latest updates on your projects"* ]] || \
               [[ "$COMMENT_BODY" == *"[vc]:"* ]] || \
               [[ "$COMMENT_BODY" == *"<!-- vercel:"* ]] || \
               [[ "$COMMENT_BODY" =~ ^\[vc\]: ]]; then
              echo "Skipping Vercel status update: $COMMENT_USER"
              SKIP="true"
            fi
          fi

          # Skip comments that mention @coderabbitai (unless it's CodeRabbit itself responding).
          # The owner uses @coderabbitai to request reviews; ignore those replies here.
          if [[ "$COMMENT_BODY" =~ @[Cc]oderabbitai ]]; then
            if [[ "$COMMENT_USER" != "coderabbitai[bot]" ]]; then
              echo "Skipping comment that mentions @coderabbitai from $COMMENT_USER"
              SKIP="true"
            fi
          fi

          # Skip CodeRabbit acknowledgment comments when a full review is triggered.
          if [[ "$COMMENT_USER" == "coderabbitai[bot]" ]]; then
            if [[ "$COMMENT_BODY" =~ [Ff]ull[[:space:]]+review[[:space:]]+triggered ]]; then
              echo "Skipping CodeRabbit acknowledgment comment (Full review triggered)"
              SKIP="true"
            fi
          fi

          # Skip pull_request_review events without a body (approvals/rejections with no comment).
          if [[ "${{ github.event_name }}" == "pull_request_review" ]]; then
            if [[ -z "$COMMENT_BODY" ]] || [[ "$COMMENT_BODY" == "null" ]]; then
              echo "Skipping review without body (approval/rejection with no comment)"
              SKIP="true"
            fi
          fi

          echo "skip=$SKIP" >> "$GITHUB_OUTPUT"

      - name: Extract PR metadata
        id: pr
        if: steps.should_skip.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          EVENT_NAME="${{ github.event_name }}"
          
          if [[ "$EVENT_NAME" == "pull_request_review" ]]; then
            COMMENT_ID="${{ github.event.review.id }}"
            COMMENT_USER="${{ github.event.review.user.login }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            IS_PR="true"
          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            COMMENT_ID="${{ github.event.comment.id }}"
            COMMENT_USER="${{ github.event.comment.user.login }}"
            PR_NUMBER="${{ github.event.issue.number }}"
            # github.event.issue.pull_request.url is only present when the issue is a PR
            PULL_REQUEST_URL="${{ github.event.issue.pull_request.url }}"
            IS_PR=$([[ -n "$PULL_REQUEST_URL" && "$PULL_REQUEST_URL" != "null" ]] && echo "true" || echo "false")
          else
            COMMENT_ID="${{ github.event.comment.id }}"
            COMMENT_USER="${{ github.event.comment.user.login }}"
            PR_NUMBER="${{ github.event.pull_request.number }}"
            IS_PR="true"
          fi

          if [[ "$IS_PR" == "true" ]]; then
            PR_JSON=$(gh api "repos/$REPO/pulls/$PR_NUMBER")
            HEAD_REPO=$(echo "$PR_JSON" | jq -r '.head.repo.full_name')
            HEAD_REF=$(echo "$PR_JSON" | jq -r '.head.ref')
            HEAD_SHA=$(echo "$PR_JSON" | jq -r '.head.sha')
            PR_AUTHOR=$(echo "$PR_JSON" | jq -r '.user.login // ""')
            IS_AUTHOR=$([[ "$PR_AUTHOR" == "jsolly" ]] && echo "true" || echo "false")
          else
            HEAD_REPO=""
            HEAD_REF=""
            HEAD_SHA=""
            PR_AUTHOR=""
            IS_AUTHOR="false"
          fi

          # Construct comment URL based on event type
          if [[ "$EVENT_NAME" == "pull_request_review_comment" ]]; then
            COMMENT_URL="https://github.com/$REPO/pull/$PR_NUMBER#discussion_r$COMMENT_ID"
          elif [[ "$EVENT_NAME" == "issue_comment" ]]; then
            COMMENT_URL="https://github.com/$REPO/pull/$PR_NUMBER#issuecomment-$COMMENT_ID"
          elif [[ "$EVENT_NAME" == "pull_request_review" ]]; then
            # Reviews don't have a direct comment anchor, but we can link to the review
            COMMENT_URL="https://github.com/$REPO/pull/$PR_NUMBER#pullrequestreview-$COMMENT_ID"
          else
            COMMENT_URL=""
          fi

          {
            echo "pr_number=$PR_NUMBER"
            echo "head_repo=$HEAD_REPO"
            echo "head_ref=$HEAD_REF"
            echo "head_sha=$HEAD_SHA"
            echo "comment_id=$COMMENT_ID"
            echo "comment_user=$COMMENT_USER"
            echo "event_name=$EVENT_NAME"
            echo "is_pr=$IS_PR"
            echo "pr_author=$PR_AUTHOR"
            echo "is_author=$IS_AUTHOR"
            echo "comment_url=$COMMENT_URL"
          } >> "$GITHUB_OUTPUT"

      - name: Wait for earlier agent runs (per PR)
        if: steps.should_skip.outputs.skip != 'true' && steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.is_author == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
        run: |
          REPO="${{ github.repository }}"
          CURRENT_RUN_ID="${{ github.run_id }}"

          # GitHub Actions concurrency only keeps one pending run per group; additional triggers
          # cancel older pending runs. We want strict FIFO per PR instead, so we implement an
          # explicit queue by waiting until all *earlier* runs for this PR complete.

          WORKFLOW_ID=$(gh api "repos/$REPO/actions/workflows" --jq ".workflows[] | select(.path == \".github/workflows/$WORKFLOW_FILE\") | .id" 2>&1)
          WORKFLOW_ID_EXIT=$?
          if [[ $WORKFLOW_ID_EXIT -ne 0 ]] || [[ -z "$WORKFLOW_ID" ]]; then
            echo "Error: Could not find workflow ID for $WORKFLOW_FILE"
            exit 1
          fi

          PR_MARKER="pr-$PR_NUMBER"
          START_TS=$(date +%s)
          MAX_WAIT_SECONDS=$((60 * 60)) # 1 hour

          while true; do
            NOW_TS=$(date +%s)
            ELAPSED=$((NOW_TS - START_TS))
            if [[ "$ELAPSED" -ge "$MAX_WAIT_SECONDS" ]]; then
              echo "Error: Timed out waiting for earlier agent runs for $PR_MARKER"
              exit 1
            fi

            RUNS_JSON=$(gh api "repos/$REPO/actions/workflows/$WORKFLOW_ID/runs?per_page=100" 2>&1)
            RUNS_EXIT=$?
            if [[ $RUNS_EXIT -ne 0 ]]; then
              echo "Error: Could not query workflow runs:"
              echo "$RUNS_JSON"
              exit 1
            fi

            # We use run-name to reliably tag each run with pr-<number>.
            # Wait for any earlier run IDs for this PR that are not completed.
            BLOCKERS=$(echo "$RUNS_JSON" | jq --arg marker "$PR_MARKER" --argjson current "$CURRENT_RUN_ID" -r '
              [.workflow_runs[]
                | select((.display_title // "") | contains($marker))
                | select((.id // 0) < $current)
                | select((.status // "") != "completed")
                | {id, status, html_url}
              ]
              | sort_by(.id)
            ')

            BLOCKER_COUNT=$(echo "$BLOCKERS" | jq 'length')
            if [[ "$BLOCKER_COUNT" -eq 0 ]]; then
              echo "No earlier agent runs for $PR_MARKER are active; proceeding."
              exit 0
            fi

            OLDEST=$(echo "$BLOCKERS" | jq -r '.[0].id')
            echo "Waiting for $BLOCKER_COUNT earlier agent run(s) for $PR_MARKER to complete (oldest blocking run_id=$OLDEST)."
            sleep 20
          done

      - name: Rate limit check
        if: steps.should_skip.outputs.skip != 'true' && steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.is_author == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ steps.pr.outputs.pr_number }}"
          REPO="${{ github.repository }}"
          NOW=$(date -u +%s)
          LIMIT=$((NOW - 3600))

          # Get workflow ID from the workflow file name
          WORKFLOW_ID=$(gh api "repos/$REPO/actions/workflows" --jq ".workflows[] | select(.path == \".github/workflows/$WORKFLOW_FILE\") | .id" 2>&1)
          WORKFLOW_ID_EXIT=$?

          if [[ $WORKFLOW_ID_EXIT -ne 0 ]] || [[ -z "$WORKFLOW_ID" ]]; then
            echo "Warning: Could not find workflow ID for $WORKFLOW_FILE, skipping rate limit check"
            exit 0
          fi

          # Query workflow runs with error handling - if permissions are insufficient, skip rate limiting
          RUNS_JSON=$(gh api "repos/$REPO/actions/workflows/$WORKFLOW_ID/runs?per_page=100" 2>&1)
          RUNS_EXIT=$?

          if [[ $RUNS_EXIT -ne 0 ]]; then
            echo "Warning: Could not query workflow runs (permissions may be insufficient), skipping rate limit check"
            echo "API error: $RUNS_JSON"
            exit 0
          fi

          # Filter runs from the last hour
          # For issue_comment-triggered runs, pull_requests is empty, so we need to check head_sha associations
          RECENT_RUNS=$(echo "$RUNS_JSON" | jq --argjson limit "$LIMIT" \
            '[.workflow_runs[] | select(.created_at | fromdateiso8601 >= $limit)]' 2>&1)

          COUNT=0
          RUN_COUNT=$(echo "$RECENT_RUNS" | jq 'length' 2>&1)

          # Ensure RUN_COUNT is a valid number
          if ! [[ "$RUN_COUNT" =~ ^[0-9]+$ ]]; then
            echo "Warning: Could not determine run count, skipping rate limit check"
            exit 0
          fi

          for ((i=0; i<RUN_COUNT; i++)); do
            RUN=$(echo "$RECENT_RUNS" | jq ".[$i]" 2>&1)
            
            # First, try the pull_requests field (works for pull_request triggered runs)
            PR_MATCH=$(echo "$RUN" | jq --arg pr "$PR_NUMBER" \
              'if (.pull_requests // []) | any(.number == ($pr|tonumber)) then 1 else 0 end' 2>&1)
            
            if [[ "$PR_MATCH" == "1" ]]; then
              COUNT=$((COUNT + 1))
              continue
            fi
            
            # If pull_requests is empty, check head_sha association via commits API
            # This handles issue_comment-triggered runs
            HEAD_SHA=$(echo "$RUN" | jq -r '.head_sha // ""' 2>&1)
            
            if [[ -z "$HEAD_SHA" ]] || [[ "$HEAD_SHA" == "null" ]]; then
              continue
            fi
            
            # Check if this head_sha is associated with the PR via commits API
            COMMITS_PULLS=$(gh api "repos/$REPO/commits/$HEAD_SHA/pulls" 2>&1)
            COMMITS_EXIT=$?
            
            if [[ $COMMITS_EXIT -ne 0 ]]; then
              # If API call fails, skip this run (mirror existing RUNS_EXIT logic)
              echo "Warning: Could not check commits/$HEAD_SHA/pulls, skipping this run"
              continue
            fi
            
            # Check if any associated PR matches our PR number
            PR_MATCH=$(echo "$COMMITS_PULLS" | jq --arg pr "$PR_NUMBER" \
              '[.[] | select(.number == ($pr|tonumber))] | length' 2>&1)
            
            if [[ "$PR_MATCH" -gt 0 ]]; then
              COUNT=$((COUNT + 1))
            fi
          done

          if [[ "$COUNT" -ge 60 ]]; then
            RUN_URL="https://github.com/$REPO/actions/runs/${{ github.run_id }}"
            gh pr comment "$PR_NUMBER" \
              --body "Rate limit reached: max 60 runs/hour for this PR. [Workflow run]($RUN_URL) $INTERNAL_MARKER"
            exit 0
          fi

      - name: Checkout PR head
        if: steps.should_skip.outputs.skip != 'true' && steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.is_author == 'true'
        uses: actions/checkout@v6
        with:
          repository: ${{ steps.pr.outputs.head_repo }}
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Setup Cursor CLI
        if: steps.should_skip.outputs.skip != 'true' && steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.is_author == 'true'
        uses: ./.github/shared/setup-cursor
        with:
          git_name: ${{ env.CURSOR_AGENT_NAME }}
          git_email: ${{ env.CURSOR_AGENT_EMAIL }}

      - name: Configure git remote for pushing
        if: steps.should_skip.outputs.skip != 'true' && steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.is_author == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_REPO: ${{ steps.pr.outputs.head_repo }}
        run: |
          # Configure remote URL with token for pushing
          # Extract owner and repo from HEAD_REPO (format: owner/repo)
          REMOTE_URL="https://${GH_TOKEN}@github.com/${HEAD_REPO}.git"
          git remote set-url origin "$REMOTE_URL"

      - name: Sync to latest head
        if: steps.should_skip.outputs.skip != 'true' && steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.is_author == 'true'
        env:
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
        run: |
          git fetch origin "$HEAD_REF"
          git reset --hard "origin/$HEAD_REF"

      - name: Run Cursor agent
        if: steps.should_skip.outputs.skip != 'true' && steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.is_author == 'true'
        id: agent
        continue-on-error: true
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.pr_number }}
          COMMENT_ID: ${{ steps.pr.outputs.comment_id }}
          COMMENT_EVENT: ${{ steps.pr.outputs.event_name }}
          COMMENT_BODY: ${{ github.event.comment.body || github.event.review.body }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          HEAD_SHA: ${{ steps.pr.outputs.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          BEFORE_SHA="$(git rev-parse HEAD)"
          AGENT_OUTPUT_FILE=$(mktemp)
          AGENT_ERROR_FILE=$(mktemp)
          echo "noop=false" >> "$GITHUB_OUTPUT"

          PROMPT="$(
            cat <<EOF
            ---SYSTEM_INSTRUCTIONS_START---
            You are running in GitHub Actions. You can use git and gh. Do not post PR comments.

            Context:
            - Repo: $REPO
            - PR Number: $PR_NUMBER
            - Head Branch: $HEAD_REF
            - Trigger Event: $COMMENT_EVENT
            - Trigger Comment ID: $COMMENT_ID

            Do this:
            1) Make the necessary code changes requested in the user comment below.
            2) If you made changes, commit and push directly to the PR head branch. If no changes are needed, do not commit.
            3) If you commit, include the PR number and comment ID in the commit message.
            4) After a successful push, mark the comment as resolved:
               - If the event is pull_request_review_comment, resolve the review thread using GraphQL:
                 1. Get the comment via REST API to extract its node_id:
                    COMMENT_JSON=\$(gh api "repos/$REPO/pulls/$PR_NUMBER/comments/$COMMENT_ID")
                    NODE_ID=\$(echo "\$COMMENT_JSON" | jq -r '.node_id')
                 2. Query the comment via GraphQL to get its thread ID:
                    THREAD_QUERY='query{node(id:"'"'"'"\$NODE_ID"'"'"'"){... on PullRequestReviewComment{thread{id}}}}'
                    THREAD_ID=\$(gh api graphql -f query="\$THREAD_QUERY" -q '.data.node.thread.id')
                 3. Resolve the thread:
                    RESOLVE_MUTATION='mutation{resolveReviewThread(input:{threadId:"'"'"'"\$THREAD_ID"'"'"'"}){thread{isResolved}}}'
                    gh api graphql -f query="\$RESOLVE_MUTATION"
               - If the event is pull_request_review, no action needed (review stands as submitted).
               - If the event is issue_comment, add a reaction:
                 gh api -X POST /repos/$REPO/issues/comments/$COMMENT_ID/reactions -f content=eyes

            ---SYSTEM_INSTRUCTIONS_END---

            ---USER_INPUT_START---
            $COMMENT_BODY
            ---USER_INPUT_END---
          EOF
          )"

          # Use --print for non-interactive runs (enables tool access) and pass the prompt as the
          # positional argument, per Cursor CLI docs.
          # --force is required so the agent can actually execute commands (git/gh) in CI.
          # Capture both stdout and stderr for better error reporting.
          echo "Running Cursor agent..."
          if ! agent --print --model gpt-5.2 --output-format=text --force "$PROMPT" > "$AGENT_OUTPUT_FILE" 2> "$AGENT_ERROR_FILE"; then
            AGENT_EXIT_CODE=$?
            echo "##[error]Agent command failed with exit code $AGENT_EXIT_CODE"
            echo "=== Agent stdout ==="
            cat "$AGENT_OUTPUT_FILE" || true
            echo ""
            echo "=== Agent stderr ==="
            cat "$AGENT_ERROR_FILE" || true
            rm -f "$AGENT_OUTPUT_FILE" "$AGENT_ERROR_FILE"
            exit $AGENT_EXIT_CODE
          fi

          # Log agent output for debugging
          echo "=== Agent output ==="
          cat "$AGENT_OUTPUT_FILE" || true
          if [[ -s "$AGENT_ERROR_FILE" ]]; then
            echo "=== Agent stderr ==="
            cat "$AGENT_ERROR_FILE" || true
          fi

          # Save agent output for failure reporting
          AGENT_OUTPUT=$(cat "$AGENT_OUTPUT_FILE" || echo "")
          rm -f "$AGENT_OUTPUT_FILE" "$AGENT_ERROR_FILE"

          # Fetch first so we can distinguish "unpushed" vs "already pushed" using remote as source of truth.
          git fetch origin "$HEAD_REF"
          AFTER_SHA="$(git rev-parse "origin/$HEAD_REF")"
          UNPUSHED=$(git log "origin/$HEAD_REF"..HEAD --oneline 2>/dev/null || echo "")

          if [[ -n "$UNPUSHED" ]]; then
            echo "Agent created local commits that are not on the remote; pushing..."
            echo "$UNPUSHED"
            if ! git push origin "$HEAD_REF"; then
              echo "##[error]Failed to push local commits. This may be a fork PR where GITHUB_TOKEN cannot push."
              echo "Push error details:"
              git push origin "$HEAD_REF" 2>&1 || true
              exit 1
            fi
            git fetch origin "$HEAD_REF"
            AFTER_SHA="$(git rev-parse "origin/$HEAD_REF")"
          fi

          if [[ "$AFTER_SHA" == "$BEFORE_SHA" ]]; then
            echo "##[warning]Agent completed with no changes (branch unchanged at $AFTER_SHA)."
            echo "Before SHA: $BEFORE_SHA"
            echo "After SHA: $AFTER_SHA"
            LOCAL_COMMITS=$(git log "$BEFORE_SHA"..HEAD --oneline 2>/dev/null || echo "")
            echo "Local commits: $LOCAL_COMMITS"
            echo ""
            echo "Last 50 lines of agent output:"
            echo "$AGENT_OUTPUT" | tail -50 || echo "(no agent output captured)"
            echo "noop=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Commits were pushed successfully
          echo "changes_pushed=true" >> "$GITHUB_OUTPUT"
          echo "before_sha=$BEFORE_SHA" >> "$GITHUB_OUTPUT"
          echo "after_sha=$AFTER_SHA" >> "$GITHUB_OUTPUT"

      - name: Report agent success
        if: steps.should_skip.outputs.skip != 'true' && steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.is_author == 'true' && steps.agent.outputs.changes_pushed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_URL: ${{ steps.pr.outputs.comment_url }}
          BEFORE_SHA: ${{ steps.agent.outputs.before_sha }}
          AFTER_SHA: ${{ steps.agent.outputs.after_sha }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          # Fetch latest refs to ensure we have the pushed commits
          git fetch origin "$HEAD_REF" || true
          
          if [[ -n "$COMMENT_URL" ]]; then
            REFERENCE="In response to [this comment]($COMMENT_URL)."
          else
            REFERENCE=""
          fi
          
          # Get commit messages for the pushed commits
          COMMITS=$(git log "$BEFORE_SHA".."$AFTER_SHA" --oneline --no-decorate 2>/dev/null || echo "")
          
          SUCCESS_BODY=$(cat <<EOF
          ## ✅ Cursor Agent: Changes applied
          
          The agent has successfully applied the requested changes and pushed commits to this branch.
          
          $REFERENCE
          
          **Commits pushed:**
          \`\`\`
          $COMMITS
          \`\`\`
          
          [Workflow run]($RUN_URL)
          
          $INTERNAL_MARKER
          EOF
          )
          
          gh pr comment "${{ steps.pr.outputs.pr_number }}" \
            --body "$SUCCESS_BODY"

      - name: Report agent no-op
        if: steps.should_skip.outputs.skip != 'true' && steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.is_author == 'true' && steps.agent.outputs.noop == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_URL: ${{ steps.pr.outputs.comment_url }}
          RUN_URL: "https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        run: |
          if [[ -n "$COMMENT_URL" ]]; then
            REFERENCE="In response to [this comment]($COMMENT_URL)."
          else
            REFERENCE=""
          fi
          
          NOOP_BODY=$(cat <<EOF
          ## ✅ Cursor Agent: No changes needed
          
          The agent reviewed the comment but did not apply code changes (no commit was pushed).
          
          $REFERENCE
          
          [Workflow run]($RUN_URL)
          
          $INTERNAL_MARKER
          EOF
          )
          
          gh pr comment "${{ steps.pr.outputs.pr_number }}" \
            --body "$NOOP_BODY"

      - name: Report agent failure
        if: steps.should_skip.outputs.skip != 'true' && steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.is_author == 'true' && steps.agent.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COMMENT_URL: ${{ steps.pr.outputs.comment_url }}
        run: |
          # Get the workflow run logs URL for this run
          RUN_ID="${{ github.run_id }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/$RUN_ID"
          
          if [[ -n "$COMMENT_URL" ]]; then
            REFERENCE="In response to [this comment]($COMMENT_URL)."
          else
            REFERENCE=""
          fi
          
          # Create a more informative failure message
          FAILURE_BODY=$(cat <<EOF
          ## ❌ Cursor Agent Failed
          
          The Cursor agent failed to process the comment. Check the [workflow run]($RUN_URL) for details.
          
          $REFERENCE
          
          **Common reasons:**
          - The requested fix was already applied
          - The agent could not make the requested changes
          - An error occurred during execution
          
          $INTERNAL_MARKER
          EOF
          )
          
          gh pr comment "${{ steps.pr.outputs.pr_number }}" \
            --body "$FAILURE_BODY"

      - name: Fail job if agent failed
        if: steps.should_skip.outputs.skip != 'true' && steps.pr.outputs.is_pr == 'true' && steps.pr.outputs.is_author == 'true' && steps.agent.outcome == 'failure'
        run: exit 1
