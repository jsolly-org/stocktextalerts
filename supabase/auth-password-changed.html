<!DOCTYPE html>
<html>
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<meta name="color-scheme" content="light" />
	</head>
	<body
		style="
			font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue',
				Arial, sans-serif;
			line-height: 1.6;
			color: #111827;
			max-width: 600px;
			margin: 0 auto;
			padding: 20px;
		"
	>
		<div
			style="
				background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
				padding: 30px;
				border-radius: 8px 8px 0 0;
				text-align: center;
			"
		>
			<h1 style="color: white; margin: 0; font-size: 28px; font-weight: 600">
				📈 StockTextAlerts
			</h1>
		</div>

		<div
			style="
				background: #ffffff;
				padding: 40px;
				border: 1px solid #e5e7eb;
				border-top: none;
				border-radius: 0 0 8px 8px;
			"
		>
			<h2 style="color: #1f2937; margin-top: 0; font-size: 24px; font-weight: 600">
				Your password has been changed
			</h2>

			<p style="color: #4b5563; font-size: 16px; margin-bottom: 28px">
				This is a confirmation that the password for your account
				<strong>{{ .Email }}</strong> has just been changed.
			</p>

			<p style="color: #4b5563; font-size: 16px; margin-bottom: 0">
				If you did not make this change, please contact us at
				<a href="mailto:support@stocktextalerts.com" style="color: #667eea; text-decoration: none"
					>support@stocktextalerts.com</a
				>.
			</p>
		</div>
	</body>
</html>
