# https://supabase.com/docs/guides/local-development/cli/config
project_id = "stocktextalerts"

[db]
major_version = 17

[db.migrations]
schema_paths = []

[db.seed]
sql_paths = ["./seed.sql"]

[studio]
openai_api_key = "env(OPENAI_API_KEY)"

[auth]
site_url = "http://localhost:4321"
additional_redirect_urls = ["http://localhost:4321", "http://localhost:4321/auth/verified"]

[auth.email]
double_confirm_changes = true
enable_confirmations = true

[auth.email.template.confirmation]
subject = "Confirm your email — StockTextAlerts"
content_path = "./supabase/auth-confirmation.html"

[auth.email.template.recovery]
subject = "Reset your password — StockTextAlerts"
content_path = "./supabase/auth-recovery.html"

[auth.email.template.email_change]
subject = "Confirm your email change — StockTextAlerts"
content_path = "./supabase/auth-email-change.html"

[inbucket]
enabled = true
port = 54324
# Exposed so createEmailSender() can route dev/test emails through
# Mailpit (http://localhost:54324) instead of real SES. See
# src/lib/messaging/email/utils.ts.
smtp_port = 1025

# Vector/Logflare analytics disabled for Podman compatibility. The Vector
# log shipper tries to read logs from the Docker socket inside its
# container, which Podman's Docker-API shim doesn't expose cleanly —
# `supabase start` hangs on `vector container is not ready` otherwise.
# We don't use the local analytics UI, so turning it off is a net win.
[analytics]
enabled = false

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"
