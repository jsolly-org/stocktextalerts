# https://supabase.com/docs/guides/local-development/cli/config
project_id = "stocktextalerts"

[db]
major_version = 17

[db.migrations]
schema_paths = []

[db.seed]
sql_paths = ["./seed.sql"]

[studio]
openai_api_key = "env(OPENAI_API_KEY)"

[auth]
site_url = "http://localhost:4321"
additional_redirect_urls = ["http://localhost:4321", "http://localhost:4321/auth/verified"]

[auth.email]
double_confirm_changes = true
enable_confirmations = true

[auth.email.template.confirmation]
subject = "Confirm your email — Stock Text Alerts"
content_path = "./supabase/auth-confirmation.html"

[auth.email.template.recovery]
subject = "Reset your password — Stock Text Alerts"
content_path = "./supabase/auth-recovery.html"

[auth.email.template.email_change]
subject = "Confirm your email change — Stock Text Alerts"
content_path = "./supabase/auth-email-change.html"

[experimental]
orioledb_version = ""
s3_host = "env(S3_HOST)"
s3_region = "env(S3_REGION)"
s3_access_key = "env(S3_ACCESS_KEY)"
s3_secret_key = "env(S3_SECRET_KEY)"
