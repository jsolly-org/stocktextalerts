pg_version = "17.0"
assume_in_transaction = true

excluded_rules = [
  "prefer-text-field",
  "prefer-bigint-over-int",
  "prefer-bigint-over-smallint",
  # Migrations run inside a transaction (assume_in_transaction above), so CREATE/DROP
  # INDEX CONCURRENTLY is impossible — these rules can never be satisfied here.
  "require-concurrent-index-creation",
  "require-concurrent-index-deletion",
  # Appending a new enum value (no BEFORE/AFTER) is the normal pattern; ordering
  # is not semantically meaningful for our delivery_method enum.
  "require-enum-value-ordering",
]

