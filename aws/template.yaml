AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: StockTextAlerts cron Lambda functions

Parameters:
  SupabaseUrl:
    Type: String
    NoEcho: true
  SupabaseSecretKey:
    Type: String
    NoEcho: true
  SiteUrl:
    Type: String
  MassiveApiKey:
    Type: String
    NoEcho: true
  FinnhubApiKey:
    Type: String
    NoEcho: true
  XaiApiKey:
    Type: String
    NoEcho: true
  EmailFrom:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /stocktextalerts/email-from
    Description: "SSM key whose value is the SES From: header (display name + address)"
  TwilioAccountSid:
    Type: String
    NoEcho: true
  TwilioAuthToken:
    Type: String
    NoEcho: true
  TwilioPhoneNumber:
    Type: String
    NoEcho: true
  UnsubscribeTokenSecret:
    Type: String
    NoEcho: true
  # Default "false" for local dev (sam local invoke); deploy.sh overrides to "true" for production
  LogMaskPii:
    Type: String
    Default: "false"
  AlertTopicArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /alert-hub/alert-topic-arn
    Description: Alert-hub SNS topic ARN
  GitSha:
    Type: String
    Default: unknown
    Description: Git SHA (short) baked into each Lambda at deploy time

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - arm64
    MemorySize: 512
    Environment:
      Variables:
        NODE_ENV: production
        SUPABASE_URL: !Ref SupabaseUrl
        SUPABASE_SECRET_KEY: !Ref SupabaseSecretKey
        LOG_MASK_PII: !Ref LogMaskPii
        GIT_SHA: !Ref GitSha

Resources:
  ScheduleFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        # Minify: false — SAM's esbuild integration minifies by default,
        # which mangles function names in CloudWatch stack traces. These
        # Lambdas run unattended, so readable traces >> smaller bundles.
        Minify: false
        Format: cjs
        Target: node24
        Sourcemap: true
        EntryPoints:
          - schedule.ts
    Properties:
      FunctionName: stocktextalerts-schedule
      Handler: schedule.handler
      CodeUri: src/handlers
      Timeout: 300
      MemorySize: 512
      LoggingConfig:
        LogGroup: !Ref ScheduleLogGroup
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "arn:aws:ses:us-east-1:730335616323:identity/stocktextalerts.com"
      Environment:
        Variables:
          SITE_URL: !Ref SiteUrl
          MASSIVE_API_KEY: !Ref MassiveApiKey
          FINNHUB_API_KEY: !Ref FinnhubApiKey
          XAI_API_KEY: !Ref XaiApiKey
          EMAIL_FROM: !Ref EmailFrom
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          TWILIO_PHONE_NUMBER: !Ref TwilioPhoneNumber
          UNSUBSCRIBE_TOKEN_SECRET: !Ref UnsubscribeTokenSecret
      Events:
        EveryMinute:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "rate(1 minute)"
            State: ENABLED
            RoleArn: !GetAtt StockTextAlertsSchedulerRole.Arn

  AssetEventsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        # Minify: false — SAM's esbuild integration minifies by default,
        # which mangles function names in CloudWatch stack traces. These
        # Lambdas run unattended, so readable traces >> smaller bundles.
        Minify: false
        Format: cjs
        Target: node24
        Sourcemap: true
        EntryPoints:
          - asset-events.ts
    Properties:
      FunctionName: stocktextalerts-asset-events
      Handler: asset-events.handler
      CodeUri: src/handlers
      Timeout: 300
      MemorySize: 256
      LoggingConfig:
        LogGroup: !Ref AssetEventsLogGroup
      Policies:
        # Required by the daily delisting sweep, which emails affected
        # users when one of their holdings gets delisted. SMS is delivered
        # via Twilio REST so no additional IAM permissions are needed.
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "arn:aws:ses:us-east-1:730335616323:identity/stocktextalerts.com"
      Environment:
        Variables:
          SITE_URL: !Ref SiteUrl
          MASSIVE_API_KEY: !Ref MassiveApiKey
          FINNHUB_API_KEY: !Ref FinnhubApiKey
          EMAIL_FROM: !Ref EmailFrom
          UNSUBSCRIBE_TOKEN_SECRET: !Ref UnsubscribeTokenSecret
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          TWILIO_PHONE_NUMBER: !Ref TwilioPhoneNumber
      Events:
        DailyMidnight:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 0 * * ? *)"
            State: ENABLED
            RoleArn: !GetAtt StockTextAlertsSchedulerRole.Arn

  ComputeDailyStatsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        # Minify: false — SAM's esbuild integration minifies by default,
        # which mangles function names in CloudWatch stack traces. These
        # Lambdas run unattended, so readable traces >> smaller bundles.
        Minify: false
        Format: cjs
        Target: node24
        Sourcemap: true
        EntryPoints:
          - compute-daily-stats.ts
    Properties:
      FunctionName: stocktextalerts-compute-daily-stats
      Handler: compute-daily-stats.handler
      CodeUri: src/handlers
      Timeout: 600
      MemorySize: 256
      LoggingConfig:
        LogGroup: !Ref ComputeDailyStatsLogGroup
      Environment:
        Variables:
          MASSIVE_API_KEY: !Ref MassiveApiKey
      Events:
        WeekdayEvening:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 22 ? * MON-FRI *)"
            State: ENABLED
            RoleArn: !GetAtt StockTextAlertsSchedulerRole.Arn

  # Shared by all three ScheduleV2 events. Without an explicit RoleArn,
  # SAM auto-generates one role per event with identical permissions —
  # see ~/.agents/rules/aws.md no-sprawl.
  StockTextAlertsSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
            # Confused-deputy guard: only schedules in this account can
            # assume the role. AWS EventBridge Scheduler best-practice.
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: InvokeStockTextAlertsLambdas
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                # FunctionNames are fixed literals on each function
                # resource above; using !Sub avoids a circular dependency
                # between the functions (which reference this role) and
                # the role (which would otherwise reference the functions).
                Resource:
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:stocktextalerts-schedule
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:stocktextalerts-asset-events
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:stocktextalerts-compute-daily-stats

  # ---------- CloudWatch Alarms ----------

  # Lambda Errors alarms (thrown exceptions, timeouts, OOMs)
  ScheduleFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: ScheduleFunction threw / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ScheduleFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  AssetEventsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: AssetEventsFunction threw / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AssetEventsFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  ComputeDailyStatsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: ComputeDailyStatsFunction threw / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ComputeDailyStatsFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # EventBridge Scheduler TargetErrorCount alarms (failed to invoke target)
  ScheduleFunctionEveryMinuteFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: ScheduleFunctionEveryMinute failed to invoke target
      Namespace: AWS/Scheduler
      MetricName: TargetErrorCount
      Dimensions:
        - Name: ScheduleGroup
          Value: default
        - Name: ScheduleName
          Value: ScheduleFunctionEveryMinute
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  AssetEventsFunctionDailyMidnightFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: AssetEventsFunctionDailyMidnight failed to invoke target
      Namespace: AWS/Scheduler
      MetricName: TargetErrorCount
      Dimensions:
        - Name: ScheduleGroup
          Value: default
        - Name: ScheduleName
          Value: AssetEventsFunctionDailyMidnight
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  ComputeDailyStatsFunctionWeekdayEveningFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: ComputeDailyStatsFunctionWeekdayEvening failed to invoke target
      Namespace: AWS/Scheduler
      MetricName: TargetErrorCount
      Dimensions:
        - Name: ScheduleGroup
          Value: default
        - Name: ScheduleName
          Value: ComputeDailyStatsFunctionWeekdayEvening
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # ---------- Lambda Log Groups ----------
  # Explicit log groups with 30-day retention, named after each Lambda's
  # FunctionName so the alert-hub enricher's prefix discovery
  # (describe_log_groups prefix=/aws/lambda/<namespace>) finds them.

  ScheduleLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/stocktextalerts-schedule
      RetentionInDays: 30

  AssetEventsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/stocktextalerts-asset-events
      RetentionInDays: 30

  ComputeDailyStatsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/stocktextalerts-compute-daily-stats
      RetentionInDays: 30

  # ---------- Error Log Metric Filters ----------

  ScheduleErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ScheduleLogGroup
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  AssetEventsErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref AssetEventsLogGroup
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  ComputeDailyStatsErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ComputeDailyStatsLogGroup
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  # Per-Lambda vendor retry-exhaustion counters (Massive/Finnhub). Each is
  # subtracted from ErrorLogCount in ErrorLogAlarm so single vendor blips
  # don't page on the global error alarm; per-Lambda alarms below use
  # cadence-appropriate thresholds (sustained for the per-minute Schedule,
  # single-occurrence for the daily AssetEvents and weekday-evening
  # ComputeDailyStats — where one failure means a whole day of missed data).

  ScheduleVendorRetryFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ScheduleLogGroup
      FilterPattern: '{ $.context.category = "vendor_retry_exhausted" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ScheduleVendorRetryCount
          MetricValue: "1"
          DefaultValue: 0

  AssetEventsVendorRetryFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref AssetEventsLogGroup
      FilterPattern: '{ $.context.category = "vendor_retry_exhausted" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: AssetEventsVendorRetryCount
          MetricValue: "1"
          DefaultValue: 0

  ComputeDailyStatsVendorRetryFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ComputeDailyStatsLogGroup
      FilterPattern: '{ $.context.category = "vendor_retry_exhausted" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ComputeDailyStatsVendorRetryCount
          MetricValue: "1"
          DefaultValue: 0

  # ---------- Aggregate Error Log Alarm ----------
  # Pages on any error EXCEPT upstream-vendor retry exhaustion. Uses metric
  # math to subtract the per-Lambda vendor-retry counts from the total.

  ErrorLogAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-error-logs
      AlarmDescription: ERROR logged in stocktextalerts Lambda functions (excluding vendor retry exhaustion)
      Metrics:
        - Id: non_vendor_errors
          Expression: "all_errors - sched_vr - assetev_vr - cds_vr"
          Label: Non-vendor-retry errors
          ReturnData: true
        - Id: all_errors
          MetricStat:
            Metric:
              Namespace: stocktextalerts
              MetricName: ErrorLogCount
            Period: 60
            Stat: Sum
          ReturnData: false
        - Id: sched_vr
          MetricStat:
            Metric:
              Namespace: stocktextalerts
              MetricName: ScheduleVendorRetryCount
            Period: 60
            Stat: Sum
          ReturnData: false
        - Id: assetev_vr
          MetricStat:
            Metric:
              Namespace: stocktextalerts
              MetricName: AssetEventsVendorRetryCount
            Period: 60
            Stat: Sum
          ReturnData: false
        - Id: cds_vr
          MetricStat:
            Metric:
              Namespace: stocktextalerts
              MetricName: ComputeDailyStatsVendorRetryCount
            Period: 60
            Stat: Sum
          ReturnData: false
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # ScheduleFunction runs every minute. A single 1-min vendor blip is absorbed
  # cleanly by the retry/degrade design — only sustained outages matter.
  # ≥3 minute-buckets with errors in the last 10 minutes triggers the alarm.
  ScheduleVendorRetryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-schedule-vendor-retry
      AlarmDescription: Sustained vendor retry exhaustion in ScheduleFunction (Massive/Finnhub)
      Namespace: stocktextalerts
      MetricName: ScheduleVendorRetryCount
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 10
      DatapointsToAlarm: 3
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # AssetEventsFunction runs once daily at midnight UTC. A single vendor
  # exhaustion = a whole day of missed earnings/dividend/split notifications.
  # 1-of-1 in 60s — page on any occurrence.
  AssetEventsVendorRetryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-asset-events-vendor-retry
      AlarmDescription: Vendor retry exhaustion in AssetEventsFunction (Finnhub earnings calendar)
      Namespace: stocktextalerts
      MetricName: AssetEventsVendorRetryCount
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # ComputeDailyStatsFunction runs once each weekday evening. Same rationale
  # as AssetEvents — a single vendor exhaustion = a missed daily snapshot.
  ComputeDailyStatsVendorRetryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-compute-daily-stats-vendor-retry
      AlarmDescription: Vendor retry exhaustion in ComputeDailyStatsFunction (Massive OHLCV)
      Namespace: stocktextalerts
      MetricName: ComputeDailyStatsVendorRetryCount
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # Prod database backups. Manual uploads via `aws s3 cp` after pg_dump.
  # Versioning is on so an accidental overwrite is recoverable.
  # Retain on stack delete to avoid losing data.
  #
  # Lifecycle:
  #   - Current versions: transition to Glacier IR after 30 days, expire at 365.
  #   - Non-current versions (overwrites): expire at 90 days.
  #   - Aborted multipart uploads: clean up after 7 days.
  ProdBackupsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "stocktextalerts-prod-backups-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionAndExpireCurrent
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER_IR
                TransitionInDays: 30
            ExpirationInDays: 365
          - Id: ExpireNonCurrent
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
          - Id: AbortIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

Outputs:
  ProdBackupsBucketName:
    Description: S3 bucket for production database backups
    Value: !Ref ProdBackupsBucket
    Export:
      Name: !Sub "${AWS::StackName}-ProdBackupsBucketName"
