AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: StockTextAlerts cron Lambda functions

Parameters:
  SupabaseUrl:
    Type: String
    NoEcho: true
  SupabaseSecretKey:
    Type: String
    NoEcho: true
  SiteUrl:
    Type: String
  MassiveApiKey:
    Type: String
    NoEcho: true
  FinnhubApiKey:
    Type: String
    NoEcho: true
  XaiApiKey:
    Type: String
    NoEcho: true
  EmailFrom:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /stocktextalerts/email-from
    Description: "SSM key whose value is the SES From: header (display name + address)"
  EmailDispatchSecret:
    Type: String
    NoEcho: true
  AdminEmails:
    Type: String
    Description: Comma-separated admin email allowlist used by the approval UI and email dispatch Lambda
  TwilioAccountSid:
    Type: String
    NoEcho: true
  TwilioApiKeySid:
    Type: String
    NoEcho: true
  TwilioApiKeySecret:
    Type: String
    NoEcho: true
  TwilioPhoneNumber:
    Type: String
    NoEcho: true
  UnsubscribeTokenSecret:
    Type: String
    NoEcho: true
  # Default "false" for local dev (sam local invoke); deploy.sh overrides to "true" for production
  LogMaskPii:
    Type: String
    Default: "false"
  AlertTopicArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /shared-infra/alert-topic-arn
    Description: Shared-infra SNS topic ARN
  GitSha:
    Type: String
    Default: unknown
    Description: Git SHA (short) baked into each Lambda at deploy time
  BackupConnectionSsmParam:
    Type: String
    Default: /stocktextalerts/backup/connection-string
    Description: SSM SecureString param name holding the backup_readonly connection string

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - arm64
    MemorySize: 512
    Environment:
      Variables:
        NODE_ENV: production
        # SUPABASE_URL / SUPABASE_SECRET_KEY are set per-function (only on the
        # five functions that construct a Supabase client) rather than globally,
        # so live-provider-check and backup-user-settings don't carry the
        # service-role secret they never use (least privilege).
        LOG_MASK_PII: !Ref LogMaskPii
        GIT_SHA: !Ref GitSha

Resources:
  ScheduleFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        # Minify: false — SAM's esbuild integration minifies by default,
        # which mangles function names in CloudWatch stack traces. These
        # Lambdas run unattended, so readable traces >> smaller bundles.
        Minify: false
        Format: cjs
        Target: node24
        Sourcemap: true
        EntryPoints:
          - schedule.ts
    Properties:
      FunctionName: stocktextalerts-schedule
      Handler: schedule.handler
      CodeUri: src/handlers
      Timeout: 300
      MemorySize: 512
      LoggingConfig:
        LogGroup: !Ref ScheduleLogGroup
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: !Sub "arn:aws:ses:us-east-1:${AWS::AccountId}:identity/stocktextalerts.com"
      Environment:
        Variables:
          SITE_URL: !Ref SiteUrl
          MASSIVE_API_KEY: !Ref MassiveApiKey
          FINNHUB_API_KEY: !Ref FinnhubApiKey
          XAI_API_KEY: !Ref XaiApiKey
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SECRET_KEY: !Ref SupabaseSecretKey
          EMAIL_FROM: !Ref EmailFrom
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_API_KEY_SID: !Ref TwilioApiKeySid
          TWILIO_API_KEY_SECRET: !Ref TwilioApiKeySecret
          TWILIO_PHONE_NUMBER: !Ref TwilioPhoneNumber
          UNSUBSCRIBE_TOKEN_SECRET: !Ref UnsubscribeTokenSecret
      Events:
        EveryMinute:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "rate(1 minute)"
            State: ENABLED
            RoleArn: !GetAtt StockTextAlertsSchedulerRole.Arn

  AssetMaintenanceFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        # Minify: false — SAM's esbuild integration minifies by default,
        # which mangles function names in CloudWatch stack traces. These
        # Lambdas run unattended, so readable traces >> smaller bundles.
        Minify: false
        Format: cjs
        Target: node24
        Sourcemap: true
        EntryPoints:
          - asset-maintenance.ts
    Properties:
      FunctionName: stocktextalerts-asset-maintenance
      Handler: asset-maintenance.handler
      CodeUri: src/handlers
      Timeout: 300
      MemorySize: 512
      LoggingConfig:
        LogGroup: !Ref AssetMaintenanceLogGroup
      Environment:
        Variables:
          SITE_URL: !Ref SiteUrl
          MASSIVE_API_KEY: !Ref MassiveApiKey
          FINNHUB_API_KEY: !Ref FinnhubApiKey
          EMAIL_FROM: !Ref EmailFrom
          UNSUBSCRIBE_TOKEN_SECRET: !Ref UnsubscribeTokenSecret
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SECRET_KEY: !Ref SupabaseSecretKey
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_API_KEY_SID: !Ref TwilioApiKeySid
          TWILIO_API_KEY_SECRET: !Ref TwilioApiKeySecret
          TWILIO_PHONE_NUMBER: !Ref TwilioPhoneNumber
          VENDOR_BACKFILL_QUEUE_URL: !Ref VendorBackfillQueue
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: !Sub "arn:aws:ses:us-east-1:${AWS::AccountId}:identity/stocktextalerts.com"
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt VendorBackfillQueue.Arn
      Events:
        DailyMidnight:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 0 * * ? *)"
            State: ENABLED
            RoleArn: !GetAtt StockTextAlertsSchedulerRole.Arn

  EmailDispatchFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        # Minify: false — SAM's esbuild integration minifies by default,
        # which mangles function names in CloudWatch stack traces. This
        # function is operator-facing, so readable traces matter.
        Minify: false
        Format: cjs
        Target: node24
        Sourcemap: true
        EntryPoints:
          - email-dispatch.ts
    Properties:
      FunctionName: stocktextalerts-email-dispatch
      Handler: email-dispatch.handler
      CodeUri: src/handlers
      Timeout: 30
      MemorySize: 256
      LoggingConfig:
        LogGroup: !Ref EmailDispatchLogGroup
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: !Sub "arn:aws:ses:us-east-1:${AWS::AccountId}:identity/stocktextalerts.com"
      Environment:
        Variables:
          SITE_URL: !Ref SiteUrl
          EMAIL_FROM: !Ref EmailFrom
          EMAIL_DISPATCH_SECRET: !Ref EmailDispatchSecret
          ADMIN_EMAILS: !Ref AdminEmails
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SECRET_KEY: !Ref SupabaseSecretKey

  EmailDispatchFunctionUrl:
    Type: AWS::Lambda::Url
    Properties:
      AuthType: NONE
      InvokeMode: BUFFERED
      TargetFunctionArn: !GetAtt EmailDispatchFunction.Arn

  EmailDispatchFunctionUrlPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunctionUrl
      FunctionName: !Ref EmailDispatchFunction
      FunctionUrlAuthType: NONE
      Principal: "*"

  EmailDispatchFunctionInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref EmailDispatchFunction
      Principal: "*"
      InvokedViaFunctionUrl: true

  ComputeDailyStatsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        # Minify: false — SAM's esbuild integration minifies by default,
        # which mangles function names in CloudWatch stack traces. These
        # Lambdas run unattended, so readable traces >> smaller bundles.
        Minify: false
        Format: cjs
        Target: node24
        Sourcemap: true
        EntryPoints:
          - compute-daily-stats.ts
    Properties:
      FunctionName: stocktextalerts-compute-daily-stats
      Handler: compute-daily-stats.handler
      CodeUri: src/handlers
      Timeout: 600
      MemorySize: 256
      LoggingConfig:
        LogGroup: !Ref ComputeDailyStatsLogGroup
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - sqs:SendMessage
              Resource: !GetAtt VendorBackfillQueue.Arn
      Environment:
        Variables:
          MASSIVE_API_KEY: !Ref MassiveApiKey
          VENDOR_BACKFILL_QUEUE_URL: !Ref VendorBackfillQueue
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SECRET_KEY: !Ref SupabaseSecretKey
      Events:
        WeekdayEvening:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 22 ? * MON-FRI *)"
            State: ENABLED
            RoleArn: !GetAtt StockTextAlertsSchedulerRole.Arn

  VendorBackfillDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: stocktextalerts-vendor-backfill-dlq
      MessageRetentionPeriod: 1209600

  VendorBackfillQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: stocktextalerts-vendor-backfill
      VisibilityTimeout: 600
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt VendorBackfillDLQ.Arn
        maxReceiveCount: 5

  VendorBackfillFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Format: cjs
        Target: node24
        Sourcemap: true
        EntryPoints:
          - vendor-backfill.ts
    Properties:
      FunctionName: stocktextalerts-vendor-backfill
      Handler: vendor-backfill.handler
      CodeUri: src/handlers
      Timeout: 600
      MemorySize: 512
      LoggingConfig:
        LogGroup: !Ref VendorBackfillLogGroup
      Policies:
        - SQSPollerPolicy:
            QueueName: !GetAtt VendorBackfillQueue.QueueName
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - sqs:ChangeMessageVisibility
              Resource: !GetAtt VendorBackfillQueue.Arn
      Environment:
        Variables:
          MASSIVE_API_KEY: !Ref MassiveApiKey
          FINNHUB_API_KEY: !Ref FinnhubApiKey
          VENDOR_BACKFILL_QUEUE_URL: !Ref VendorBackfillQueue
          SUPABASE_URL: !Ref SupabaseUrl
          SUPABASE_SECRET_KEY: !Ref SupabaseSecretKey
      Events:
        VendorBackfillQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt VendorBackfillQueue.Arn
            BatchSize: 5
            FunctionResponseTypes:
              - ReportBatchItemFailures

  LiveProviderCheckFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Format: cjs
        Target: node24
        Sourcemap: true
        EntryPoints:
          - live-provider-check.ts
    Properties:
      FunctionName: stocktextalerts-live-provider-check
      Handler: live-provider-check.handler
      CodeUri: src/handlers
      Timeout: 300
      MemorySize: 256
      LoggingConfig:
        LogGroup: !Ref LiveProviderCheckLogGroup
      Environment:
        Variables:
          MASSIVE_API_KEY: !Ref MassiveApiKey
          FINNHUB_API_KEY: !Ref FinnhubApiKey
      Events:
        WeekdayMidSession:
          Type: ScheduleV2
          Properties:
            # 16:00 UTC = 12:00 ET — mid-session, snapshot data fresh. Mon-Fri.
            ScheduleExpression: "cron(0 16 ? * MON-FRI *)"
            State: ENABLED
            RoleArn: !GetAtt StockTextAlertsSchedulerRole.Arn

  # Shared by all four ScheduleV2 events. Without an explicit RoleArn,
  # SAM auto-generates one role per event with identical permissions —
  # see IAM no-sprawl — reuse explicit scheduler roles instead of SAM auto-generated duplicates.
  StockTextAlertsSchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
            # Confused-deputy guard: only schedules in this account can
            # assume the role. AWS EventBridge Scheduler best-practice.
            Condition:
              StringEquals:
                aws:SourceAccount: !Ref AWS::AccountId
      Policies:
        - PolicyName: InvokeStockTextAlertsLambdas
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                # FunctionNames are fixed literals on each function
                # resource above; using !Sub avoids a circular dependency
                # between the functions (which reference this role) and
                # the role (which would otherwise reference the functions).
                Resource:
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:stocktextalerts-schedule
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:stocktextalerts-asset-maintenance
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:stocktextalerts-compute-daily-stats
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:stocktextalerts-live-provider-check
                  - !Sub arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:stocktextalerts-backup-user-settings

  # ---------- CloudWatch Alarms ----------

  # Lambda Errors alarms (thrown exceptions, timeouts, OOMs)
  ScheduleFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-schedule-lambda-errors
      AlarmDescription: ScheduleFunction threw / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ScheduleFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  AssetMaintenanceFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-asset-maintenance-lambda-errors
      AlarmDescription: AssetMaintenanceFunction threw / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AssetMaintenanceFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  EmailDispatchFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-email-dispatch-lambda-errors
      AlarmDescription: EmailDispatchFunction threw / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref EmailDispatchFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  ComputeDailyStatsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-compute-daily-stats-lambda-errors
      AlarmDescription: ComputeDailyStatsFunction threw / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ComputeDailyStatsFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  LiveProviderCheckFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-live-provider-check-lambda-errors
      AlarmDescription: Live Massive/Finnhub provider health check failed (or the Lambda threw / timed out / OOMed)
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref LiveProviderCheckFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # EventBridge Scheduler TargetErrorCount alarms (failed to invoke target)
  ScheduleFunctionEveryMinuteFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-schedule-invocation-failures
      AlarmDescription: ScheduleFunctionEveryMinute failed to invoke target
      Namespace: AWS/Scheduler
      MetricName: TargetErrorCount
      Dimensions:
        - Name: ScheduleGroup
          Value: default
        - Name: ScheduleName
          Value: ScheduleFunctionEveryMinute
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  AssetMaintenanceFunctionDailyMidnightFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-asset-maintenance-invocation-failures
      AlarmDescription: AssetMaintenanceFunctionDailyMidnight failed to invoke target
      Namespace: AWS/Scheduler
      MetricName: TargetErrorCount
      Dimensions:
        - Name: ScheduleGroup
          Value: default
        - Name: ScheduleName
          Value: AssetMaintenanceFunctionDailyMidnight
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  ComputeDailyStatsFunctionWeekdayEveningFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-compute-daily-stats-invocation-failures
      AlarmDescription: ComputeDailyStatsFunctionWeekdayEvening failed to invoke target
      Namespace: AWS/Scheduler
      MetricName: TargetErrorCount
      Dimensions:
        - Name: ScheduleGroup
          Value: default
        - Name: ScheduleName
          Value: ComputeDailyStatsFunctionWeekdayEvening
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  BackupUserSettingsFunction:
    Type: AWS::Serverless::Function
    Metadata:
      BuildMethod: esbuild
      BuildProperties:
        Minify: false
        Format: cjs
        Target: node24
        Sourcemap: true
        EntryPoints:
          - backup-user-settings.ts
    Properties:
      FunctionName: stocktextalerts-backup-user-settings
      Handler: backup-user-settings.handler
      CodeUri: src/handlers
      Timeout: 120
      MemorySize: 256
      LoggingConfig:
        LogGroup: !Ref BackupUserSettingsLogGroup
      Environment:
        Variables:
          BACKUP_BUCKET: !Ref ProdBackupsBucket
          BACKUP_CONNECTION_SSM_PARAM: !Ref BackupConnectionSsmParam
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action: s3:PutObject
              Resource: !Sub "${ProdBackupsBucket.Arn}/user-settings/*"
            - Effect: Allow
              Action: ssm:GetParameter
              Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${BackupConnectionSsmParam}"
            - Effect: Allow
              Action: kms:Decrypt
              Resource: !Sub "arn:aws:kms:${AWS::Region}:${AWS::AccountId}:alias/aws/ssm"
            - Effect: Allow
              Action: cloudwatch:PutMetricData
              Resource: "*"
      Events:
        FiveTimesDaily:
          Type: ScheduleV2
          Properties:
            # 02:00, 07:00, 12:00, 17:00, 22:00 UTC
            ScheduleExpression: "cron(0 2,7,12,17,22 * * ? *)"
            State: ENABLED
            RoleArn: !GetAtt StockTextAlertsSchedulerRole.Arn

  # ---------- Lambda Log Groups ----------
  # Explicit log groups with 30-day retention, named after each Lambda's
  # FunctionName so the shared-infra enricher's prefix discovery
  # (describe_log_groups prefix=/aws/lambda/<namespace>) finds them.

  ScheduleLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/stocktextalerts-schedule
      RetentionInDays: 30

  AssetMaintenanceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/stocktextalerts-asset-maintenance
      RetentionInDays: 30

  EmailDispatchLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/stocktextalerts-email-dispatch
      RetentionInDays: 30

  ComputeDailyStatsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/stocktextalerts-compute-daily-stats
      RetentionInDays: 30

  LiveProviderCheckLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/stocktextalerts-live-provider-check
      RetentionInDays: 30

  VendorBackfillLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/stocktextalerts-vendor-backfill
      RetentionInDays: 30

  BackupUserSettingsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /aws/lambda/stocktextalerts-backup-user-settings
      RetentionInDays: 30

  # ---------- Error Log Metric Filters ----------

  ScheduleErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ScheduleLogGroup
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  AssetMaintenanceErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref AssetMaintenanceLogGroup
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  EmailDispatchErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref EmailDispatchLogGroup
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  ComputeDailyStatsErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ComputeDailyStatsLogGroup
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  LiveProviderCheckErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref LiveProviderCheckLogGroup
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  VendorBackfillErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref VendorBackfillLogGroup
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  BackupUserSettingsErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref BackupUserSettingsLogGroup
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  # Per-Lambda vendor retry-exhaustion counters (Massive/Finnhub). Each is
  # subtracted from ErrorLogCount in ErrorLogAlarm so single vendor blips
  # don't page on the global error alarm; per-Lambda alarms below use
  # cadence-appropriate thresholds (sustained for the per-minute Schedule,
  # single-occurrence for the daily AssetMaintenance and weekday-evening
  # ComputeDailyStats — where one failure means a whole day of missed data).

  ScheduleVendorRetryFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ScheduleLogGroup
      FilterPattern: '{ $.context.category = "vendor_retry_exhausted" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ScheduleVendorRetryCount
          MetricValue: "1"
          DefaultValue: 0

  AssetMaintenanceVendorRetryFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref AssetMaintenanceLogGroup
      FilterPattern: '{ $.context.category = "vendor_retry_exhausted" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: AssetMaintenanceVendorRetryCount
          MetricValue: "1"
          DefaultValue: 0

  ComputeDailyStatsVendorRetryFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ComputeDailyStatsLogGroup
      FilterPattern: '{ $.context.category = "vendor_retry_exhausted" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: ComputeDailyStatsVendorRetryCount
          MetricValue: "1"
          DefaultValue: 0

  VendorBackfillVendorRetryFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref VendorBackfillLogGroup
      FilterPattern: '{ $.context.category = "vendor_retry_exhausted" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts
          MetricName: VendorBackfillVendorRetryCount
          MetricValue: "1"
          DefaultValue: 0

  # ---------- Aggregate Error Log Alarm ----------
  # Pages on any error EXCEPT upstream-vendor retry exhaustion. Uses metric
  # math to subtract the per-Lambda vendor-retry counts from the total.

  ErrorLogAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-error-logs
      AlarmDescription: ERROR logged in stocktextalerts Lambda functions (excluding vendor retry exhaustion)
      Metrics:
        - Id: non_vendor_errors
          Expression: "all_errors - sched_vr - assetmaint_vr - cds_vr - vb_vr"
          Label: Non-vendor-retry errors
          ReturnData: true
        - Id: all_errors
          MetricStat:
            Metric:
              Namespace: stocktextalerts
              MetricName: ErrorLogCount
            Period: 60
            Stat: Sum
          ReturnData: false
        - Id: sched_vr
          MetricStat:
            Metric:
              Namespace: stocktextalerts
              MetricName: ScheduleVendorRetryCount
            Period: 60
            Stat: Sum
          ReturnData: false
        - Id: assetmaint_vr
          MetricStat:
            Metric:
              Namespace: stocktextalerts
              MetricName: AssetMaintenanceVendorRetryCount
            Period: 60
            Stat: Sum
          ReturnData: false
        - Id: cds_vr
          MetricStat:
            Metric:
              Namespace: stocktextalerts
              MetricName: ComputeDailyStatsVendorRetryCount
            Period: 60
            Stat: Sum
          ReturnData: false
        - Id: vb_vr
          MetricStat:
            Metric:
              Namespace: stocktextalerts
              MetricName: VendorBackfillVendorRetryCount
            Period: 60
            Stat: Sum
          ReturnData: false
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # ScheduleFunction runs every minute. A single 1-min vendor blip is absorbed
  # cleanly by the retry/degrade design — only sustained outages matter.
  # ≥3 minute-buckets with errors in the last 10 minutes triggers the alarm.
  ScheduleVendorRetryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-schedule-vendor-retry
      AlarmDescription: Sustained vendor retry exhaustion in ScheduleFunction (Massive/Finnhub)
      Namespace: stocktextalerts
      MetricName: ScheduleVendorRetryCount
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 10
      DatapointsToAlarm: 3
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # AssetMaintenanceFunction runs once daily at midnight UTC. A single vendor
  # exhaustion = a whole day of missed earnings/dividend/split notifications.
  # 1-of-1 in 60s — page on any occurrence.
  AssetMaintenanceVendorRetryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-asset-maintenance-vendor-retry
      AlarmDescription: Vendor retry exhaustion in AssetMaintenanceFunction (Finnhub earnings calendar)
      Namespace: stocktextalerts
      MetricName: AssetMaintenanceVendorRetryCount
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # ComputeDailyStatsFunction runs once each weekday evening. Same rationale
  # as AssetMaintenance — a single vendor exhaustion = a missed daily snapshot.
  ComputeDailyStatsVendorRetryAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-compute-daily-stats-vendor-retry
      AlarmDescription: Vendor retry exhaustion in ComputeDailyStatsFunction (Massive OHLCV)
      Namespace: stocktextalerts
      MetricName: ComputeDailyStatsVendorRetryCount
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      DatapointsToAlarm: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  VendorBackfillDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-vendor-backfill-dlq
      AlarmDescription: Poison messages in VendorBackfillDLQ require operator attention
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt VendorBackfillDLQ.QueueName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  VendorBackfillFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-vendor-backfill-lambda-errors
      AlarmDescription: VendorBackfillFunction threw / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref VendorBackfillFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  BackupUserSettingsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-backup-user-settings-lambda-errors
      AlarmDescription: BackupUserSettingsFunction threw / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref BackupUserSettingsFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  BackupUserSettingsStaleAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-backup-user-settings-stale
      AlarmDescription: No successful user-settings backup in the last 6 hours
      Namespace: stocktextalerts/Backup
      MetricName: BackupSuccess
      Statistic: Sum
      Period: 21600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: breaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # EventBridge Scheduler failed to INVOKE the backup Lambda (perms/throttle) —
  # distinct from the function erroring once invoked. Passthrough (AWS/Scheduler).
  BackupUserSettingsFunctionFiveTimesDailyFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-backup-user-settings-invocation-failures
      AlarmDescription: BackupUserSettingsFunctionFiveTimesDaily failed to invoke target
      Namespace: AWS/Scheduler
      MetricName: TargetErrorCount
      Dimensions:
        - Name: ScheduleGroup
          Value: default
        - Name: ScheduleName
          Value: BackupUserSettingsFunctionFiveTimesDaily
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # Prod database backups. Manual uploads via `aws s3 cp` after pg_dump.
  # Versioning is on so an accidental overwrite is recoverable.
  # Retain on stack delete to avoid losing data.
  #
  # Lifecycle:
  #   - Current versions: transition to Glacier IR after 30 days, expire at 365.
  #   - Non-current versions (overwrites): expire at 90 days.
  #   - Aborted multipart uploads: clean up after 7 days.
  ProdBackupsBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketName: !Sub "stocktextalerts-prod-backups-${AWS::AccountId}"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TransitionAndExpireCurrent
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER_IR
                TransitionInDays: 30
            ExpirationInDays: 365
          - Id: ExpireNonCurrent
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 90
          - Id: AbortIncompleteUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
          - Id: ExpireUserSettings30Days
            Status: Enabled
            Prefix: user-settings/
            ExpirationInDays: 30

Outputs:
  EmailDispatchFunctionUrl:
    Description: Function URL for Vercel-to-AWS transactional email dispatch
    Value: !GetAtt EmailDispatchFunctionUrl.FunctionUrl
  ProdBackupsBucketName:
    Description: S3 bucket for production database backups
    Value: !Ref ProdBackupsBucket
    Export:
      Name: !Sub "${AWS::StackName}-ProdBackupsBucketName"
