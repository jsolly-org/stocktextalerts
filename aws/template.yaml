AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: StockTextAlerts cron Lambda functions

Parameters:
  SupabaseUrl:
    Type: String
    NoEcho: true
  SupabaseSecretKey:
    Type: String
    NoEcho: true
  SiteUrl:
    Type: String
  MassiveApiKey:
    Type: String
    NoEcho: true
  FinnhubApiKey:
    Type: String
    NoEcho: true
  XaiApiKey:
    Type: String
    NoEcho: true
  EmailFrom:
    Type: String
  TwilioAccountSid:
    Type: String
    NoEcho: true
  TwilioAuthToken:
    Type: String
    NoEcho: true
  TwilioPhoneNumber:
    Type: String
    NoEcho: true
  UnsubscribeTokenSecret:
    Type: String
    NoEcho: true
  # Default "false" for local dev (sam local invoke); deploy.sh overrides to "true" for production
  LogMaskPii:
    Type: String
    Default: "false"
  AlertTopicArn:
    Type: AWS::SSM::Parameter::Value<String>
    Default: /alert-hub/alert-topic-arn
    Description: Alert-hub SNS topic ARN
  GitSha:
    Type: String
    Default: unknown
    Description: Git SHA (short) baked into each Lambda at deploy time

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - arm64
    MemorySize: 512
    Environment:
      Variables:
        SUPABASE_URL: !Ref SupabaseUrl
        SUPABASE_SECRET_KEY: !Ref SupabaseSecretKey
        LOG_MASK_PII: !Ref LogMaskPii
        GIT_SHA: !Ref GitSha

Resources:
  ScheduleFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: schedule.handler
      CodeUri: dist/handlers/
      Timeout: 300
      MemorySize: 512
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "arn:aws:ses:us-east-1:730335616323:identity/stocktextalerts.com"
      Environment:
        Variables:
          SITE_URL: !Ref SiteUrl
          MASSIVE_API_KEY: !Ref MassiveApiKey
          FINNHUB_API_KEY: !Ref FinnhubApiKey
          XAI_API_KEY: !Ref XaiApiKey
          EMAIL_FROM: !Ref EmailFrom
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          TWILIO_PHONE_NUMBER: !Ref TwilioPhoneNumber
          UNSUBSCRIBE_TOKEN_SECRET: !Ref UnsubscribeTokenSecret
      Events:
        EveryMinute:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "rate(1 minute)"
            State: ENABLED

  AssetEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: asset-events.handler
      CodeUri: dist/handlers/
      Timeout: 300
      MemorySize: 256
      Policies:
        # Required by the daily delisting sweep, which emails affected
        # users when one of their holdings gets delisted. SMS is delivered
        # via Twilio REST so no additional IAM permissions are needed.
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "arn:aws:ses:us-east-1:730335616323:identity/stocktextalerts.com"
      Environment:
        Variables:
          SITE_URL: !Ref SiteUrl
          MASSIVE_API_KEY: !Ref MassiveApiKey
          FINNHUB_API_KEY: !Ref FinnhubApiKey
          EMAIL_FROM: !Ref EmailFrom
          UNSUBSCRIBE_TOKEN_SECRET: !Ref UnsubscribeTokenSecret
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          TWILIO_PHONE_NUMBER: !Ref TwilioPhoneNumber
      Events:
        DailyMidnight:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 0 * * ? *)"
            State: ENABLED

  ComputeDailyStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: compute-daily-stats.handler
      CodeUri: dist/handlers/
      Timeout: 600
      MemorySize: 256
      Environment:
        Variables:
          MASSIVE_API_KEY: !Ref MassiveApiKey
      Events:
        WeekdayEvening:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 22 ? * MON-FRI *)"
            State: ENABLED

  # ---------- CloudWatch Alarms ----------

  # Lambda Errors alarms (thrown exceptions, timeouts, OOMs)
  ScheduleFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: ScheduleFunction threw / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ScheduleFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  AssetEventsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: AssetEventsFunction threw / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AssetEventsFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  ComputeDailyStatsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: ComputeDailyStatsFunction threw / timed out / OOMed
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ComputeDailyStatsFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # EventBridge Scheduler TargetErrorCount alarms (failed to invoke target)
  ScheduleFunctionEveryMinuteFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: ScheduleFunctionEveryMinute failed to invoke target
      Namespace: AWS/Scheduler
      MetricName: TargetErrorCount
      Dimensions:
        - Name: ScheduleGroup
          Value: default
        - Name: ScheduleName
          Value: ScheduleFunctionEveryMinute
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  AssetEventsFunctionDailyMidnightFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: AssetEventsFunctionDailyMidnight failed to invoke target
      Namespace: AWS/Scheduler
      MetricName: TargetErrorCount
      Dimensions:
        - Name: ScheduleGroup
          Value: default
        - Name: ScheduleName
          Value: AssetEventsFunctionDailyMidnight
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  ComputeDailyStatsFunctionWeekdayEveningFailureAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: ComputeDailyStatsFunctionWeekdayEvening failed to invoke target
      Namespace: AWS/Scheduler
      MetricName: TargetErrorCount
      Dimensions:
        - Name: ScheduleGroup
          Value: default
        - Name: ScheduleName
          Value: ComputeDailyStatsFunctionWeekdayEvening
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

  # ---------- Error Log Metric Filters ----------

  ScheduleErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub /aws/lambda/${ScheduleFunction}
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts-crons
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  AssetEventsErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub /aws/lambda/${AssetEventsFunction}
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts-crons
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  ComputeDailyStatsErrorLogFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Sub /aws/lambda/${ComputeDailyStatsFunction}
      FilterPattern: '{ $.level = "error" }'
      MetricTransformations:
        - MetricNamespace: stocktextalerts-crons
          MetricName: ErrorLogCount
          MetricValue: "1"
          DefaultValue: 0

  # ---------- Aggregate Error Log Alarm ----------

  ErrorLogAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: stocktextalerts-crons-error-logs
      AlarmDescription: ERROR logged in stocktextalerts Lambda functions
      Namespace: stocktextalerts-crons
      MetricName: ErrorLogCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopicArn
      OKActions:
        - !Ref AlertTopicArn

