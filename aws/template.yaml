AWSTemplateFormatVersion: "2010-09-09"
Transform: AWS::Serverless-2016-10-31
Description: StockTextAlerts cron Lambda functions

Parameters:
  SupabaseUrl:
    Type: String
    NoEcho: true
  SupabaseSecretKey:
    Type: String
    NoEcho: true
  SiteUrl:
    Type: String
  MassiveApiKey:
    Type: String
    NoEcho: true
  FinnhubApiKey:
    Type: String
    NoEcho: true
  XaiApiKey:
    Type: String
    NoEcho: true
  EmailFrom:
    Type: String
  TwilioAccountSid:
    Type: String
    NoEcho: true
  TwilioAuthToken:
    Type: String
    NoEcho: true
  TwilioPhoneNumber:
    Type: String
    NoEcho: true
  UnsubscribeTokenSecret:
    Type: String
    NoEcho: true
  AlertEmail:
    Type: String
    NoEcho: true
  AlertPhoneNumber:
    Type: String
    NoEcho: true
  # Default "false" for local dev (sam local invoke); deploy.sh overrides to "true" for production
  LogMaskPii:
    Type: String
    Default: "false"

Globals:
  Function:
    Runtime: nodejs24.x
    Architectures:
      - arm64
    MemorySize: 512
    Environment:
      Variables:
        SUPABASE_URL: !Ref SupabaseUrl
        SUPABASE_SECRET_KEY: !Ref SupabaseSecretKey
        LOG_MASK_PII: !Ref LogMaskPii

Resources:
  ScheduleFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: schedule.handler
      CodeUri: dist/handlers/
      Timeout: 300
      MemorySize: 512
      Policies:
        - Version: "2012-10-17"
          Statement:
            - Effect: Allow
              Action:
                - ses:SendEmail
                - ses:SendRawEmail
              Resource: "arn:aws:ses:us-east-1:730335616323:identity/stocktextalerts.com"
      Environment:
        Variables:
          SITE_URL: !Ref SiteUrl
          MASSIVE_API_KEY: !Ref MassiveApiKey
          FINNHUB_API_KEY: !Ref FinnhubApiKey
          XAI_API_KEY: !Ref XaiApiKey
          EMAIL_FROM: !Ref EmailFrom
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          TWILIO_PHONE_NUMBER: !Ref TwilioPhoneNumber
          UNSUBSCRIBE_TOKEN_SECRET: !Ref UnsubscribeTokenSecret
      Events:
        EveryMinute:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "rate(1 minute)"
            State: ENABLED

  AssetEventsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: asset-events.handler
      CodeUri: dist/handlers/
      Timeout: 300
      MemorySize: 256
      Environment:
        Variables:
          MASSIVE_API_KEY: !Ref MassiveApiKey
          FINNHUB_API_KEY: !Ref FinnhubApiKey
      Events:
        DailyMidnight:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 0 * * ? *)"
            State: ENABLED

  ComputeDailyStatsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: compute-daily-stats.handler
      CodeUri: dist/handlers/
      Timeout: 600
      MemorySize: 256
      Environment:
        Variables:
          MASSIVE_API_KEY: !Ref MassiveApiKey
      Events:
        WeekdayEvening:
          Type: ScheduleV2
          Properties:
            ScheduleExpression: "cron(0 22 ? * MON-FRI *)"
            State: ENABLED

  # --- Alerting ---

  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: stocktextalerts-lambda-alerts
      Subscription:
        - Protocol: email
          Endpoint: !Ref AlertEmail
        - Protocol: sms
          Endpoint: !Ref AlertPhoneNumber

  ScheduleFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "ScheduleFunction errors >= 5 in 5 minutes"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ScheduleFunction
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 5
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  AssetEventsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "AssetEventsFunction any error in 1 hour"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref AssetEventsFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic

  ComputeDailyStatsFunctionErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmDescription: "ComputeDailyStatsFunction any error in 1 hour"
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref ComputeDailyStatsFunction
      Statistic: Sum
      Period: 3600
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref AlertTopic
      OKActions:
        - !Ref AlertTopic
