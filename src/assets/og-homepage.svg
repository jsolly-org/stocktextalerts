<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#0D9488"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Top accent bar -->
  <rect width="1200" height="5" fill="url(#accent-grad)"/>

  <!-- Subtle horizontal grid lines -->
  <g opacity="0.06" stroke="#94A3B8" stroke-width="1">
    <line x1="0" y1="157" x2="1200" y2="157"/>
    <line x1="0" y1="315" x2="1200" y2="315"/>
    <line x1="0" y1="473" x2="1200" y2="473"/>
  </g>

  <!-- Stylized candlestick chart on the right side -->
  <g transform="translate(740 150)" opacity="0.78">
    <!-- Wicks -->
    <g stroke-width="3" stroke-linecap="round">
      <line x1="20" y1="300" x2="20" y2="390" stroke="#EF4444"/>
      <line x1="80" y1="270" x2="80" y2="360" stroke="#10B981"/>
      <line x1="140" y1="250" x2="140" y2="335" stroke="#10B981"/>
      <line x1="200" y1="265" x2="200" y2="350" stroke="#EF4444"/>
      <line x1="260" y1="225" x2="260" y2="310" stroke="#10B981"/>
      <line x1="320" y1="195" x2="320" y2="280" stroke="#10B981"/>
      <line x1="380" y1="175" x2="380" y2="260" stroke="#10B981"/>
      <line x1="440" y1="155" x2="440" y2="240" stroke="#10B981"/>
    </g>

    <!-- Candle bodies -->
    <g>
      <rect x="9" y="330" width="22" height="36" rx="4" fill="#EF4444"/>
      <rect x="69" y="286" width="22" height="46" rx="4" fill="#10B981"/>
      <rect x="129" y="270" width="22" height="42" rx="4" fill="#10B981"/>
      <rect x="189" y="292" width="22" height="34" rx="4" fill="#EF4444"/>
      <rect x="249" y="238" width="22" height="50" rx="4" fill="#10B981"/>
      <rect x="309" y="210" width="22" height="48" rx="4" fill="#10B981"/>
      <rect x="369" y="190" width="22" height="44" rx="4" fill="#10B981"/>
      <rect x="429" y="170" width="22" height="42" rx="4" fill="#10B981"/>
    </g>
  </g>

  <!-- Brand name — white on dark = ~15:1 contrast -->
  <text x="80" y="240"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="76" font-weight="700" fill="#FFFFFF"
        letter-spacing="-1">StockTextAlerts</text>

  <!-- Tagline — slate-300 on dark = ~10:1 contrast -->
  <text x="82" y="305"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="34" font-weight="400" fill="#CBD5E1">Stock &amp; ETF Updates via Email &amp; SMS</text>

  <!-- Accent divider bar -->
  <rect x="82" y="335" width="80" height="3" rx="1.5" fill="url(#accent-grad)"/>

  <!-- Feature list — slate-400 on dark = ~5.5:1 contrast -->
  <text x="82" y="395"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="22" font-weight="500" fill="#94A3B8">Track US Stocks &amp; ETFs</text>
  <circle cx="320" cy="390" r="2.5" fill="#475569"/>
  <text x="340" y="395"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="22" font-weight="500" fill="#94A3B8">Set Your Schedule</text>
  <circle cx="545" cy="390" r="2.5" fill="#475569"/>
  <text x="565" y="395"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="22" font-weight="500" fill="#94A3B8">Email &amp; SMS Alerts</text>

  <!-- CTA button -->
  <rect x="82" y="445" width="320" height="66" rx="14" fill="url(#accent-grad)"/>
  <text x="242" y="487"
        text-anchor="middle"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="30" font-weight="700" fill="#FFFFFF">Start Notifications</text>

  <!-- URL — slate-400 on dark -->
  <text x="82" y="570"
        font-family="'Helvetica Neue', 'Arial', sans-serif"
        font-size="20" font-weight="400" fill="#94A3B8">stocktextalerts.com</text>
</svg>
